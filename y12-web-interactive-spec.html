\u003cli>如果分页接口请求失败，保留当前页内容并提示加载失败。\u003c/li>\n\u003c/ul>","lines":207},{"id":"权限控制规则-25","title":"权限控制规则","file":"docs/notion-export/ExportBlock-4efbb5e9-6b52-48cb-8bcf-820483b4cd96-Part-1/Y12/权限控制规则 3497db3145c380e9b058fd8d8a9a968e.md","raw":"# 权限控制规则\n\n### **游客状态权限**\n\n游客状态下允许：\n\n- 浏览首页\n- 浏览列表页\n- 浏览详情页\n- 使用搜索\n- 查看广告\n- 查看公开内容\n\n游客状态下限制：\n\n- 不能执行真实点赞\n- 不能发表评论\n- 不能使用个人中心菜单\n- 不能进入需要登录态支撑的用户功能页逻辑（如后续有严格限制）\n\n### **登录状态权限**\n\n登录状态下允许：\n\n- 使用个人中心\n- 查看观看历史\n- 查看我的点赞\n- 执行点赞\n- 发表评论\n- 使用与账号绑定的用户功能","html":"\u003ch2>权限控制规则\u003c/h2>\n\u003ch4>\u003cstrong>游客状态权限\u003c/strong>\u003c/h4>\n\u003cp>游客状态下允许：\u003c/p>\n\u003cul>\n\u003cli>浏览首页\u003c/li>\n\u003cli>浏览列表页\u003c/li>\n\u003cli>浏览详情页\u003c/li>\n\u003cli>使用搜索\u003c/li>\n\u003cli>查看广告\u003c/li>\n\u003cli>查看公开内容\u003c/li>\n\u003c/ul>\n\u003cp>游客状态下限制：\u003c/p>\n\u003cul>\n\u003cli>不能执行真实点赞\u003c/li>\n\u003cli>不能发表评论\u003c/li>\n\u003cli>不能使用个人中心菜单\u003c/li>\n\u003cli>不能进入需要登录态支撑的用户功能页逻辑（如后续有严格限制）\u003c/li>\n\u003c/ul>\n\u003ch4>\u003cstrong>登录状态权限\u003c/strong>\u003c/h4>\n\u003cp>登录状态下允许：\u003c/p>\n\u003cul>\n\u003cli>使用个人中心\u003c/li>\n\u003cli>查看观看历史\u003c/li>\n\u003cli>查看我的点赞\u003c/li>\n\u003cli>执行点赞\u003c/li>\n\u003cli>发表评论\u003c/li>\n\u003cli>使用与账号绑定的用户功能\u003c/li>\n\u003c/ul>","lines":30},{"id":"点赞功能-26","title":"点赞功能","file":"docs/notion-export/ExportBlock-4efbb5e9-6b52-48cb-8bcf-820483b4cd96-Part-1/Y12/点赞功能 3497db3145c380ffbba4c2abf98ac640.md","raw":"# 点赞功能\n\n## **功能名称**\n\n点赞功能\n\n## **功能用途**\n\n点赞功能用于让用户表达对帖子或视频内容的偏好，同时记录用户点赞行为，用于“我的点赞”页面展示。\n\n## **展示内容**\n\n点赞功能包含：\n\n- 点赞按钮\n- 点赞数量\n- 点赞状态\n\n## **展示规则**\n\n点赞按钮展示在内容详情页中。\n\n未点赞时展示默认状态。\n\n已点赞时展示高亮或选中状态。\n\n点赞数量展示为数字，可配合 icon 展示。\n\n## **交互规则**\n\n未点赞状态下，点击点赞按钮后进入已点赞状态。\n\n已点赞状态下，点击点赞按钮后取消点赞。\n\n点赞成功后，点赞数量同步增减。\n\n点赞记录同步进入“我的点赞”页面。\n\n如果用户未登录时点击点赞按钮，提示登录或引导登录。\n\n## **异常场景**\n\n如果点赞接口失败，点赞状态回退到操作前状态。\n\n如果点赞数量为空，默认展示 0。\n\n如果点赞数量更新失败，前端保持原数量不变。\n\n如果用户未登录，点击点赞按钮不执行真实点赞操作。\n\n如果重复点击点赞按钮，提交中只允许一次有效请求。\n\n如果内容已下架，点赞按钮不可点击。","html":"\u003ch2>点赞功能\u003c/h2>\n\u003ch3>\u003cstrong>功能名称\u003c/strong>\u003c/h3>\n\u003cp>点赞功能\u003c/p>\n\u003ch3>\u003cstrong>功能用途\u003c/strong>\u003c/h3>\n\u003cp>点赞功能用于让用户表达对帖子或视频内容的偏好，同时记录用户点赞行为，用于“我的点赞”页面展示。\u003c/p>\n\u003ch3>\u003cstrong>展示内容\u003c/strong>\u003c/h3>\n\u003cp>点赞功能包含：\u003c/p>\n\u003cul>\n\u003cli>点赞按钮\u003c/li>\n\u003cli>点赞数量\u003c/li>\n\u003cli>点赞状态\u003c/li>\n\u003c/ul>\n\u003ch3>\u003cstrong>展示规则\u003c/strong>\u003c/h3>\n\u003cp>点赞按钮展示在内容详情页中。\u003c/p>\n\u003cp>未点赞时展示默认状态。\u003c/p>\n\u003cp>已点赞时展示高亮或选中状态。\u003c/p>\n\u003cp>点赞数量展示为数字，可配合 icon 展示。\u003c/p>\n\u003ch3>\u003cstrong>交互规则\u003c/strong>\u003c/h3>\n\u003cp>未点赞状态下，点击点赞按钮后进入已点赞状态。\u003c/p>\n\u003cp>已点赞状态下，点击点赞按钮后取消点赞。\u003c/p>\n\u003cp>点赞成功后，点赞数量同步增减。\u003c/p>\n\u003cp>点赞记录同步进入“我的点赞”页面。\u003c/p>\n\u003cp>如果用户未登录时点击点赞按钮，提示登录或引导登录。\u003c/p>\n\u003ch3>\u003cstrong>异常场景\u003c/strong>\u003c/h3>\n\u003cp>如果点赞接口失败，点赞状态回退到操作前状态。\u003c/p>\n\u003cp>如果点赞数量为空，默认展示 0。\u003c/p>\n\u003cp>如果点赞数量更新失败，前端保持原数量不变。\u003c/p>\n\u003cp>如果用户未登录，点击点赞按钮不执行真实点赞操作。\u003c/p>\n\u003cp>如果重复点击点赞按钮，提交中只允许一次有效请求。\u003c/p>\n\u003cp>如果内容已下架，点赞按钮不可点击。\u003c/p>","lines":53},{"id":"点赞功能与用户状态-27","title":"点赞功能与用户状态","file":"docs/notion-export/ExportBlock-4efbb5e9-6b52-48cb-8bcf-820483b4cd96-Part-1/Y12/点赞功能与用户状态 3497db3145c3809682bdf0a601103ee6.md","raw":"# 点赞功能与用户状态\n\n### **游客状态**\n\n游客点击点赞按钮时，不执行真实点赞。\n\n可提示用户登录，或直接打开登录弹窗。\n\n点赞数量不应发生真实变更。\n\n### **登录状态**\n\n登录用户可正常点赞与取消点赞。\n\n点赞状态和点赞数量可正常更新。\n\n点赞记录需要同步进入“我的点赞”页面。\n\n### **异常场景**\n\n如果点赞接口失败，点赞状态回退到操作前状态。\n\n如果用户状态异常，默认按游客状态处理。","html":"\u003ch2>点赞功能与用户状态\u003c/h2>\n\u003ch4>\u003cstrong>游客状态\u003c/strong>\u003c/h4>\n\u003cp>游客点击点赞按钮时，不执行真实点赞。\u003c/p>\n\u003cp>可提示用户登录，或直接打开登录弹窗。\u003c/p>\n\u003cp>点赞数量不应发生真实变更。\u003c/p>\n\u003ch4>\u003cstrong>登录状态\u003c/strong>\u003c/h4>\n\u003cp>登录用户可正常点赞与取消点赞。\u003c/p>\n\u003cp>点赞状态和点赞数量可正常更新。\u003c/p>\n\u003cp>点赞记录需要同步进入“我的点赞”页面。\u003c/p>\n\u003ch4>\u003cstrong>异常场景\u003c/strong>\u003c/h4>\n\u003cp>如果点赞接口失败，点赞状态回退到操作前状态。\u003c/p>\n\u003cp>如果用户状态异常，默认按游客状态处理。\u003c/p>","lines":23},{"id":"用户状态分类-28","title":"用户状态分类","file":"docs/notion-export/ExportBlock-4efbb5e9-6b52-48cb-8bcf-820483b4cd96-Part-1/Y12/用户状态分类 3497db3145c38037bb96da577cc0924f.md","raw":"# 用户状态分类\n\n### **游客状态**\n\n游客状态表示用户未登录。\n\n游客状态下，用户可以浏览公开页面内容。\n\n游客状态下，不展示个人中心菜单内容。\n\n游客状态下，涉及登录权限的功能需要按未登录规则处理。\n\n### **登录状态**\n\n登录状态表示用户已完成账号登录。\n\n登录状态下，用户可使用个人中心、观看历史、我的点赞、点赞、评论等功能。\n\n登录状态下，顶部栏登录入口切换为个人中心入口。","html":"\u003ch2>用户状态分类\u003c/h2>\n\u003ch4>\u003cstrong>游客状态\u003c/strong>\u003c/h4>\n\u003cp>游客状态表示用户未登录。\u003c/p>\n\u003cp>游客状态下，用户可以浏览公开页面内容。\u003c/p>\n\u003cp>游客状态下，不展示个人中心菜单内容。\u003c/p>\n\u003cp>游客状态下，涉及登录权限的功能需要按未登录规则处理。\u003c/p>\n\u003ch4>\u003cstrong>登录状态\u003c/strong>\u003c/h4>\n\u003cp>登录状态表示用户已完成账号登录。\u003c/p>\n\u003cp>登录状态下，用户可使用个人中心、观看历史、我的点赞、点赞、评论等功能。\u003c/p>\n\u003cp>登录状态下，顶部栏登录入口切换为个人中心入口。\u003c/p>","lines":19},{"id":"登录-注册-29","title":"登录/注册","file":"docs/notion-export/ExportBlock-4efbb5e9-6b52-48cb-8bcf-820483b4cd96-Part-1/Y12/登录 注册 3497db3145c3801cbb27c7ad515c76a4.md","raw":"# 登录/注册\n\n---\n\n## 一、核心规则（通用）\n\n### 注册方式\n\n仅支持 **自定义账号注册**。\n\n### 通用要求\n\n- 注册和登录的账号、密码必须符合字段规则。\n- 所有输入错误统一展示在对应输入框下方。\n- 错误提示使用红色文字展示。\n- Web 端与移动端的校验逻辑、错误提示文案、触发时机保持一致。\n- Web 端与移动端仅在输入框长度限制处理和注册成功后的后续流程上存在差异。\n\n---\n\n## 二、字段规则\n\n### 账号规则\n\n- 必填。\n- 支持字母、数字。\n- 长度限制：4-20 位。\n- 不支持中文、空格、特殊符号。\n\n### 密码规则\n\n- 必填。\n- 必须包含大小写字母和数字。\n- 长度限制：6-20 位。\n- 不支持中文和空格。\n\n### 确认密码规则\n\n- 仅注册时展示。\n- 必填。\n- 必须与密码输入内容一致。\n\n---\n\n## 三、Web 端与移动端差异说明\n\n### 核心差异点\n\n输入框长度限制处理不同。\n\n### Web 端\n\n- 用户输入超过最大长度时，不强制截断。\n- 超出长度后展示错误提示。\n- 用户需要自行删除多余字符后恢复正常状态。\n\n### 移动端\n\n- 用户输入超过最大长度时，输入框自动截断到最大允许长度。\n- 截断后不展示“超出长度”错误。\n- 其他格式校验规则与 Web 端保持一致。\n\n---\n\n## 四、错误提示规则（通用）\n\n### 展示位置\n\n所有错误提示展示在对应输入框下方。\n\n### 展示样式\n\n- 红色文字。\n- 输入框可同步展示错误态边框。\n- 同一输入框同一时间只展示一条最高优先级错误。\n\n### 通用错误提示文案\n\n| 场景 | 错误提示 |\n| --- | --- |\n| 账号为空 | 请输入账号 |\n| 账号长度不足 | 账号需为 4-20 位 |\n| 账号格式错误 | 账号仅支持字母和数字 |\n| 密码为空 | 请输入密码 |\n| 密码长度不足 | 密码需为 6-20 位 |\n| 密码格式错误 | 密码需包含大小写字母和数字 |\n| 确认密码为空 | 请再次输入密码 |\n| 两次密码不一致 | 两次输入的密码不一致 |\n| 登录失败 | 账号不存在 / 密码错误 |\n\n---\n\n## 五、注册按钮规则（通用）\n\n### 默认状态\n\n- 注册表单未填写完整时，注册按钮置灰，不可点击。\n- 任一字段存在错误时，注册按钮置灰，不可点击。\n\n### 可点击状态\n\n当账号、密码、确认密码均填写完整且格式正确时，注册按钮高亮，可点击。\n\n### 提交中状态\n\n点击注册按钮后：\n\n- 按钮进入加载状态。\n- 按钮置灰，不可重复点击。\n- 输入框可保持可编辑或禁用，建议提交中禁用，避免重复变更数据。\n\n### Web 端注册成功\n\n- 注册成功后关闭注册弹窗。\n- 自动打开登录弹窗。\n- 登录弹窗中的账号自动填充为刚注册的账号。\n- 密码输入框为空，由用户自行输入密码。\n- 密码合规后，登录按钮高亮。\n- 用户点击登录后完成登录流程。\n\n### 移动端注册成功\n\n- 注册成功后直接返回上一页，通常为设置页面。\n- 原账号设置入口变为禁用状态。\n- 输入框右侧状态更新为「已设置账号密码」。\n- 游客账号与新账号完成绑定。\n- 用户无需额外登录。\n\n---\n\n## 六、登录按钮规则（通用）\n\n### 默认状态\n\n- 账号或密码任一为空时，登录按钮置灰，不可点击。\n- 任一字段格式错误时，登录按钮置灰，不可点击。\n\n### 可点击状态\n\n账号和密码均填写完整且格式合规时，登录按钮高亮，可点击。\n\n### 提交中状态\n\n点击登录按钮后：\n\n- 登录按钮置灰。\n- 显示加载状态。\n- 禁止重复点击。\n\n### 登录成功\n\n- 关闭登录页或登录弹窗。\n- 跳转至平台首页。\n\n### 登录失败\n\n- 在表单区域展示错误提示：`账号不存在 / 密码错误`。\n- 按钮恢复可点击状态。\n- 用户可继续修改账号或密码后重新提交。\n\n---\n\n## 七、输入框占位文案（通用）\n\n| 输入框 | 占位文案 |\n| --- | --- |\n| 账号 | 请输入账号 |\n| 密码 | 请输入密码 |\n| 确认密码 | 请再次输入密码 |\n\n---\n\n## 八、实时校验规则\n\n### 账号实时校验\n\n- 账号输入长度达到 4 位后开始实时校验。\n- 少于 4 位时，不展示格式错误提示。\n- 输入为空时，清除错误提示并恢复默认状态。\n\n### 密码实时校验\n\n- 密码输入长度达到 6 位后开始实时校验。\n- 少于 6 位时，不展示格式错误提示。\n- 输入为空时，清除错误提示并恢复默认状态。\n\n### 确认密码实时校验\n\n- 当确认密码输入框有内容时，实时判断是否与密码一致。\n- 如果密码内容变化，需要同步重新校验确认密码。\n\n---\n\n## 九、实时校验兜底策略\n\n适用于账号、密码、确认密码输入框。\n\n### 输入内容修改时\n\n- 只要输入长度回退到校验阈值以下，错误提示必须立即清除。\n- 账号长度低于 4 位时，清除账号格式错误。\n- 密码长度低于 6 位时，清除密码格式错误。\n- 输入框清空时，清除所有错误提示，并恢复默认样式。\n\n### 输入框失焦时\n\n- 当前输入框已有错误状态时，失焦后错误状态保持。\n- 如果输入内容为空，可展示必填错误，具体以提交或失焦校验策略为准。\n\n### 输入框再次聚焦时\n\n- 输入框重新聚焦后，错误提示需要重置。\n- 仅当用户再次输入并达到校验阈值后，重新触发实时校验。\n\n### 切换输入框时\n\n- 当前输入框失焦后，已有错误状态保持。\n- 切换到其他输入框不应清除原输入框错误。\n- 但当用户再次聚焦原输入框时，需要重置实时校验状态。\n\n### 表单重置时\n\n- 清空所有输入框。\n- 清除所有错误提示。\n- 所有输入框恢复默认样式。\n- 注册 / 登录按钮恢复置灰不可点击状态。\n\n---\n\n## 十、异常场景\n\n- 网络异常时，提交失败并提示用户稍后重试。\n- 接口超时时，按钮恢复可点击状态。\n- 连续点击提交按钮时，只允许触发一次请求。\n- 后端返回字段错误时，优先展示后端错误文案。\n- 后端返回未知错误时，展示通用错误提示。\n- 用户关闭弹窗后再次打开，表单应恢复初始状态。\n- Web 端和移动端错误提示文案必须保持一致。","html":"\u003ch2>登录/注册\u003c/h2>\n\u003chr>\n\u003ch3>一、核心规则（通用）\u003c/h3>\n\u003ch4>注册方式\u003c/h4>\n\u003cp>仅支持 \u003cstrong>自定义账号注册\u003c/strong>。\u003c/p>\n\u003ch4>通用要求\u003c/h4>\n\u003cul>\n\u003cli>注册和登录的账号、密码必须符合字段规则。\u003c/li>\n\u003cli>所有输入错误统一展示在对应输入框下方。\u003c/li>\n\u003cli>错误提示使用红色文字展示。\u003c/li>\n\u003cli>Web 端与移动端的校验逻辑、错误提示文案、触发时机保持一致。\u003c/li>\n\u003cli>Web 端与移动端仅在输入框长度限制处理和注册成功后的后续流程上存在差异。\u003c/li>\n\u003c/ul>\n\u003chr>\n\u003ch3>二、字段规则\u003c/h3>\n\u003ch4>账号规则\u003c/h4>\n\u003cul>\n\u003cli>必填。\u003c/li>\n\u003cli>支持字母、数字。\u003c/li>\n\u003cli>长度限制：4-20 位。\u003c/li>\n\u003cli>不支持中文、空格、特殊符号。\u003c/li>\n\u003c/ul>\n\u003ch4>密码规则\u003c/h4>\n\u003cul>\n\u003cli>必填。\u003c/li>\n\u003cli>必须包含大小写字母和数字。\u003c/li>\n\u003cli>长度限制：6-20 位。\u003c/li>\n\u003cli>不支持中文和空格。\u003c/li>\n\u003c/ul>\n\u003ch4>确认密码规则\u003c/h4>\n\u003cul>\n\u003cli>仅注册时展示。\u003c/li>\n\u003cli>必填。\u003c/li>\n\u003cli>必须与密码输入内容一致。\u003c/li>\n\u003c/ul>\n\u003chr>\n\u003ch3>三、Web 端与移动端差异说明\u003c/h3>\n\u003ch4>核心差异点\u003c/h4>\n\u003cp>输入框长度限制处理不同。\u003c/p>\n\u003ch4>Web 端\u003c/h4>\n\u003cul>\n\u003cli>用户输入超过最大长度时，不强制截断。\u003c/li>\n\u003cli>超出长度后展示错误提示。\u003c/li>\n\u003cli>用户需要自行删除多余字符后恢复正常状态。\u003c/li>\n\u003c/ul>\n\u003ch4>移动端\u003c/h4>\n\u003cul>\n\u003cli>用户输入超过最大长度时，输入框自动截断到最大允许长度。\u003c/li>\n\u003cli>截断后不展示“超出长度”错误。\u003c/li>\n\u003cli>其他格式校验规则与 Web 端保持一致。\u003c/li>\n\u003c/ul>\n\u003chr>\n\u003ch3>四、错误提示规则（通用）\u003c/h3>\n\u003ch4>展示位置\u003c/h4>\n\u003cp>所有错误提示展示在对应输入框下方。\u003c/p>\n\u003ch4>展示样式\u003c/h4>\n\u003cul>\n\u003cli>红色文字。\u003c/li>\n\u003cli>输入框可同步展示错误态边框。\u003c/li>\n\u003cli>同一输入框同一时间只展示一条最高优先级错误。\u003c/li>\n\u003c/ul>\n\u003ch4>通用错误提示文案\u003c/h4>\n\u003cp>| 场景 | 错误提示 |\u003c/p>\n\u003cp>| --- | --- |\u003c/p>\n\u003cp>| 账号为空 | 请输入账号 |\u003c/p>\n\u003cp>| 账号长度不足 | 账号需为 4-20 位 |\u003c/p>\n\u003cp>| 账号格式错误 | 账号仅支持字母和数字 |\u003c/p>\n\u003cp>| 密码为空 | 请输入密码 |\u003c/p>\n\u003cp>| 密码长度不足 | 密码需为 6-20 位 |\u003c/p>\n\u003cp>| 密码格式错误 | 密码需包含大小写字母和数字 |\u003c/p>\n\u003cp>| 确认密码为空 | 请再次输入密码 |\u003c/p>\n\u003cp>| 两次密码不一致 | 两次输入的密码不一致 |\u003c/p>\n\u003cp>| 登录失败 | 账号不存在 / 密码错误 |\u003c/p>\n\u003chr>\n\u003ch3>五、注册按钮规则（通用）\u003c/h3>\n\u003ch4>默认状态\u003c/h4>\n\u003cul>\n\u003cli>注册表单未填写完整时，注册按钮置灰，不可点击。\u003c/li>\n\u003cli>任一字段存在错误时，注册按钮置灰，不可点击。\u003c/li>\n\u003c/ul>\n\u003ch4>可点击状态\u003c/h4>\n\u003cp>当账号、密码、确认密码均填写完整且格式正确时，注册按钮高亮，可点击。\u003c/p>\n\u003ch4>提交中状态\u003c/h4>\n\u003cp>点击注册按钮后：\u003c/p>\n\u003cul>\n\u003cli>按钮进入加载状态。\u003c/li>\n\u003cli>按钮置灰，不可重复点击。\u003c/li>\n\u003cli>输入框可保持可编辑或禁用，建议提交中禁用，避免重复变更数据。\u003c/li>\n\u003c/ul>\n\u003ch4>Web 端注册成功\u003c/h4>\n\u003cul>\n\u003cli>注册成功后关闭注册弹窗。\u003c/li>\n\u003cli>自动打开登录弹窗。\u003c/li>\n\u003cli>登录弹窗中的账号自动填充为刚注册的账号。\u003c/li>\n\u003cli>密码输入框为空，由用户自行输入密码。\u003c/li>\n\u003cli>密码合规后，登录按钮高亮。\u003c/li>\n\u003cli>用户点击登录后完成登录流程。\u003c/li>\n\u003c/ul>\n\u003ch4>移动端注册成功\u003c/h4>\n\u003cul>\n\u003cli>注册成功后直接返回上一页，通常为设置页面。\u003c/li>\n\u003cli>原账号设置入口变为禁用状态。\u003c/li>\n\u003cli>输入框右侧状态更新为「已设置账号密码」。\u003c/li>\n\u003cli>游客账号与新账号完成绑定。\u003c/li>\n\u003cli>用户无需额外登录。\u003c/li>\n\u003c/ul>\n\u003chr>\n\u003ch3>六、登录按钮规则（通用）\u003c/h3>\n\u003ch4>默认状态\u003c/h4>\n\u003cul>\n\u003cli>账号或密码任一为空时，登录按钮置灰，不可点击。\u003c/li>\n\u003cli>任一字段格式错误时，登录按钮置灰，不可点击。\u003c/li>\n\u003c/ul>\n\u003ch4>可点击状态\u003c/h4>\n\u003cp>账号和密码均填写完整且格式合规时，登录按钮高亮，可点击。\u003c/p>\n\u003ch4>提交中状态\u003c/h4>\n\u003cp>点击登录按钮后：\u003c/p>\n\u003cul>\n\u003cli>登录按钮置灰。\u003c/li>\n\u003cli>显示加载状态。\u003c/li>\n\u003cli>禁止重复点击。\u003c/li>\n\u003c/ul>\n\u003ch4>登录成功\u003c/h4>\n\u003cul>\n\u003cli>关闭登录页或登录弹窗。\u003c/li>\n\u003cli>跳转至平台首页。\u003c/li>\n\u003c/ul>\n\u003ch4>登录失败\u003c/h4>\n\u003cul>\n\u003cli>在表单区域展示错误提示：\u003ccode>账号不存在 / 密码错误\u003c/code>。\u003c/li>\n\u003cli>按钮恢复可点击状态。\u003c/li>\n\u003cli>用户可继续修改账号或密码后重新提交。\u003c/li>\n\u003c/ul>\n\u003chr>\n\u003ch3>七、输入框占位文案（通用）\u003c/h3>\n\u003cp>| 输入框 | 占位文案 |\u003c/p>\n\u003cp>| --- | --- |\u003c/p>\n\u003cp>| 账号 | 请输入账号 |\u003c/p>\n\u003cp>| 密码 | 请输入密码 |\u003c/p>\n\u003cp>| 确认密码 | 请再次输入密码 |\u003c/p>\n\u003chr>\n\u003ch3>八、实时校验规则\u003c/h3>\n\u003ch4>账号实时校验\u003c/h4>\n\u003cul>\n\u003cli>账号输入长度达到 4 位后开始实时校验。\u003c/li>\n\u003cli>少于 4 位时，不展示格式错误提示。\u003c/li>\n\u003cli>输入为空时，清除错误提示并恢复默认状态。\u003c/li>\n\u003c/ul>\n\u003ch4>密码实时校验\u003c/h4>\n\u003cul>\n\u003cli>密码输入长度达到 6 位后开始实时校验。\u003c/li>\n\u003cli>少于 6 位时，不展示格式错误提示。\u003c/li>\n\u003cli>输入为空时，清除错误提示并恢复默认状态。\u003c/li>\n\u003c/ul>\n\u003ch4>确认密码实时校验\u003c/h4>\n\u003cul>\n\u003cli>当确认密码输入框有内容时，实时判断是否与密码一致。\u003c/li>\n\u003cli>如果密码内容变化，需要同步重新校验确认密码。\u003c/li>\n\u003c/ul>\n\u003chr>\n\u003ch3>九、实时校验兜底策略\u003c/h3>\n\u003cp>适用于账号、密码、确认密码输入框。\u003c/p>\n\u003ch4>输入内容修改时\u003c/h4>\n\u003cul>\n\u003cli>只要输入长度回退到校验阈值以下，错误提示必须立即清除。\u003c/li>\n\u003cli>账号长度低于 4 位时，清除账号格式错误。\u003c/li>\n\u003cli>密码长度低于 6 位时，清除密码格式错误。\u003c/li>\n\u003cli>输入框清空时，清除所有错误提示，并恢复默认样式。\u003c/li>\n\u003c/ul>\n\u003ch4>输入框失焦时\u003c/h4>\n\u003cul>\n\u003cli>当前输入框已有错误状态时，失焦后错误状态保持。\u003c/li>\n\u003cli>如果输入内容为空，可展示必填错误，具体以提交或失焦校验策略为准。\u003c/li>\n\u003c/ul>\n\u003ch4>输入框再次聚焦时\u003c/h4>\n\u003cul>\n\u003cli>输入框重新聚焦后，错误提示需要重置。\u003c/li>\n\u003cli>仅当用户再次输入并达到校验阈值后，重新触发实时校验。\u003c/li>\n\u003c/ul>\n\u003ch4>切换输入框时\u003c/h4>\n\u003cul>\n\u003cli>当前输入框失焦后，已有错误状态保持。\u003c/li>\n\u003cli>切换到其他输入框不应清除原输入框错误。\u003c/li>\n\u003cli>但当用户再次聚焦原输入框时，需要重置实时校验状态。\u003c/li>\n\u003c/ul>\n\u003ch4>表单重置时\u003c/h4>\n\u003cul>\n\u003cli>清空所有输入框。\u003c/li>\n\u003cli>清除所有错误提示。\u003c/li>\n\u003cli>所有输入框恢复默认样式。\u003c/li>\n\u003cli>注册 / 登录按钮恢复置灰不可点击状态。\u003c/li>\n\u003c/ul>\n\u003chr>\n\u003ch3>十、异常场景\u003c/h3>\n\u003cul>\n\u003cli>网络异常时，提交失败并提示用户稍后重试。\u003c/li>\n\u003cli>接口超时时，按钮恢复可点击状态。\u003c/li>\n\u003cli>连续点击提交按钮时，只允许触发一次请求。\u003c/li>\n\u003cli>后端返回字段错误时，优先展示后端错误文案。\u003c/li>\n\u003cli>后端返回未知错误时，展示通用错误提示。\u003c/li>\n\u003cli>用户关闭弹窗后再次打开，表单应恢复初始状态。\u003c/li>\n\u003cli>Web 端和移动端错误提示文案必须保持一致。\u003c/li>\n\u003c/ul>","lines":238},{"id":"登录状态切换规则-30","title":"登录状态切换规则","file":"docs/notion-export/ExportBlock-4efbb5e9-6b52-48cb-8bcf-820483b4cd96-Part-1/Y12/登录状态切换规则 3497db3145c3800dac05de0517025961.md","raw":"# 登录状态切换规则\n\n### **登录成功**\n\n用户点击登录按钮并校验通过后，进入登录成功状态。\n\n登录成功后：\n\n- 关闭登录弹窗\n- 顶部栏入口从“登录”切换为“个人中心”\n- 本地存储写入登录状态\n- 页面内依赖登录态的功能同步更新\n\n### **注册成功**\n\n当前 Web 端注册成功后：\n\n- 注册弹窗关闭\n- 回到登录入口或打开登录弹窗\n- 用户可继续完成登录流程\n\n### **退出账号**\n\n用户点击“退出账号”后，打开二次确认弹窗。\n\n点击确认退出后：\n\n- 清空登录状态\n- 顶部栏恢复为“登录”\n- 个人中心下拉关闭\n- 评论、点赞等登录态功能恢复为游客逻辑\n\n### **异常场景**\n\n如果登录失败，保持游客状态不变。\n\n如果退出失败，保持当前登录状态不变。\n\n如果本地存储写入失败，页面可临时更新状态，但刷新后按未登录处理。","html":"\u003ch2>登录状态切换规则\u003c/h2>\n\u003ch4>\u003cstrong>登录成功\u003c/strong>\u003c/h4>\n\u003cp>用户点击登录按钮并校验通过后，进入登录成功状态。\u003c/p>\n\u003cp>登录成功后：\u003c/p>\n\u003cul>\n\u003cli>关闭登录弹窗\u003c/li>\n\u003cli>顶部栏入口从“登录”切换为“个人中心”\u003c/li>\n\u003cli>本地存储写入登录状态\u003c/li>\n\u003cli>页面内依赖登录态的功能同步更新\u003c/li>\n\u003c/ul>\n\u003ch4>\u003cstrong>注册成功\u003c/strong>\u003c/h4>\n\u003cp>当前 Web 端注册成功后：\u003c/p>\n\u003cul>\n\u003cli>注册弹窗关闭\u003c/li>\n\u003cli>回到登录入口或打开登录弹窗\u003c/li>\n\u003cli>用户可继续完成登录流程\u003c/li>\n\u003c/ul>\n\u003ch4>\u003cstrong>退出账号\u003c/strong>\u003c/h4>\n\u003cp>用户点击“退出账号”后，打开二次确认弹窗。\u003c/p>\n\u003cp>点击确认退出后：\u003c/p>\n\u003cul>\n\u003cli>清空登录状态\u003c/li>\n\u003cli>顶部栏恢复为“登录”\u003c/li>\n\u003cli>个人中心下拉关闭\u003c/li>\n\u003cli>评论、点赞等登录态功能恢复为游客逻辑\u003c/li>\n\u003c/ul>\n\u003ch4>\u003cstrong>异常场景\u003c/strong>\u003c/h4>\n\u003cp>如果登录失败，保持游客状态不变。\u003c/p>\n\u003cp>如果退出失败，保持当前登录状态不变。\u003c/p>\n\u003cp>如果本地存储写入失败，页面可临时更新状态，但刷新后按未登录处理。\u003c/p>","lines":39},{"id":"观看历史与用户状态-31","title":"观看历史与用户状态","file":"docs/notion-export/ExportBlock-4efbb5e9-6b52-48cb-8bcf-820483b4cd96-Part-1/Y12/观看历史与用户状态 3497db3145c380528663c467fcf5d7ff.md","raw":"# 观看历史与用户状态\n\n### **游客状态**\n\n当前版本中，游客状态可仅浏览页面，不建议写入正式观看历史。\n\n如果产品允许游客临时历史，可保存在本地，但不作为正式用户历史。\n\n### **登录状态**\n\n登录状态下，用户浏览过的帖子和视频内容可进入观看历史页面。\n\n观看历史页支持帖子和视频分类切换。\n\n### **异常场景**\n\n如果历史数据为空，展示空状态。\n\n如果历史数据加载失败，展示加载失败或空状态。\n\n如果用户未登录进入观看历史页，当前版本可根据产品策略决定是否允许查看本地临时记录或引导登录。","html":"\u003ch2>观看历史与用户状态\u003c/h2>\n\u003ch4>\u003cstrong>游客状态\u003c/strong>\u003c/h4>\n\u003cp>当前版本中，游客状态可仅浏览页面，不建议写入正式观看历史。\u003c/p>\n\u003cp>如果产品允许游客临时历史，可保存在本地，但不作为正式用户历史。\u003c/p>\n\u003ch4>\u003cstrong>登录状态\u003c/strong>\u003c/h4>\n\u003cp>登录状态下，用户浏览过的帖子和视频内容可进入观看历史页面。\u003c/p>\n\u003cp>观看历史页支持帖子和视频分类切换。\u003c/p>\n\u003ch4>\u003cstrong>异常场景\u003c/strong>\u003c/h4>\n\u003cp>如果历史数据为空，展示空状态。\u003c/p>\n\u003cp>如果历史数据加载失败，展示加载失败或空状态。\u003c/p>\n\u003cp>如果用户未登录进入观看历史页，当前版本可根据产品策略决定是否允许查看本地临时记录或引导登录。\u003c/p>","lines":21},{"id":"观看历史页-32","title":"观看历史页","file":"docs/notion-export/ExportBlock-4efbb5e9-6b52-48cb-8bcf-820483b4cd96-Part-1/Y12/观看历史页 3497db3145c38038a507c2b4a27e6a40.md","raw":"# 观看历史页\n\n## 页面名称\n\n观看历史页\n\n## 页面用途\n\n观看历史页用于展示当前用户最近浏览过的内容记录，帮助用户快速回看之前访问过的帖子和视频内容。页面支持按内容类型切换，并支持分页查看历史记录。本文档仅描述观看历史页主体内容，不包含全站通用组件。\n\n## 页面主体结构\n\n观看历史页主体从上至下包含：\n\n- 页面标题区域\n- 内容分类切换区域\n- 历史记录列表\n- 分页器\n\n## 页面标题区域\n\n### 展示内容\n\n页面标题固定展示为：`观看历史`。\n\n### 展示规则\n\n标题区域只展示页面名称，不展示额外说明文案。\n\n### 异常场景\n\n如果标题区域渲染失败，默认展示“观看历史”。\n\n## 内容分类切换区域\n\n### 展示内容\n\n分类切换按钮包含：\n\n- 帖子\n- 视频\n\n默认选中帖子。\n\n当前选中的分类按钮需要高亮。\n\n### 展示规则\n\n分类按钮顺序固定为：帖子、视频。\n\n分类按钮始终展示，不因当前分类内容为空而隐藏。\n\n### 交互规则\n\n点击“帖子”按钮，切换至帖子历史记录列表。\n\n点击“视频”按钮，切换至视频历史记录列表。\n\n切换分类后，分页重置为第 1 页。\n\n切换分类后，当前列表刷新为对应分类的历史记录。\n\n分类切换只影响当前页面内容，不影响其他页面状态。\n\n### 异常场景\n\n如果分类参数为空，默认选中帖子。\n\n如果当前分类下没有历史记录，展示对应分类的空状态。\n\n如果切换分类失败，保持当前分类不变。\n\n## 帖子历史记录列表\n\n### 展示内容\n\n帖子历史记录列表展示动态内容卡片。\n\n列表整体为 5 行 5 列布局。\n\n每页最多展示 25 条帖子历史记录。\n\n### 展示规则\n\n动态内容卡片样式与全局动态内容卡片保持一致。\n\n动态卡片封面比例与首页动态内容卡片保持一致。\n\n卡片展示内容包括：\n\n- 动态封面\n- 动态标题\n- 发布者信息\n- 上架时间\n- 动态标签\n\n帖子历史记录列表不展示额外简介文案。\n\n帖子历史记录卡片尺寸与帖子列表页保持统一。\n\n### 交互规则\n\n点击动态内容卡片进入对应动态详情页。\n\n点击动态标签跳转搜索结果页，并默认选中帖子分类。\n\n鼠标悬浮动态卡片时展示选中效果。\n\n### 异常场景\n\n如果帖子历史记录为空，展示帖子空状态。\n\n如果帖子数量不足 25 条，按实际数量展示。\n\n如果封面为空，展示默认封面占位。\n\n如果标题为空，展示默认标题“未命名动态”。\n\n如果发布者为空，展示默认发布者。\n\n如果上架时间为空，隐藏上架时间字段。\n\n如果标签为空，隐藏标签区域。\n\n如果详情链接为空，点击卡片不跳转。\n\n如果历史记录中存在重复内容，需要去重，避免重复展示。\n\n## 视频历史记录列表\n\n### 展示内容\n\n视频历史记录列表展示视频内容卡片。\n\n列表整体为 5 行 5 列布局。\n\n每页最多展示 25 条视频历史记录。\n\n### 展示规则\n\n视频内容卡片样式与全局视频内容卡片保持一致。\n\n视频封面比例为 16:9。\n\n播放量展示在封面左下角。\n\n点赞量展示在封面右下角。\n\n播放量和点赞量均使用 icon + 数字形式展示。\n\n视频卡片展示内容包括：\n\n- 视频封面\n- 播放量\n- 点赞量\n- 视频标题\n- 视频标签\n\n视频历史记录卡片不展示上架时间。\n\n### 交互规则\n\n点击视频内容卡片进入对应视频详情页。\n\n点击视频标签跳转搜索结果页，并默认选中视频分类。\n\n鼠标悬浮视频卡片时展示选中效果。\n\n### 异常场景\n\n如果视频历史记录为空，展示视频空状态。\n\n如果视频数量不足 25 条，按实际数量展示。\n\n如果封面为空，展示默认封面占位。\n\n如果标题为空，展示默认标题“未命名视频”。\n\n如果播放量为空，展示 0。\n\n如果点赞量为空，展示 0。\n\n如果标签为空，隐藏标签区域。\n\n如果详情链接为空，点击卡片不跳转。\n\n如果历史记录中存在重复内容，需要去重，避免重复展示。\n\n## 分页器\n\n### 展示内容\n\n分页器展示：\n\n- 上一页\n- 页码\n- 下一页\n\n当前页码需要高亮。\n\n### 展示规则\n\n分页器展示在历史记录列表下方。\n\n分页器跟随当前分类记录总数变化。\n\n### 交互规则\n\n点击页码切换到对应页。\n\n点击上一页切换到上一页。\n\n点击下一页切换到下一页。\n\n切换分页后刷新当前列表内容。\n\n分页切换时保留当前分类状态。\n\n### 异常场景\n\n如果当前页为空，默认第 1 页。\n\n如果当前页参数非法，默认第 1 页。\n\n如果当前页大于最大页数，重置为最后一页。\n\n如果当前页为第 1 页，上一页按钮置灰不可点击。\n\n如果当前页为最后一页，下一页按钮置灰不可点击。\n\n如果当前分类历史记录总数为 0，隐藏分页器。\n\n如果分页切换失败，保留当前页内容不变。","html":"\u003ch2>观看历史页\u003c/h2>\n\u003ch3>页面名称\u003c/h3>\n\u003cp>观看历史页\u003c/p>\n\u003ch3>页面用途\u003c/h3>\n\u003cp>观看历史页用于展示当前用户最近浏览过的内容记录，帮助用户快速回看之前访问过的帖子和视频内容。页面支持按内容类型切换，并支持分页查看历史记录。本文档仅描述观看历史页主体内容，不包含全站通用组件。\u003c/p>\n\u003ch3>页面主体结构\u003c/h3>\n\u003cp>观看历史页主体从上至下包含：\u003c/p>\n\u003cul>\n\u003cli>页面标题区域\u003c/li>\n\u003cli>内容分类切换区域\u003c/li>\n\u003cli>历史记录列表\u003c/li>\n\u003cli>分页器\u003c/li>\n\u003c/ul>\n\u003ch3>页面标题区域\u003c/h3>\n\u003ch4>展示内容\u003c/h4>\n\u003cp>页面标题固定展示为：\u003ccode>观看历史\u003c/code>。\u003c/p>\n\u003ch4>展示规则\u003c/h4>\n\u003cp>标题区域只展示页面名称，不展示额外说明文案。\u003c/p>\n\u003ch4>异常场景\u003c/h4>\n\u003cp>如果标题区域渲染失败，默认展示“观看历史”。\u003c/p>\n\u003ch3>内容分类切换区域\u003c/h3>\n\u003ch4>展示内容\u003c/h4>\n\u003cp>分类切换按钮包含：\u003c/p>\n\u003cul>\n\u003cli>帖子\u003c/li>\n\u003cli>视频\u003c/li>\n\u003c/ul>\n\u003cp>默认选中帖子。\u003c/p>\n\u003cp>当前选中的分类按钮需要高亮。\u003c/p>\n\u003ch4>展示规则\u003c/h4>\n\u003cp>分类按钮顺序固定为：帖子、视频。\u003c/p>\n\u003cp>分类按钮始终展示，不因当前分类内容为空而隐藏。\u003c/p>\n\u003ch4>交互规则\u003c/h4>\n\u003cp>点击“帖子”按钮，切换至帖子历史记录列表。\u003c/p>\n\u003cp>点击“视频”按钮，切换至视频历史记录列表。\u003c/p>\n\u003cp>切换分类后，分页重置为第 1 页。\u003c/p>\n\u003cp>切换分类后，当前列表刷新为对应分类的历史记录。\u003c/p>\n\u003cp>分类切换只影响当前页面内容，不影响其他页面状态。\u003c/p>\n\u003ch4>异常场景\u003c/h4>\n\u003cp>如果分类参数为空，默认选中帖子。\u003c/p>\n\u003cp>如果当前分类下没有历史记录，展示对应分类的空状态。\u003c/p>\n\u003cp>如果切换分类失败，保持当前分类不变。\u003c/p>\n\u003ch3>帖子历史记录列表\u003c/h3>\n\u003ch4>展示内容\u003c/h4>\n\u003cp>帖子历史记录列表展示动态内容卡片。\u003c/p>\n\u003cp>列表整体为 5 行 5 列布局。\u003c/p>\n\u003cp>每页最多展示 25 条帖子历史记录。\u003c/p>\n\u003ch4>展示规则\u003c/h4>\n\u003cp>动态内容卡片样式与全局动态内容卡片保持一致。\u003c/p>\n\u003cp>动态卡片封面比例与首页动态内容卡片保持一致。\u003c/p>\n\u003cp>卡片展示内容包括：\u003c/p>\n\u003cul>\n\u003cli>动态封面\u003c/li>\n\u003cli>动态标题\u003c/li>\n\u003cli>发布者信息\u003c/li>\n\u003cli>上架时间\u003c/li>\n\u003cli>动态标签\u003c/li>\n\u003c/ul>\n\u003cp>帖子历史记录列表不展示额外简介文案。\u003c/p>\n\u003cp>帖子历史记录卡片尺寸与帖子列表页保持统一。\u003c/p>\n\u003ch4>交互规则\u003c/h4>\n\u003cp>点击动态内容卡片进入对应动态详情页。\u003c/p>\n\u003cp>点击动态标签跳转搜索结果页，并默认选中帖子分类。\u003c/p>\n\u003cp>鼠标悬浮动态卡片时展示选中效果。\u003c/p>\n\u003ch4>异常场景\u003c/h4>\n\u003cp>如果帖子历史记录为空，展示帖子空状态。\u003c/p>\n\u003cp>如果帖子数量不足 25 条，按实际数量展示。\u003c/p>\n\u003cp>如果封面为空，展示默认封面占位。\u003c/p>\n\u003cp>如果标题为空，展示默认标题“未命名动态”。\u003c/p>\n\u003cp>如果发布者为空，展示默认发布者。\u003c/p>\n\u003cp>如果上架时间为空，隐藏上架时间字段。\u003c/p>\n\u003cp>如果标签为空，隐藏标签区域。\u003c/p>\n\u003cp>如果详情链接为空，点击卡片不跳转。\u003c/p>\n\u003cp>如果历史记录中存在重复内容，需要去重，避免重复展示。\u003c/p>\n\u003ch3>视频历史记录列表\u003c/h3>\n\u003ch4>展示内容\u003c/h4>\n\u003cp>视频历史记录列表展示视频内容卡片。\u003c/p>\n\u003cp>列表整体为 5 行 5 列布局。\u003c/p>\n\u003cp>每页最多展示 25 条视频历史记录。\u003c/p>\n\u003ch4>展示规则\u003c/h4>\n\u003cp>视频内容卡片样式与全局视频内容卡片保持一致。\u003c/p>\n\u003cp>视频封面比例为 16:9。\u003c/p>\n\u003cp>播放量展示在封面左下角。\u003c/p>\n\u003cp>点赞量展示在封面右下角。\u003c/p>\n\u003cp>播放量和点赞量均使用 icon + 数字形式展示。\u003c/p>\n\u003cp>视频卡片展示内容包括：\u003c/p>\n\u003cul>\n\u003cli>视频封面\u003c/li>\n\u003cli>播放量\u003c/li>\n\u003cli>点赞量\u003c/li>\n\u003cli>视频标题\u003c/li>\n\u003cli>视频标签\u003c/li>\n\u003c/ul>\n\u003cp>视频历史记录卡片不展示上架时间。\u003c/p>\n\u003ch4>交互规则\u003c/h4>\n\u003cp>点击视频内容卡片进入对应视频详情页。\u003c/p>\n\u003cp>点击视频标签跳转搜索结果页，并默认选中视频分类。\u003c/p>\n\u003cp>鼠标悬浮视频卡片时展示选中效果。\u003c/p>\n\u003ch4>异常场景\u003c/h4>\n\u003cp>如果视频历史记录为空，展示视频空状态。\u003c/p>\n\u003cp>如果视频数量不足 25 条，按实际数量展示。\u003c/p>\n\u003cp>如果封面为空，展示默认封面占位。\u003c/p>\n\u003cp>如果标题为空，展示默认标题“未命名视频”。\u003c/p>\n\u003cp>如果播放量为空，展示 0。\u003c/p>\n\u003cp>如果点赞量为空，展示 0。\u003c/p>\n\u003cp>如果标签为空，隐藏标签区域。\u003c/p>\n\u003cp>如果详情链接为空，点击卡片不跳转。\u003c/p>\n\u003cp>如果历史记录中存在重复内容，需要去重，避免重复展示。\u003c/p>\n\u003ch3>分页器\u003c/h3>\n\u003ch4>展示内容\u003c/h4>\n\u003cp>分页器展示：\u003c/p>\n\u003cul>\n\u003cli>上一页\u003c/li>\n\u003cli>页码\u003c/li>\n\u003cli>下一页\u003c/li>\n\u003c/ul>\n\u003cp>当前页码需要高亮。\u003c/p>\n\u003ch4>展示规则\u003c/h4>\n\u003cp>分页器展示在历史记录列表下方。\u003c/p>\n\u003cp>分页器跟随当前分类记录总数变化。\u003c/p>\n\u003ch4>交互规则\u003c/h4>\n\u003cp>点击页码切换到对应页。\u003c/p>\n\u003cp>点击上一页切换到上一页。\u003c/p>\n\u003cp>点击下一页切换到下一页。\u003c/p>\n\u003cp>切换分页后刷新当前列表内容。\u003c/p>\n\u003cp>分页切换时保留当前分类状态。\u003c/p>\n\u003ch4>异常场景\u003c/h4>\n\u003cp>如果当前页为空，默认第 1 页。\u003c/p>\n\u003cp>如果当前页参数非法，默认第 1 页。\u003c/p>\n\u003cp>如果当前页大于最大页数，重置为最后一页。\u003c/p>\n\u003cp>如果当前页为第 1 页，上一页按钮置灰不可点击。\u003c/p>\n\u003cp>如果当前页为最后一页，下一页按钮置灰不可点击。\u003c/p>\n\u003cp>如果当前分类历史记录总数为 0，隐藏分页器。\u003c/p>\n\u003cp>如果分页切换失败，保留当前页内容不变。\u003c/p>","lines":233},{"id":"视频内容卡片-33","title":"视频内容卡片","file":"docs/notion-export/ExportBlock-4efbb5e9-6b52-48cb-8bcf-820483b4cd96-Part-1/Y12/视频内容卡片 3497db3145c38006b373f6a3727cb78a.md","raw":"# 视频内容卡片\n\n## **组件名称**\n\n视频内容卡片\n\n## **组件用途**\n\n视频内容卡片用于展示视频类内容，是首页、视频列表页、搜索结果页、全部分类页、观看历史页、我的点赞页和视频详情页推荐区中的通用内容卡片，用于承载视频内容入口。\n\n## **展示内容**\n\n视频内容卡片展示以下内容：\n\n- 视频封面\n- 播放量\n- 点赞量\n- 视频标题\n- 视频标签\n\n## **展示规则**\n\n视频内容卡片样式需要全局统一。\n\n视频封面比例固定为 16:9。\n\n播放量展示在封面左下角。\n\n点赞量展示在封面右下角。\n\n播放量和点赞量均使用 icon + 数字形式展示。\n\n视频标题展示在封面下方内容区域。\n\n视频标签展示在标题下方。\n\n视频卡片不展示上架时间。\n\n标签尺寸需要缩小，并尽量在一行内展示。\n\n视频卡片中的播放量、点赞量、标题和标签在不同页面中保持统一样式。\n\n## **交互规则**\n\n点击视频内容卡片进入视频详情页。\n\n点击视频标签跳转搜索结果页，并默认选中视频分类。\n\n鼠标悬浮视频内容卡片时，展示选中效果。\n\n视频标签支持单独点击，不影响整个卡片点击区域。\n\n## **异常场景**\n\n如果视频封面为空，展示默认封面占位图。\n\n如果视频标题为空，展示默认标题“未命名视频”。\n\n如果播放量为空，展示 0。\n\n如果点赞量为空，展示 0。\n\n如果视频标签为空，隐藏标签区域。\n\n如果视频详情链接为空，点击卡片不跳转。\n\n如果视频标题过长，按组件规则截断，不能撑破卡片布局。\n\n如果播放量或点赞量字段异常，前端按 0 处理。\n\n如果卡片数据重复，列表渲染时需要去重，避免重复展示。\n\n如果视频内容已下架，前端可根据后台返回状态决定隐藏卡片或展示下架态卡片。\n\n如果展示下架态卡片，卡片需要增加“已下架”标识。\n\n下架卡片封面需要做灰度、遮罩或弱化处理。\n\n点击下架卡片时，不进入正常视频详情页。\n\n点击下架卡片后，可提示“该内容已下架”或进入下架提示页。\n\n下架内容的视频标签不再支持跳转。\n\n下架内容的播放量和点赞量可保留静态展示，但不支持相关交互。","html":"\u003ch2>视频内容卡片\u003c/h2>\n\u003ch3>\u003cstrong>组件名称\u003c/strong>\u003c/h3>\n\u003cp>视频内容卡片\u003c/p>\n\u003ch3>\u003cstrong>组件用途\u003c/strong>\u003c/h3>\n\u003cp>视频内容卡片用于展示视频类内容，是首页、视频列表页、搜索结果页、全部分类页、观看历史页、我的点赞页和视频详情页推荐区中的通用内容卡片，用于承载视频内容入口。\u003c/p>\n\u003ch3>\u003cstrong>展示内容\u003c/strong>\u003c/h3>\n\u003cp>视频内容卡片展示以下内容：\u003c/p>\n\u003cul>\n\u003cli>视频封面\u003c/li>\n\u003cli>播放量\u003c/li>\n\u003cli>点赞量\u003c/li>\n\u003cli>视频标题\u003c/li>\n\u003cli>视频标签\u003c/li>\n\u003c/ul>\n\u003ch3>\u003cstrong>展示规则\u003c/strong>\u003c/h3>\n\u003cp>视频内容卡片样式需要全局统一。\u003c/p>\n\u003cp>视频封面比例固定为 16:9。\u003c/p>\n\u003cp>播放量展示在封面左下角。\u003c/p>\n\u003cp>点赞量展示在封面右下角。\u003c/p>\n\u003cp>播放量和点赞量均使用 icon + 数字形式展示。\u003c/p>\n\u003cp>视频标题展示在封面下方内容区域。\u003c/p>\n\u003cp>视频标签展示在标题下方。\u003c/p>\n\u003cp>视频卡片不展示上架时间。\u003c/p>\n\u003cp>标签尺寸需要缩小，并尽量在一行内展示。\u003c/p>\n\u003cp>视频卡片中的播放量、点赞量、标题和标签在不同页面中保持统一样式。\u003c/p>\n\u003ch3>\u003cstrong>交互规则\u003c/strong>\u003c/h3>\n\u003cp>点击视频内容卡片进入视频详情页。\u003c/p>\n\u003cp>点击视频标签跳转搜索结果页，并默认选中视频分类。\u003c/p>\n\u003cp>鼠标悬浮视频内容卡片时，展示选中效果。\u003c/p>\n\u003cp>视频标签支持单独点击，不影响整个卡片点击区域。\u003c/p>\n\u003ch3>\u003cstrong>异常场景\u003c/strong>\u003c/h3>\n\u003cp>如果视频封面为空，展示默认封面占位图。\u003c/p>\n\u003cp>如果视频标题为空，展示默认标题“未命名视频”。\u003c/p>\n\u003cp>如果播放量为空，展示 0。\u003c/p>\n\u003cp>如果点赞量为空，展示 0。\u003c/p>\n\u003cp>如果视频标签为空，隐藏标签区域。\u003c/p>\n\u003cp>如果视频详情链接为空，点击卡片不跳转。\u003c/p>\n\u003cp>如果视频标题过长，按组件规则截断，不能撑破卡片布局。\u003c/p>\n\u003cp>如果播放量或点赞量字段异常，前端按 0 处理。\u003c/p>\n\u003cp>如果卡片数据重复，列表渲染时需要去重，避免重复展示。\u003c/p>\n\u003cp>如果视频内容已下架，前端可根据后台返回状态决定隐藏卡片或展示下架态卡片。\u003c/p>\n\u003cp>如果展示下架态卡片，卡片需要增加“已下架”标识。\u003c/p>\n\u003cp>下架卡片封面需要做灰度、遮罩或弱化处理。\u003c/p>\n\u003cp>点击下架卡片时，不进入正常视频详情页。\u003c/p>\n\u003cp>点击下架卡片后，可提示“该内容已下架”或进入下架提示页。\u003c/p>\n\u003cp>下架内容的视频标签不再支持跳转。\u003c/p>\n\u003cp>下架内容的播放量和点赞量可保留静态展示，但不支持相关交互。\u003c/p>","lines":85},{"id":"视频列表广告-videolisty12-34","title":"视频列表广告：videoListY12","file":"docs/notion-export/ExportBlock-4efbb5e9-6b52-48cb-8bcf-820483b4cd96-Part-1/Y12/视频列表广告：videoListY12 3497db3145c3805193a5d23da87a3fa3.md","raw":"# 视频列表广告：videoListY12\n\n广告标识：videoListY12\n\n### **组件用途**\n\n视频列表广告用于在视频内容流中插入广告卡片。\n\n### **展示规则**\n\n广告卡片插入到视频列表中。\n\n广告尺寸与视频内容卡片一致。\n\n广告封面需要与整个视频内容卡片尺寸一致。\n\n广告名称作为底部浮层展示。\n\n底部浮层透明度为 60%。\n\n### **交互规则**\n\n点击广告卡片跳转广告链接。\n\n鼠标悬浮广告卡片时展示选中效果。\n\n### **异常场景**\n\n如果广告为空，不插入广告卡片。\n\n如果广告封面为空，展示默认广告封面。\n\n如果广告名称为空，展示“广告位”。\n\n如果广告链接为空，点击不跳转。","html":"\u003ch2>视频列表广告：videoListY12\u003c/h2>\n\u003cp>广告标识：videoListY12\u003c/p>\n\u003ch4>\u003cstrong>组件用途\u003c/strong>\u003c/h4>\n\u003cp>视频列表广告用于在视频内容流中插入广告卡片。\u003c/p>\n\u003ch4>\u003cstrong>展示规则\u003c/strong>\u003c/h4>\n\u003cp>广告卡片插入到视频列表中。\u003c/p>\n\u003cp>广告尺寸与视频内容卡片一致。\u003c/p>\n\u003cp>广告封面需要与整个视频内容卡片尺寸一致。\u003c/p>\n\u003cp>广告名称作为底部浮层展示。\u003c/p>\n\u003cp>底部浮层透明度为 60%。\u003c/p>\n\u003ch4>\u003cstrong>交互规则\u003c/strong>\u003c/h4>\n\u003cp>点击广告卡片跳转广告链接。\u003c/p>\n\u003cp>鼠标悬浮广告卡片时展示选中效果。\u003c/p>\n\u003ch4>\u003cstrong>异常场景\u003c/strong>\u003c/h4>\n\u003cp>如果广告为空，不插入广告卡片。\u003c/p>\n\u003cp>如果广告封面为空，展示默认广告封面。\u003c/p>\n\u003cp>如果广告名称为空，展示“广告位”。\u003c/p>\n\u003cp>如果广告链接为空，点击不跳转。\u003c/p>","lines":35},{"id":"视频列表页-35","title":"视频列表页","file":"docs/notion-export/ExportBlock-4efbb5e9-6b52-48cb-8bcf-820483b4cd96-Part-1/Y12/视频列表页 3497db3145c38056bd0ee8246a7d53ca.md","raw":"# 视频列表页\n\n## **页面名称**\n\n视频列表页\n\n## **页面用途**\n\n视频列表页用于展示视频类内容列表，承接顶部菜单中的视频类菜单跳转和封面页中视频类内容的“查看更多”入口。页面支持排序、分页、广告插入和内容卡片跳转。本文档仅描述视频列表页主体内容，不包含全站通用组件。\n\n## **页面主体结构**\n\n视频列表页主体从上至下包含：\n\n- 当前菜单名称展示区域\n- 排序筛选区域\n- 视频内容列表\n- 分页器\n\n## **当前菜单名称展示区域**\n\n### **展示内容**\n\n- 展示当前菜单名称。\n- 页面标题区域显示为当前菜单名称，而不是固定写死“视频列表页”。\n\n### **展示规则**\n\n- 如果当前菜单为视频类菜单，则页面标题展示对应菜单名称。\n- 例如：一级菜单B（视频）、一级菜单C（视频）、一级菜单D（视频）。\n- 标题区域只展示菜单名称，不展示额外说明文案。\n\n### **异常场景**\n\n- 如果菜单名称为空，展示默认标题“视频列表”。\n- 如果菜单参数解析失败，展示默认标题“视频列表”。\n- 如果后台未返回菜单名称，使用 URL 参数或默认标题兜底。\n\n## **排序筛选区域**\n\n### **展示内容**\n\n排序按钮包含：\n\n- 最新上架\n- 最多点赞\n- 最多观看\n- 随机展示\n\n默认选中最新上架。\n\n当前选中的排序按钮需要高亮。\n\n### **交互规则**\n\n- 点击排序按钮后，列表按对应规则刷新。\n- 切换排序时，同步更新 URL 参数中的 sort。\n- 切换排序后，分页重置为第 1 页。\n- 排序按钮只影响当前视频列表内容。\n\n### **异常场景**\n\n- 如果排序接口请求失败，保留当前列表并提示加载失败。\n- 如果某个排序字段缺失，按默认排序或接口返回顺序展示。\n- 如果随机展示无新数据，仍保持当前排序按钮选中态。\n\n## **视频内容列表**\n\n### **展示内容**\n\n- 视频列表展示视频内容卡片。\n- 列表整体为 5 行 5 列布局。\n- 每页最多展示 25 条视频数据。\n- 列表中可插入一条广告位。\n- 广告位尺寸与视频内容卡片保持一致。\n\n### **数据来源**\n\n- 视频列表数据由后台返回。\n- 后台返回内容包括视频 ID、封面、标题、播放量、点赞量、标签、详情链接等。\n- 广告数据由后台返回。\n\n### **展示规则**\n\n- 视频内容卡片样式与全局视频内容卡片保持一致。\n- 视频封面比例为 16:9。\n- 播放量展示在封面左下角。\n- 点赞量展示在封面右下角。\n- 播放量和点赞量均使用 icon + 数字形式展示。\n- 视频卡片展示内容包括：视频封面、播放量、点赞量、视频标题、视频标签。\n- 视频卡片不展示上架时间。\n- 列表中的广告卡片使用独立广告样式，尺寸与视频卡片一致。\n- 广告封面需要与整个视频内容卡片尺寸一致。\n- 广告名称作为底部浮层显示。\n- 底部浮层透明度为 60%。\n\n### **交互规则**\n\n点击视频内容卡片进入视频详情页。\n\n点击视频标签跳转搜索结果页，并默认选中视频分类。\n\n鼠标悬浮视频卡片时展示选中效果。\n\n点击广告卡片跳转后台配置广告链接。\n\n如果广告链接为空，点击广告卡片不跳转。\n\n### **异常场景**\n\n- 如果视频列表为空，展示空状态。\n- 如果视频数据不足 25 条，按实际数量展示。\n- 如果封面为空，展示默认封面占位。\n- 如果标题为空，展示默认标题“未命名视频”。\n- 如果播放量为空，展示 0。\n- 如果点赞量为空，展示 0。\n- 如果标签为空，隐藏标签区域。\n- 如果详情链接为空，点击卡片不跳转。\n- 如果后台返回重复视频 ID，需要去重，避免重复卡片。\n- 如果广告数据为空，不插入广告卡片。\n- 如果广告封面加载失败，展示默认广告占位图。\n- 如果广告名称为空，展示默认名称“广告位”。\n- 如果广告链接异常，点击广告卡片不跳转。\n- 如果广告插入位置数据异常，默认插入到当前页中部或固定位置。\n\n## **分页器**\n\n### **展示内容**\n\n分页器展示：\n\n- 上一页\n- 页码\n- 下一页\n\n当前页码高亮。\n\n### **交互规则**\n\n- 点击页码切换到对应页。\n- 点击上一页切换到上一页。\n- 点击下一页切换到下一页。\n- 切换分页时，同步更新 URL 参数中的 page。\n- 分页切换后刷新当前列表数据。\n\n### **异常场景**\n\n- 如果当前页超过最大页数，重置为最后一页。\n- 如果当前页为第 1 页，上一页按钮置灰不可点击。\n- 如果当前页为最后一页，下一页按钮置灰不可点击。\n- 如果视频总数为 0，隐藏分页器。\n- 如果分页接口加载失败，保留当前页内容并提示加载失败。","html":"\u003ch2>视频列表页\u003c/h2>\n\u003ch3>\u003cstrong>页面名称\u003c/strong>\u003c/h3>\n\u003cp>视频列表页\u003c/p>\n\u003ch3>\u003cstrong>页面用途\u003c/strong>\u003c/h3>\n\u003cp>视频列表页用于展示视频类内容列表，承接顶部菜单中的视频类菜单跳转和封面页中视频类内容的“查看更多”入口。页面支持排序、分页、广告插入和内容卡片跳转。本文档仅描述视频列表页主体内容，不包含全站通用组件。\u003c/p>\n\u003ch3>\u003cstrong>页面主体结构\u003c/strong>\u003c/h3>\n\u003cp>视频列表页主体从上至下包含：\u003c/p>\n\u003cul>\n\u003cli>当前菜单名称展示区域\u003c/li>\n\u003cli>排序筛选区域\u003c/li>\n\u003cli>视频内容列表\u003c/li>\n\u003cli>分页器\u003c/li>\n\u003c/ul>\n\u003ch3>\u003cstrong>当前菜单名称展示区域\u003c/strong>\u003c/h3>\n\u003ch4>\u003cstrong>展示内容\u003c/strong>\u003c/h4>\n\u003cul>\n\u003cli>展示当前菜单名称。\u003c/li>\n\u003cli>页面标题区域显示为当前菜单名称，而不是固定写死“视频列表页”。\u003c/li>\n\u003c/ul>\n\u003ch4>\u003cstrong>展示规则\u003c/strong>\u003c/h4>\n\u003cul>\n\u003cli>如果当前菜单为视频类菜单，则页面标题展示对应菜单名称。\u003c/li>\n\u003cli>例如：一级菜单B（视频）、一级菜单C（视频）、一级菜单D（视频）。\u003c/li>\n\u003cli>标题区域只展示菜单名称，不展示额外说明文案。\u003c/li>\n\u003c/ul>\n\u003ch4>\u003cstrong>异常场景\u003c/strong>\u003c/h4>\n\u003cul>\n\u003cli>如果菜单名称为空，展示默认标题“视频列表”。\u003c/li>\n\u003cli>如果菜单参数解析失败，展示默认标题“视频列表”。\u003c/li>\n\u003cli>如果后台未返回菜单名称，使用 URL 参数或默认标题兜底。\u003c/li>\n\u003c/ul>\n\u003ch3>\u003cstrong>排序筛选区域\u003c/strong>\u003c/h3>\n\u003ch4>\u003cstrong>展示内容\u003c/strong>\u003c/h4>\n\u003cp>排序按钮包含：\u003c/p>\n\u003cul>\n\u003cli>最新上架\u003c/li>\n\u003cli>最多点赞\u003c/li>\n\u003cli>最多观看\u003c/li>\n\u003cli>随机展示\u003c/li>\n\u003c/ul>\n\u003cp>默认选中最新上架。\u003c/p>\n\u003cp>当前选中的排序按钮需要高亮。\u003c/p>\n\u003ch4>\u003cstrong>交互规则\u003c/strong>\u003c/h4>\n\u003cul>\n\u003cli>点击排序按钮后，列表按对应规则刷新。\u003c/li>\n\u003cli>切换排序时，同步更新 URL 参数中的 sort。\u003c/li>\n\u003cli>切换排序后，分页重置为第 1 页。\u003c/li>\n\u003cli>排序按钮只影响当前视频列表内容。\u003c/li>\n\u003c/ul>\n\u003ch4>\u003cstrong>异常场景\u003c/strong>\u003c/h4>\n\u003cul>\n\u003cli>如果排序接口请求失败，保留当前列表并提示加载失败。\u003c/li>\n\u003cli>如果某个排序字段缺失，按默认排序或接口返回顺序展示。\u003c/li>\n\u003cli>如果随机展示无新数据，仍保持当前排序按钮选中态。\u003c/li>\n\u003c/ul>\n\u003ch3>\u003cstrong>视频内容列表\u003c/strong>\u003c/h3>\n\u003ch4>\u003cstrong>展示内容\u003c/strong>\u003c/h4>\n\u003cul>\n\u003cli>视频列表展示视频内容卡片。\u003c/li>\n\u003cli>列表整体为 5 行 5 列布局。\u003c/li>\n\u003cli>每页最多展示 25 条视频数据。\u003c/li>\n\u003cli>列表中可插入一条广告位。\u003c/li>\n\u003cli>广告位尺寸与视频内容卡片保持一致。\u003c/li>\n\u003c/ul>\n\u003ch4>\u003cstrong>数据来源\u003c/strong>\u003c/h4>\n\u003cul>\n\u003cli>视频列表数据由后台返回。\u003c/li>\n\u003cli>后台返回内容包括视频 ID、封面、标题、播放量、点赞量、标签、详情链接等。\u003c/li>\n\u003cli>广告数据由后台返回。\u003c/li>\n\u003c/ul>\n\u003ch4>\u003cstrong>展示规则\u003c/strong>\u003c/h4>\n\u003cul>\n\u003cli>视频内容卡片样式与全局视频内容卡片保持一致。\u003c/li>\n\u003cli>视频封面比例为 16:9。\u003c/li>\n\u003cli>播放量展示在封面左下角。\u003c/li>\n\u003cli>点赞量展示在封面右下角。\u003c/li>\n\u003cli>播放量和点赞量均使用 icon + 数字形式展示。\u003c/li>\n\u003cli>视频卡片展示内容包括：视频封面、播放量、点赞量、视频标题、视频标签。\u003c/li>\n\u003cli>视频卡片不展示上架时间。\u003c/li>\n\u003cli>列表中的广告卡片使用独立广告样式，尺寸与视频卡片一致。\u003c/li>\n\u003cli>广告封面需要与整个视频内容卡片尺寸一致。\u003c/li>\n\u003cli>广告名称作为底部浮层显示。\u003c/li>\n\u003cli>底部浮层透明度为 60%。\u003c/li>\n\u003c/ul>\n\u003ch4>\u003cstrong>交互规则\u003c/strong>\u003c/h4>\n\u003cp>点击视频内容卡片进入视频详情页。\u003c/p>\n\u003cp>点击视频标签跳转搜索结果页，并默认选中视频分类。\u003c/p>\n\u003cp>鼠标悬浮视频卡片时展示选中效果。\u003c/p>\n\u003cp>点击广告卡片跳转后台配置广告链接。\u003c/p>\n\u003cp>如果广告链接为空，点击广告卡片不跳转。\u003c/p>\n\u003ch4>\u003cstrong>异常场景\u003c/strong>\u003c/h4>\n\u003cul>\n\u003cli>如果视频列表为空，展示空状态。\u003c/li>\n\u003cli>如果视频数据不足 25 条，按实际数量展示。\u003c/li>\n\u003cli>如果封面为空，展示默认封面占位。\u003c/li>\n\u003cli>如果标题为空，展示默认标题“未命名视频”。\u003c/li>\n\u003cli>如果播放量为空，展示 0。\u003c/li>\n\u003cli>如果点赞量为空，展示 0。\u003c/li>\n\u003cli>如果标签为空，隐藏标签区域。\u003c/li>\n\u003cli>如果详情链接为空，点击卡片不跳转。\u003c/li>\n\u003cli>如果后台返回重复视频 ID，需要去重，避免重复卡片。\u003c/li>\n\u003cli>如果广告数据为空，不插入广告卡片。\u003c/li>\n\u003cli>如果广告封面加载失败，展示默认广告占位图。\u003c/li>\n\u003cli>如果广告名称为空，展示默认名称“广告位”。\u003c/li>\n\u003cli>如果广告链接异常，点击广告卡片不跳转。\u003c/li>\n\u003cli>如果广告插入位置数据异常，默认插入到当前页中部或固定位置。\u003c/li>\n\u003c/ul>\n\u003ch3>\u003cstrong>分页器\u003c/strong>\u003c/h3>\n\u003ch4>\u003cstrong>展示内容\u003c/strong>\u003c/h4>\n\u003cp>分页器展示：\u003c/p>\n\u003cul>\n\u003cli>上一页\u003c/li>\n\u003cli>页码\u003c/li>\n\u003cli>下一页\u003c/li>\n\u003c/ul>\n\u003cp>当前页码高亮。\u003c/p>\n\u003ch4>\u003cstrong>交互规则\u003c/strong>\u003c/h4>\n\u003cul>\n\u003cli>点击页码切换到对应页。\u003c/li>\n\u003cli>点击上一页切换到上一页。\u003c/li>\n\u003cli>点击下一页切换到下一页。\u003c/li>\n\u003cli>切换分页时，同步更新 URL 参数中的 page。\u003c/li>\n\u003cli>分页切换后刷新当前列表数据。\u003c/li>\n\u003c/ul>\n\u003ch4>\u003cstrong>异常场景\u003c/strong>\u003c/h4>\n\u003cul>\n\u003cli>如果当前页超过最大页数，重置为最后一页。\u003c/li>\n\u003cli>如果当前页为第 1 页，上一页按钮置灰不可点击。\u003c/li>\n\u003cli>如果当前页为最后一页，下一页按钮置灰不可点击。\u003c/li>\n\u003cli>如果视频总数为 0，隐藏分页器。\u003c/li>\n\u003cli>如果分页接口加载失败，保留当前页内容并提示加载失败。\u003c/li>\n\u003c/ul>","lines":152},{"id":"视频播放流程-36","title":"视频播放流程","file":"docs/notion-export/ExportBlock-4efbb5e9-6b52-48cb-8bcf-820483b4cd96-Part-1/Y12/视频播放流程 3497db3145c380ee9e33deca7518da74.md","raw":"# 视频播放流程\n\n![视频播放流程图.png](%E8%A7%86%E9%A2%91%E6%92%AD%E6%94%BE%E6%B5%81%E7%A8%8B/%E8%A7%86%E9%A2%91%E6%92%AD%E6%94%BE%E6%B5%81%E7%A8%8B%E5%9B%BE.png)\n\n# 视频播放流程文字版\n\n## 进入播放页\n\n用户进入视频播放页后，视频开始加载。\n\n系统判断视频是否在 10 秒内加载成功。\n\n如果 10 秒内加载失败：\n\n- 视频画面区域显示加载失败。\n- 展示“重试”按钮。\n- 用户点击“重试”后，重新进入视频加载流程。\n\n如果 10 秒内加载成功：\n\n- 视频自动开始播放。\n- 系统继续判断用户是否拥有完整观看权限。\n\n## 完整观看权限判断\n\n系统判断用户是否拥有当前视频的完整观看权限。\n\n如果用户拥有完整观看权限：\n\n- 直接播放完整视频。\n- 播放过程中进度条显示完整视频播放进度。\n- 视频播放完成后，播放结束。\n\n如果用户没有完整观看权限：\n\n- 进入 20 秒预览播放。\n\n## 20 秒预览播放\n\n进入 20 秒预览播放后：\n\n- 预览倒计时开始递减。\n- 倒计时递减至 `00:00`。\n- 预览期间页面提供付费引导入口。\n\n系统判断用户在预览过程中是否点击付费引导入口。\n\n如果用户点击付费引导入口：\n\n- 进入当前视频解锁类型判断。\n\n如果用户未点击付费引导入口：\n\n- 继续播放至预览结束。\n- 预览播放完成，20 秒结束。\n- 视频停止播放。\n- 视频画布区域显示未付费覆盖层。\n- 覆盖层包含：开通会员、购买解锁、重新播放。\n\n## 未付费覆盖层操作\n\n预览结束后，视频区域显示未付费覆盖层。\n\n用户可选择以下操作：\n\n如果用户点击“开通会员”：\n\n- 进入会员开通流程。\n- 流程结束。\n\n如果用户点击“购买解锁”：\n\n- 进入付费引导 / 购买解锁流程。\n- 根据当前视频解锁类型继续判断。\n\n如果用户点击“重新播放”：\n\n- 重置预览状态。\n- 重新进入 20 秒预览播放。\n\n如果用户不进行任何操作：\n\n- 停留在未付费覆盖层。\n\n## 当前视频解锁类型判断\n\n当用户点击付费引导入口或购买解锁后，系统判断当前视频的解锁类型。\n\n解锁类型包括：\n\n- 金币付费解锁\n- 会员解锁\n- 等级解锁\n\n## 金币付费解锁流程\n\n如果当前视频为金币付费解锁，系统判断是否同时存在金币价格和 VIP 折扣价。\n\n如果同时存在金币价和 VIP 折扣价：\n\n- 系统继续判断当前用户是否为会员。\n\n如果当前用户不是会员：\n\n- 展示金币付费弹窗或覆盖层。\n- 展示开通会员按钮。\n- 展示金币原价。\n- 展示 VIP 折扣价。\n- 支付按钮按金币原价支付。\n\n如果当前用户是会员：\n\n- 展示金币付费弹窗或覆盖层。\n- 展示 VIP 折扣价。\n- 支付按钮按 VIP 折扣价支付。\n\n如果不同时存在金币价和 VIP 折扣价：\n\n- 展示金币付费弹窗或覆盖层。\n- 仅展示金币原价。\n- 展示金币支付按钮。\n\n用户完成支付后：\n\n- 判断用户是否支付成功。\n\n如果支付成功：\n\n- 用户完成支付解锁。\n- 重新播放本视频。\n- 播放完整视频。\n- 播放完成后结束。\n\n如果支付失败或取消：\n\n- 弹窗关闭。\n- 用户再次点击付费引导入口时，重新显示付费覆盖层。\n- 流程结束或等待用户重新操作。\n\n## 会员解锁流程\n\n如果当前视频为会员解锁：\n\n- 弹出会员购买弹窗。\n- 用户进行会员开通操作。\n\n系统判断用户是否开通会员成功。\n\n如果开通会员成功：\n\n- 弹窗关闭。\n- 重新播放本视频。\n- 播放完整视频。\n- 播放完成后结束。\n\n如果开通会员失败或取消：\n\n- 关闭弹窗或继续预览播放。\n- 预览结束后，进入未付费覆盖层。\n\n## 等级解锁流程\n\n如果当前视频为等级解锁：\n\n- 弹出会员弹窗。\n- 用户进行会员开通或等级相关操作。\n\n系统判断用户是否开通会员成功。\n\n如果开通会员成功：\n\n- 弹窗关闭。\n- 重新播放本视频。\n- 播放完整视频。\n- 播放完成后结束。\n\n如果开通会员失败或取消：\n\n- 关闭弹窗或继续预览播放。\n- 预览结束后，进入未付费覆盖层。\n\n## 预览结束后的覆盖层流程\n\n当预览播放完成且用户仍未完成解锁时：\n\n- 视频停止播放。\n- 视频画布区域显示未付费覆盖层。\n- 覆盖层包含：开通会员、购买解锁、重新播放。\n\n用户点击“开通会员”：\n\n- 进入会员开通流程。\n- 成功后可重新播放完整视频。\n- 失败或取消则结束或返回覆盖层。\n\n用户点击“购买解锁”：\n\n- 进入对应的购买解锁流程。\n- 根据视频解锁类型处理金币、会员或等级解锁。\n\n用户点击“重新播放”：\n\n- 重置预览状态。\n- 重新进入 20 秒预览播放。\n\n## 播放完成流程\n\n当用户拥有完整观看权限，或完成付费 / 会员 / 等级解锁后：\n\n- 播放完整视频。\n- 进度条显示完整视频播放进度。\n- 视频播放结束。\n- 流程结束。","html":"\u003ch2>视频播放流程\u003c/h2>\n\u003cp>![视频播放流程图.png](%E8%A7%86%E9%A2%91%E6%92%AD%E6%94%BE%E6%B5%81%E7%A8%8B/%E8%A7%86%E9%A2%91%E6%92%AD%E6%94%BE%E6%B5%81%E7%A8%8B%E5%9B%BE.png)\u003c/p>\n\u003ch2>视频播放流程文字版\u003c/h2>\n\u003ch3>进入播放页\u003c/h3>\n\u003cp>用户进入视频播放页后，视频开始加载。\u003c/p>\n\u003cp>系统判断视频是否在 10 秒内加载成功。\u003c/p>\n\u003cp>如果 10 秒内加载失败：\u003c/p>\n\u003cul>\n\u003cli>视频画面区域显示加载失败。\u003c/li>\n\u003cli>展示“重试”按钮。\u003c/li>\n\u003cli>用户点击“重试”后，重新进入视频加载流程。\u003c/li>\n\u003c/ul>\n\u003cp>如果 10 秒内加载成功：\u003c/p>\n\u003cul>\n\u003cli>视频自动开始播放。\u003c/li>\n\u003cli>系统继续判断用户是否拥有完整观看权限。\u003c/li>\n\u003c/ul>\n\u003ch3>完整观看权限判断\u003c/h3>\n\u003cp>系统判断用户是否拥有当前视频的完整观看权限。\u003c/p>\n\u003cp>如果用户拥有完整观看权限：\u003c/p>\n\u003cul>\n\u003cli>直接播放完整视频。\u003c/li>\n\u003cli>播放过程中进度条显示完整视频播放进度。\u003c/li>\n\u003cli>视频播放完成后，播放结束。\u003c/li>\n\u003c/ul>\n\u003cp>如果用户没有完整观看权限：\u003c/p>\n\u003cul>\n\u003cli>进入 20 秒预览播放。\u003c/li>\n\u003c/ul>\n\u003ch3>20 秒预览播放\u003c/h3>\n\u003cp>进入 20 秒预览播放后：\u003c/p>\n\u003cul>\n\u003cli>预览倒计时开始递减。\u003c/li>\n\u003cli>倒计时递减至 \u003ccode>00:00\u003c/code>。\u003c/li>\n\u003cli>预览期间页面提供付费引导入口。\u003c/li>\n\u003c/ul>\n\u003cp>系统判断用户在预览过程中是否点击付费引导入口。\u003c/p>\n\u003cp>如果用户点击付费引导入口：\u003c/p>\n\u003cul>\n\u003cli>进入当前视频解锁类型判断。\u003c/li>\n\u003c/ul>\n\u003cp>如果用户未点击付费引导入口：\u003c/p>\n\u003cul>\n\u003cli>继续播放至预览结束。\u003c/li>\n\u003cli>预览播放完成，20 秒结束。\u003c/li>\n\u003cli>视频停止播放。\u003c/li>\n\u003cli>视频画布区域显示未付费覆盖层。\u003c/li>\n\u003cli>覆盖层包含：开通会员、购买解锁、重新播放。\u003c/li>\n\u003c/ul>\n\u003ch3>未付费覆盖层操作\u003c/h3>\n\u003cp>预览结束后，视频区域显示未付费覆盖层。\u003c/p>\n\u003cp>用户可选择以下操作：\u003c/p>\n\u003cp>如果用户点击“开通会员”：\u003c/p>\n\u003cul>\n\u003cli>进入会员开通流程。\u003c/li>\n\u003cli>流程结束。\u003c/li>\n\u003c/ul>\n\u003cp>如果用户点击“购买解锁”：\u003c/p>\n\u003cul>\n\u003cli>进入付费引导 / 购买解锁流程。\u003c/li>\n\u003cli>根据当前视频解锁类型继续判断。\u003c/li>\n\u003c/ul>\n\u003cp>如果用户点击“重新播放”：\u003c/p>\n\u003cul>\n\u003cli>重置预览状态。\u003c/li>\n\u003cli>重新进入 20 秒预览播放。\u003c/li>\n\u003c/ul>\n\u003cp>如果用户不进行任何操作：\u003c/p>\n\u003cul>\n\u003cli>停留在未付费覆盖层。\u003c/li>\n\u003c/ul>\n\u003ch3>当前视频解锁类型判断\u003c/h3>\n\u003cp>当用户点击付费引导入口或购买解锁后，系统判断当前视频的解锁类型。\u003c/p>\n\u003cp>解锁类型包括：\u003c/p>\n\u003cul>\n\u003cli>金币付费解锁\u003c/li>\n\u003cli>会员解锁\u003c/li>\n\u003cli>等级解锁\u003c/li>\n\u003c/ul>\n\u003ch3>金币付费解锁流程\u003c/h3>\n\u003cp>如果当前视频为金币付费解锁，系统判断是否同时存在金币价格和 VIP 折扣价。\u003c/p>\n\u003cp>如果同时存在金币价和 VIP 折扣价：\u003c/p>\n\u003cul>\n\u003cli>系统继续判断当前用户是否为会员。\u003c/li>\n\u003c/ul>\n\u003cp>如果当前用户不是会员：\u003c/p>\n\u003cul>\n\u003cli>展示金币付费弹窗或覆盖层。\u003c/li>\n\u003cli>展示开通会员按钮。\u003c/li>\n\u003cli>展示金币原价。\u003c/li>\n\u003cli>展示 VIP 折扣价。\u003c/li>\n\u003cli>支付按钮按金币原价支付。\u003c/li>\n\u003c/ul>\n\u003cp>如果当前用户是会员：\u003c/p>\n\u003cul>\n\u003cli>展示金币付费弹窗或覆盖层。\u003c/li>\n\u003cli>展示 VIP 折扣价。\u003c/li>\n\u003cli>支付按钮按 VIP 折扣价支付。\u003c/li>\n\u003c/ul>\n\u003cp>如果不同时存在金币价和 VIP 折扣价：\u003c/p>\n\u003cul>\n\u003cli>展示金币付费弹窗或覆盖层。\u003c/li>\n\u003cli>仅展示金币原价。\u003c/li>\n\u003cli>展示金币支付按钮。\u003c/li>\n\u003c/ul>\n\u003cp>用户完成支付后：\u003c/p>\n\u003cul>\n\u003cli>判断用户是否支付成功。\u003c/li>\n\u003c/ul>\n\u003cp>如果支付成功：\u003c/p>\n\u003cul>\n\u003cli>用户完成支付解锁。\u003c/li>\n\u003cli>重新播放本视频。\u003c/li>\n\u003cli>播放完整视频。\u003c/li>\n\u003cli>播放完成后结束。\u003c/li>\n\u003c/ul>\n\u003cp>如果支付失败或取消：\u003c/p>\n\u003cul>\n\u003cli>弹窗关闭。\u003c/li>\n\u003cli>用户再次点击付费引导入口时，重新显示付费覆盖层。\u003c/li>\n\u003cli>流程结束或等待用户重新操作。\u003c/li>\n\u003c/ul>\n\u003ch3>会员解锁流程\u003c/h3>\n\u003cp>如果当前视频为会员解锁：\u003c/p>\n\u003cul>\n\u003cli>弹出会员购买弹窗。\u003c/li>\n\u003cli>用户进行会员开通操作。\u003c/li>\n\u003c/ul>\n\u003cp>系统判断用户是否开通会员成功。\u003c/p>\n\u003cp>如果开通会员成功：\u003c/p>\n\u003cul>\n\u003cli>弹窗关闭。\u003c/li>\n\u003cli>重新播放本视频。\u003c/li>\n\u003cli>播放完整视频。\u003c/li>\n\u003cli>播放完成后结束。\u003c/li>\n\u003c/ul>\n\u003cp>如果开通会员失败或取消：\u003c/p>\n\u003cul>\n\u003cli>关闭弹窗或继续预览播放。\u003c/li>\n\u003cli>预览结束后，进入未付费覆盖层。\u003c/li>\n\u003c/ul>\n\u003ch3>等级解锁流程\u003c/h3>\n\u003cp>如果当前视频为等级解锁：\u003c/p>\n\u003cul>\n\u003cli>弹出会员弹窗。\u003c/li>\n\u003cli>用户进行会员开通或等级相关操作。\u003c/li>\n\u003c/ul>\n\u003cp>系统判断用户是否开通会员成功。\u003c/p>\n\u003cp>如果开通会员成功：\u003c/p>\n\u003cul>\n\u003cli>弹窗关闭。\u003c/li>\n\u003cli>重新播放本视频。\u003c/li>\n\u003cli>播放完整视频。\u003c/li>\n\u003cli>播放完成后结束。\u003c/li>\n\u003c/ul>\n\u003cp>如果开通会员失败或取消：\u003c/p>\n\u003cul>\n\u003cli>关闭弹窗或继续预览播放。\u003c/li>\n\u003cli>预览结束后，进入未付费覆盖层。\u003c/li>\n\u003c/ul>\n\u003ch3>预览结束后的覆盖层流程\u003c/h3>\n\u003cp>当预览播放完成且用户仍未完成解锁时：\u003c/p>\n\u003cul>\n\u003cli>视频停止播放。\u003c/li>\n\u003cli>视频画布区域显示未付费覆盖层。\u003c/li>\n\u003cli>覆盖层包含：开通会员、购买解锁、重新播放。\u003c/li>\n\u003c/ul>\n\u003cp>用户点击“开通会员”：\u003c/p>\n\u003cul>\n\u003cli>进入会员开通流程。\u003c/li>\n\u003cli>成功后可重新播放完整视频。\u003c/li>\n\u003cli>失败或取消则结束或返回覆盖层。\u003c/li>\n\u003c/ul>\n\u003cp>用户点击“购买解锁”：\u003c/p>\n\u003cul>\n\u003cli>进入对应的购买解锁流程。\u003c/li>\n\u003cli>根据视频解锁类型处理金币、会员或等级解锁。\u003c/li>\n\u003c/ul>\n\u003cp>用户点击“重新播放”：\u003c/p>\n\u003cul>\n\u003cli>重置预览状态。\u003c/li>\n\u003cli>重新进入 20 秒预览播放。\u003c/li>\n\u003c/ul>\n\u003ch3>播放完成流程\u003c/h3>\n\u003cp>当用户拥有完整观看权限，或完成付费 / 会员 / 等级解锁后：\u003c/p>\n\u003cul>\n\u003cli>播放完整视频。\u003c/li>\n\u003cli>进度条显示完整视频播放进度。\u003c/li>\n\u003cli>视频播放结束。\u003c/li>\n\u003cli>流程结束。\u003c/li>\n\u003c/ul>","lines":213},{"id":"视频组件通用规则-37","title":"视频组件通用规则","file":"docs/notion-export/ExportBlock-4efbb5e9-6b52-48cb-8bcf-820483b4cd96-Part-1/Y12/视频组件通用规则 3497db3145c3802c8068fa987295428b.md","raw":"# 视频组件通用规则\n\n一、需求背景\n\n当前平台 Web 双端、iOS-H5、App 端的 20 秒视频预览进度栏存在计时方式不统一问题（部分正计时、部分倒计时）。为规范三端交互逻辑，特统一 20 秒预览视频进度栏的计时规则。\n\n二、**核心目标**\n\n1.统一三端20秒视频预览进度栏的计时展示逻辑\n\n2.保证进度栏交互逻辑三端一致\n\n三、核心规则\n\n1.计时方式统一要求\n\n| 维度 | 具体规则 |\n| --- | --- |\n| 计时模式 | **强制采用倒计时模式，禁止使用正计时** |\n| 显示格式 | 显示区：仅展示「剩余时长」，格式为 XX:XX（例：初始 00:20 → 播放中 00:15 → 结束 00:00）； |\n| 进度条样式 | 1.填充方向：**从左至右**随播放进度填充；\n2.进度比例：进度条进度（滑块位置）与剩余时长实时对应（如剩余10秒时进度栏填充50%，剩余5秒时填充75%，以此类推） |\n\n2.交互逻辑统一要求\n\n| 操作场景 | 交互规则 |\n| --- | --- |\n| 预览视频播放 | 1.自动播放时，倒计时从00:20 实时递减至00:00\n2.暂停播放时，倒计时冻结在当前剩余时长\n3.播放结束后，倒计时固定显示00:00，进度条完全填充，**禁止自动重播**\n4 预览结束即刻弹出充值引导弹窗\n5.关闭弹窗后，页面暂停，用户可自行点击播放按钮进行重复预览，预览结束后走3.4.5逻辑 |\n| 进度条拖拽 | 预览视频进度条**禁止**拖拽，进度条仅展示播放进度，无交互 |\n| 重复播放操作 | 点击「播放」按钮后，倒计时重置为00:00，进度条清空并重新开始填充 |\n\n3.边界问题补充\n\n| 场景 | 规则 |\n| --- | --- |\n| 网络卡顿/加载 | 视频加载中，倒计时显示00:20，进度条无填充；加载完成自动播放后，倒计时开始递减 |\n| 未登录用户观看预览视频，结束后登录 | 1.登录后立即校验用户身份及视频计费模式；\n2.若用户具备完整视频观看权限（如已解锁/会员/等级满足）；\n立即播放完整视频；\n进度栏从倒计时模式切换为正计时模式；\n正计时初始显示\nweb：完整视频总时长\n安卓/ios：00:00 /完整视频总时长（例：00:00/06:59）\n进度条清空并重新从00:00开始填充；\n3. 若用户无完整视频观看权限：继续播放预览视频，倒计时和进度条保持原有逻辑 |\n| 已登录用户解锁视频 | 立即播放完整视频；\n进度栏从倒计时模式切换为正计时模式；\n正计时初始显示\nweb：完整视频总时长\n安卓/ios：00:00 /完整视频总时长（例：00:00/06:59）\n进度条清空并重新从00:00开始填充； |\n| 预览中点击引导付费按钮 | **1.Web端：**\n点击后立即弹出付费弹窗；\n弹窗弹出后，预览视频持续播放，直至倒计时至00:00结束；\n视频结束后按通用规则弹出充值引导弹窗；\n关闭付费弹窗后，视频仍按原进度播放（未结束则继续，已结束则停留在00:00）。\n**2.安卓/IOS-H5**\n点击后立即弹出付费弹窗；\n弹窗弹出后，预览视频持续播放，直至倒计时至00:00结束；\n若用户点击弹窗内按钮跳转至会员充值页/金币充值页，返回预览页面时，视频为暂停状态\n若用户仅关闭付费弹窗，视频仍按原进度播放至结束\n视频结束后按通用规则弹出充值引导弹窗 |\n\n### 2. 三端视频预览结束后充值引导弹窗交互规则需求文档\n\n一、需求目的\n\n二、核心目标\n\n1.统一三端预览结束后的视频播放状态：禁止自动重播\n\n2.统一三端充值引导弹窗的触发与交互逻辑\n\n3.通过弹窗引导用户充值\n\n三、核心规则\n\n1.预览结束后视频播放规则（三端统一）\n\n| 操作场景 | 规则 |\n| --- | --- |\n| 预览播放结束 | 1.20 秒预览视频播放至倒计时为00:00时，视频立即停止播放\n2.**禁止视频自动循环预览**\n3.进度栏保持完全填充状态，倒计时固定显示00:00\n4.**预览视频停止播放的瞬间（倒计时为00:00时），弹窗立即弹出**\n5.用户需手动点击播放按钮，再次预览 |\n\n2.弹窗关闭后操作规则（三端统一）\n\n| 操作场景 | 规则 |\n| --- | --- |\n| 关闭弹窗后 | 1.视频仍保持停止状态，需用户手动点击播放按钮才能重新播放预览视频；\n2.点击播放按钮后，倒计时重置为00:20，进度栏清空，视频重新开始 20秒预览播放；\n3.重播后再次播放至结束，仍触发上述弹窗规则。 |","html":"\u003ch2>视频组件通用规则\u003c/h2>\n\u003cp>一、需求背景\u003c/p>\n\u003cp>当前平台 Web 双端、iOS-H5、App 端的 20 秒视频预览进度栏存在计时方式不统一问题（部分正计时、部分倒计时）。为规范三端交互逻辑，特统一 20 秒预览视频进度栏的计时规则。\u003c/p>\n\u003c
