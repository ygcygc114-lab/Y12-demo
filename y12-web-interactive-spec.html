  <script type="application/json" id="specData">{"docs":[{"id":"个人中心状态规则-0","title":"个人中心状态规则","file":"docs/notion-export/ExportBlock-4efbb5e9-6b52-48cb-8bcf-820483b4cd96-Part-1/Y12/个人中心状态规则 3497db3145c3804dba9ae04d975be05e.md","raw":"# 个人中心状态规则\n\n### **游客状态**\n\n不展示个人中心菜单。\n\n顶部仅展示登录入口。\n\n### **登录状态**\n\n展示个人中心菜单。\n\n菜单内容包括：\n\n- 观看历史\n- 我的点赞\n- 退出账号\n\n### **交互规则**\n\n点击个人中心展开菜单。\n\n点击页面空白区域收起菜单。\n\n点击菜单项后跳转对应页面或执行对应操作。\n\n### **异常场景**\n\n如果个人中心菜单数据异常，至少保留退出账号入口或关闭菜单展示。\n\n如果菜单展开状态异常，点击空白区域应强制收起。","html":"\u003ch2>个人中心状态规则\u003c/h2>\n\u003ch4>\u003cstrong>游客状态\u003c/strong>\u003c/h4>\n\u003cp>不展示个人中心菜单。\u003c/p>\n\u003cp>顶部仅展示登录入口。\u003c/p>\n\u003ch4>\u003cstrong>登录状态\u003c/strong>\u003c/h4>\n\u003cp>展示个人中心菜单。\u003c/p>\n\u003cp>菜单内容包括：\u003c/p>\n\u003cul>\n\u003cli>观看历史\u003c/li>\n\u003cli>我的点赞\u003c/li>\n\u003cli>退出账号\u003c/li>\n\u003c/ul>\n\u003ch4>\u003cstrong>交互规则\u003c/strong>\u003c/h4>\n\u003cp>点击个人中心展开菜单。\u003c/p>\n\u003cp>点击页面空白区域收起菜单。\u003c/p>\n\u003cp>点击菜单项后跳转对应页面或执行对应操作。\u003c/p>\n\u003ch4>\u003cstrong>异常场景\u003c/strong>\u003c/h4>\n\u003cp>如果个人中心菜单数据异常，至少保留退出账号入口或关闭菜单展示。\u003c/p>\n\u003cp>如果菜单展开状态异常，点击空白区域应强制收起。\u003c/p>","lines":31},{"id":"全部分类按钮-1","title":"全部分类按钮","file":"docs/notion-export/ExportBlock-4efbb5e9-6b52-48cb-8bcf-820483b4cd96-Part-1/Y12/全部分类按钮 3497db3145c3806dae2cdc6ab0e68be0.md","raw":"# 全部分类按钮\n\n## **组件名称**\n\n全部分类按钮\n\n## **组件用途**\n\n全部分类按钮为固定功能：用于作为全站统一入口，帮助用户快速进入全部分类页浏览站内全部内容。\n\n## **展示内容**\n\n全部分类按钮展示在顶部栏中。\n\n按钮文案固定为：全部分类。\n\n## **展示规则**\n\n全部分类按钮展示在搜索栏右侧。\n\n按钮样式与顶部栏其他功能按钮保持统一。\n\n按钮始终展示，不因页面不同而隐藏。\n\n## **交互规则**\n\n点击全部分类按钮后，跳转至全部分类页。\n\n进入全部分类页后，默认展示帖子分类。\n\n按钮点击区域为完整按钮区域。\n\n## **异常场景**\n\n如果全部分类页链接为空，点击按钮不跳转。\n\n如果全部分类页不存在，点击按钮不跳转或进入错误页。\n\n如果按钮渲染失败，不影响搜索栏和其他顶部栏功能。\n\n如果用户重复点击按钮，只触发一次有效跳转。","html":"\u003ch2>全部分类按钮\u003c/h2>\n\u003ch3>\u003cstrong>组件名称\u003c/strong>\u003c/h3>\n\u003cp>全部分类按钮\u003c/p>\n\u003ch3>\u003cstrong>组件用途\u003c/strong>\u003c/h3>\n\u003cp>全部分类按钮为固定功能：用于作为全站统一入口，帮助用户快速进入全部分类页浏览站内全部内容。\u003c/p>\n\u003ch3>\u003cstrong>展示内容\u003c/strong>\u003c/h3>\n\u003cp>全部分类按钮展示在顶部栏中。\u003c/p>\n\u003cp>按钮文案固定为：全部分类。\u003c/p>\n\u003ch3>\u003cstrong>展示规则\u003c/strong>\u003c/h3>\n\u003cp>全部分类按钮展示在搜索栏右侧。\u003c/p>\n\u003cp>按钮样式与顶部栏其他功能按钮保持统一。\u003c/p>\n\u003cp>按钮始终展示，不因页面不同而隐藏。\u003c/p>\n\u003ch3>\u003cstrong>交互规则\u003c/strong>\u003c/h3>\n\u003cp>点击全部分类按钮后，跳转至全部分类页。\u003c/p>\n\u003cp>进入全部分类页后，默认展示帖子分类。\u003c/p>\n\u003cp>按钮点击区域为完整按钮区域。\u003c/p>\n\u003ch3>\u003cstrong>异常场景\u003c/strong>\u003c/h3>\n\u003cp>如果全部分类页链接为空，点击按钮不跳转。\u003c/p>\n\u003cp>如果全部分类页不存在，点击按钮不跳转或进入错误页。\u003c/p>\n\u003cp>如果按钮渲染失败，不影响搜索栏和其他顶部栏功能。\u003c/p>\n\u003cp>如果用户重复点击按钮，只触发一次有效跳转。\u003c/p>","lines":41},{"id":"全部分类页-2","title":"全部分类页","file":"docs/notion-export/ExportBlock-4efbb5e9-6b52-48cb-8bcf-820483b4cd96-Part-1/Y12/全部分类页 3497db3145c3803bb821e4e86cc80bc9.md","raw":"# 全部分类页\n\n## 页面名称\n\n全部分类页\n\n## 页面用途\n\n全部分类页用于集中展示站内可浏览内容，并支持用户按内容分类、标签和排序方式筛选内容。页面用于承接顶部栏“全部分类”入口跳转。本文档仅描述全部分类页主体内容，不包含全站通用组件。\n\n## 页面主体结构\n\n全部分类页主体从上至下包含：\n\n- 当前筛选标题区域\n- 分类筛选区域\n- 筛选按钮\n- 排序筛选区域\n- 内容列表\n- 分页器\n- 分类筛选弹窗\n\n## 当前筛选标题区域\n\n### 展示内容\n\n页面顶部标题展示当前用户选择的标签文案。\n\n默认展示：`全部`。\n\n### 展示规则\n\n用户未选择具体标签时，标题展示 `全部`。\n\n用户在筛选弹窗中选择具体标签后，标题更新为当前标签文案。\n\n如果用户选择“全部”，标题恢复为 `全部`。\n\n### 异常场景\n\n如果当前标签文案为空，标题展示 `全部`。\n\n如果标签状态解析失败，标题展示 `全部`。\n\n## 分类筛选区域\n\n### 展示内容\n\n分类筛选按钮包含：\n\n- 长视频\n- 帖子\n\n默认选中长视频。\n\n当前选中的分类按钮需要高亮。\n\n### 展示规则\n\n分类筛选展示在标题下方。\n\n分类按钮顺序固定为：长视频、帖子。\n\n分类按钮始终展示，不因内容为空而隐藏。\n\n### 交互规则\n\n点击“长视频”按钮，切换至长视频内容列表。\n\n点击“帖子”按钮，切换至帖子内容列表。\n\n切换分类后：\n\n- 保留当前标签筛选状态\n- 分页重置为第 1 页\n- 内容列表刷新为对应分类内容\n\n### 异常场景\n\n如果分类参数为空，默认选中长视频。\n\n如果分类参数非法，默认选中长视频。\n\n如果当前分类无内容，展示对应分类空状态。\n\n如果切换分类失败，保持当前分类不变。\n\n## 筛选按钮\n\n### 展示内容\n\n筛选按钮展示在当前筛选标题区域右上角。\n\n按钮文案为：`筛选`。\n\n### 展示规则\n\n筛选按钮始终展示。\n\n按钮样式使用橙色主按钮风格。\n\n按钮位置固定在筛选标题右侧。\n\n### 交互规则\n\n点击筛选按钮，打开分类筛选弹窗。\n\n弹窗打开时，页面主体内容不跳转。\n\n再次点击弹窗关闭按钮或遮罩，可关闭弹窗。\n\n### 异常场景\n\n如果弹窗内容加载失败，点击筛选按钮后展示空状态或错误提示。\n\n如果弹窗打开失败，页面保持当前状态不变。\n\n## 排序筛选区域\n\n### 展示内容\n\n排序按钮包含：\n\n- 最新上架\n- 最多点赞\n- 最多观看\n- 随机展示\n\n默认选中最新上架。\n\n当前选中的排序按钮需要高亮。\n\n### 展示规则\n\n排序区域展示在分类筛选区域下方。\n\n排序按钮只影响当前分类和当前标签筛选后的内容列表。\n\n### 交互规则\n\n点击排序按钮后，当前列表根据对应排序规则刷新。\n\n切换排序时：\n\n- 保留当前分类\n- 保留当前标签\n- 分页重置为第 1 页\n\n### 异常场景\n\n如果排序参数为空，默认选中最新上架。\n\n如果排序参数非法，默认选中最新上架。\n\n如果排序切换失败，保留当前列表不变。\n\n如果随机展示无新数据，仍保持当前排序按钮选中态。\n\n## 分类筛选弹窗\n\n### 展示内容\n\n分类筛选弹窗用于展示全部可选分类、标签类别和标签。\n\n弹窗包含：\n\n- 分类：长视频、帖子\n- 全部重置入口\n- 标签类别\n- 每个标签类别对应的标签\n\n### 展示规则\n\n点击右上角“筛选”按钮后展示弹窗。\n\n弹窗中展示所有标签类别。\n\n每个标签类别下展示对应标签。\n\n每个标签类别下包含“全部”标签。\n\n标签类别数量较多时，弹窗内容区域纵向滚动展示，不能撑破页面。\n\n当前已选中的分类、标签需要在弹窗中高亮。\n\n### 交互规则\n\n点击弹窗中的“长视频”或“帖子”，切换当前内容分类。\n\n点击任意标签后：\n\n- 弹窗关闭\n- 顶部标题更新为用户选择的标签文案\n- 内容列表刷新为包含当前标签的内容\n- 分页重置为第 1 页\n\n点击“全部”后：\n\n- 弹窗关闭\n- 顶部标题恢复为 `全部`\n- 内容列表展示当前分类下全部内容\n- 分页重置为第 1 页\n\n点击弹窗关闭按钮、遮罩区域或按 `Esc`，关闭弹窗，不改变当前筛选状态。\n\n### 异常场景\n\n如果标签类别为空，弹窗仅展示分类和全部入口。\n\n如果某个标签类别下没有标签，仅展示“全部”。\n\n如果标签文案为空，展示默认名称“未命名标签”。\n\n如果点击标签后筛选失败，保留当前筛选状态不变。\n\n如果弹窗内容过多，弹窗内部滚动，页面主体不滚动。\n\n## 内容列表\n\n### 展示内容\n\n内容列表根据当前分类展示不同内容卡片。\n\n长视频分类展示视频内容卡片。\n\n帖子分类展示动态内容卡片。\n\n每页最多展示 25 条内容。\n\n列表中可插入广告位。\n\n### 展示规则\n\n长视频内容卡片样式与全局视频内容卡片保持一致。\n\n帖子内容卡片样式与全局动态内容卡片保持一致。\n\n广告卡片尺寸与当前内容卡片尺寸保持一致。\n\n如果当前选择了具体标签，则只展示包含当前标签的内容。\n\n如果当前标题为“全部”，则展示当前分类下全部内容。\n\n### 交互规则\n\n点击视频内容卡片进入视频详情页。\n\n点击动态内容卡片进入动态详情页。\n\n点击内容标签跳转搜索结果页，并带入对应内容类型。\n\n鼠标悬浮内容卡片时展示选中效果。\n\n点击广告卡片跳转对应广告链接。\n\n### 异常场景\n\n如果当前筛选无内容，展示空状态。\n\n如果内容数量不足 25 条，按实际数量展示。\n\n如果内容封面为空，展示默认封面占位。\n\n如果内容标题为空，展示默认标题。\n\n如果内容标签为空，隐藏标签区域。\n\n如果详情链接为空，点击卡片不跳转。\n\n如果广告为空，不插入广告卡片。\n\n如果广告封面加载失败，展示默认广告占位图。\n\n如果广告链接为空，点击广告卡片不跳转。\n\n## 分页器\n\n### 展示内容\n\n分页器展示：\n\n- 上一页\n- 页码\n- 下一页\n\n当前页码需要高亮。\n\n### 展示规则\n\n分页器展示在内容列表下方。\n\n分页器跟随当前分类、标签和排序结果变化。\n\n### 交互规则\n\n点击页码切换到对应页。\n\n点击上一页切换到上一页。\n\n点击下一页切换到下一页。\n\n切换分页后刷新当前列表内容。\n\n分页切换时保留当前分类、标签和排序状态。\n\n### 异常场景\n\n如果当前页为空，默认第 1 页。\n\n如果当前页参数非法，默认第 1 页。\n\n如果当前页大于最大页数，重置为最后一页。\n\n如果当前页为第 1 页，上一页按钮置灰不可点击。\n\n如果当前页为最后一页，下一页按钮置灰不可点击。\n\n如果当前筛选结果总数为 0，隐藏分页器。\n\n如果分页切换失败，保留当前页内容不变。","html":"\u003ch2>全部分类页\u003c/h2>\n\u003ch3>页面名称\u003c/h3>\n\u003cp>全部分类页\u003c/p>\n\u003ch3>页面用途\u003c/h3>\n\u003cp>全部分类页用于集中展示站内可浏览内容，并支持用户按内容分类、标签和排序方式筛选内容。页面用于承接顶部栏“全部分类”入口跳转。本文档仅描述全部分类页主体内容，不包含全站通用组件。\u003c/p>\n\u003ch3>页面主体结构\u003c/h3>\n\u003cp>全部分类页主体从上至下包含：\u003c/p>\n\u003cul>\n\u003cli>当前筛选标题区域\u003c/li>\n\u003cli>分类筛选区域\u003c/li>\n\u003cli>筛选按钮\u003c/li>\n\u003cli>排序筛选区域\u003c/li>\n\u003cli>内容列表\u003c/li>\n\u003cli>分页器\u003c/li>\n\u003cli>分类筛选弹窗\u003c/li>\n\u003c/ul>\n\u003ch3>当前筛选标题区域\u003c/h3>\n\u003ch4>展示内容\u003c/h4>\n\u003cp>页面顶部标题展示当前用户选择的标签文案。\u003c/p>\n\u003cp>默认展示：\u003ccode>全部\u003c/code>。\u003c/p>\n\u003ch4>展示规则\u003c/h4>\n\u003cp>用户未选择具体标签时，标题展示 \u003ccode>全部\u003c/code>。\u003c/p>\n\u003cp>用户在筛选弹窗中选择具体标签后，标题更新为当前标签文案。\u003c/p>\n\u003cp>如果用户选择“全部”，标题恢复为 \u003ccode>全部\u003c/code>。\u003c/p>\n\u003ch4>异常场景\u003c/h4>\n\u003cp>如果当前标签文案为空，标题展示 \u003ccode>全部\u003c/code>。\u003c/p>\n\u003cp>如果标签状态解析失败，标题展示 \u003ccode>全部\u003c/code>。\u003c/p>\n\u003ch3>分类筛选区域\u003c/h3>\n\u003ch4>展示内容\u003c/h4>\n\u003cp>分类筛选按钮包含：\u003c/p>\n\u003cul>\n\u003cli>长视频\u003c/li>\n\u003cli>帖子\u003c/li>\n\u003c/ul>\n\u003cp>默认选中长视频。\u003c/p>\n\u003cp>当前选中的分类按钮需要高亮。\u003c/p>\n\u003ch4>展示规则\u003c/h4>\n\u003cp>分类筛选展示在标题下方。\u003c/p>\n\u003cp>分类按钮顺序固定为：长视频、帖子。\u003c/p>\n\u003cp>分类按钮始终展示，不因内容为空而隐藏。\u003c/p>\n\u003ch4>交互规则\u003c/h4>\n\u003cp>点击“长视频”按钮，切换至长视频内容列表。\u003c/p>\n\u003cp>点击“帖子”按钮，切换至帖子内容列表。\u003c/p>\n\u003cp>切换分类后：\u003c/p>\n\u003cul>\n\u003cli>保留当前标签筛选状态\u003c/li>\n\u003cli>分页重置为第 1 页\u003c/li>\n\u003cli>内容列表刷新为对应分类内容\u003c/li>\n\u003c/ul>\n\u003ch4>异常场景\u003c/h4>\n\u003cp>如果分类参数为空，默认选中长视频。\u003c/p>\n\u003cp>如果分类参数非法，默认选中长视频。\u003c/p>\n\u003cp>如果当前分类无内容，展示对应分类空状态。\u003c/p>\n\u003cp>如果切换分类失败，保持当前分类不变。\u003c/p>\n\u003ch3>筛选按钮\u003c/h3>\n\u003ch4>展示内容\u003c/h4>\n\u003cp>筛选按钮展示在当前筛选标题区域右上角。\u003c/p>\n\u003cp>按钮文案为：\u003ccode>筛选\u003c/code>。\u003c/p>\n\u003ch4>展示规则\u003c/h4>\n\u003cp>筛选按钮始终展示。\u003c/p>\n\u003cp>按钮样式使用橙色主按钮风格。\u003c/p>\n\u003cp>按钮位置固定在筛选标题右侧。\u003c/p>\n\u003ch4>交互规则\u003c/h4>\n\u003cp>点击筛选按钮，打开分类筛选弹窗。\u003c/p>\n\u003cp>弹窗打开时，页面主体内容不跳转。\u003c/p>\n\u003cp>再次点击弹窗关闭按钮或遮罩，可关闭弹窗。\u003c/p>\n\u003ch4>异常场景\u003c/h4>\n\u003cp>如果弹窗内容加载失败，点击筛选按钮后展示空状态或错误提示。\u003c/p>\n\u003cp>如果弹窗打开失败，页面保持当前状态不变。\u003c/p>\n\u003ch3>排序筛选区域\u003c/h3>\n\u003ch4>展示内容\u003c/h4>\n\u003cp>排序按钮包含：\u003c/p>\n\u003cul>\n\u003cli>最新上架\u003c/li>\n\u003cli>最多点赞\u003c/li>\n\u003cli>最多观看\u003c/li>\n\u003cli>随机展示\u003c/li>\n\u003c/ul>\n\u003cp>默认选中最新上架。\u003c/p>\n\u003cp>当前选中的排序按钮需要高亮。\u003c/p>\n\u003ch4>展示规则\u003c/h4>\n\u003cp>排序区域展示在分类筛选区域下方。\u003c/p>\n\u003cp>排序按钮只影响当前分类和当前标签筛选后的内容列表。\u003c/p>\n\u003ch4>交互规则\u003c/h4>\n\u003cp>点击排序按钮后，当前列表根据对应排序规则刷新。\u003c/p>\n\u003cp>切换排序时：\u003c/p>\n\u003cul>\n\u003cli>保留当前分类\u003c/li>\n\u003cli>保留当前标签\u003c/li>\n\u003cli>分页重置为第 1 页\u003c/li>\n\u003c/ul>\n\u003ch4>异常场景\u003c/h4>\n\u003cp>如果排序参数为空，默认选中最新上架。\u003c/p>\n\u003cp>如果排序参数非法，默认选中最新上架。\u003c/p>\n\u003cp>如果排序切换失败，保留当前列表不变。\u003c/p>\n\u003cp>如果随机展示无新数据，仍保持当前排序按钮选中态。\u003c/p>\n\u003ch3>分类筛选弹窗\u003c/h3>\n\u003ch4>展示内容\u003c/h4>\n\u003cp>分类筛选弹窗用于展示全部可选分类、标签类别和标签。\u003c/p>\n\u003cp>弹窗包含：\u003c/p>\n\u003cul>\n\u003cli>分类：长视频、帖子\u003c/li>\n\u003cli>全部重置入口\u003c/li>\n\u003cli>标签类别\u003c/li>\n\u003cli>每个标签类别对应的标签\u003c/li>\n\u003c/ul>\n\u003ch4>展示规则\u003c/h4>\n\u003cp>点击右上角“筛选”按钮后展示弹窗。\u003c/p>\n\u003cp>弹窗中展示所有标签类别。\u003c/p>\n\u003cp>每个标签类别下展示对应标签。\u003c/p>\n\u003cp>每个标签类别下包含“全部”标签。\u003c/p>\n\u003cp>标签类别数量较多时，弹窗内容区域纵向滚动展示，不能撑破页面。\u003c/p>\n\u003cp>当前已选中的分类、标签需要在弹窗中高亮。\u003c/p>\n\u003ch4>交互规则\u003c/h4>\n\u003cp>点击弹窗中的“长视频”或“帖子”，切换当前内容分类。\u003c/p>\n\u003cp>点击任意标签后：\u003c/p>\n\u003cul>\n\u003cli>弹窗关闭\u003c/li>\n\u003cli>顶部标题更新为用户选择的标签文案\u003c/li>\n\u003cli>内容列表刷新为包含当前标签的内容\u003c/li>\n\u003cli>分页重置为第 1 页\u003c/li>\n\u003c/ul>\n\u003cp>点击“全部”后：\u003c/p>\n\u003cul>\n\u003cli>弹窗关闭\u003c/li>\n\u003cli>顶部标题恢复为 \u003ccode>全部\u003c/code>\u003c/li>\n\u003cli>内容列表展示当前分类下全部内容\u003c/li>\n\u003cli>分页重置为第 1 页\u003c/li>\n\u003c/ul>\n\u003cp>点击弹窗关闭按钮、遮罩区域或按 \u003ccode>Esc\u003c/code>，关闭弹窗，不改变当前筛选状态。\u003c/p>\n\u003ch4>异常场景\u003c/h4>\n\u003cp>如果标签类别为空，弹窗仅展示分类和全部入口。\u003c/p>\n\u003cp>如果某个标签类别下没有标签，仅展示“全部”。\u003c/p>\n\u003cp>如果标签文案为空，展示默认名称“未命名标签”。\u003c/p>\n\u003cp>如果点击标签后筛选失败，保留当前筛选状态不变。\u003c/p>\n\u003cp>如果弹窗内容过多，弹窗内部滚动，页面主体不滚动。\u003c/p>\n\u003ch3>内容列表\u003c/h3>\n\u003ch4>展示内容\u003c/h4>\n\u003cp>内容列表根据当前分类展示不同内容卡片。\u003c/p>\n\u003cp>长视频分类展示视频内容卡片。\u003c/p>\n\u003cp>帖子分类展示动态内容卡片。\u003c/p>\n\u003cp>每页最多展示 25 条内容。\u003c/p>\n\u003cp>列表中可插入广告位。\u003c/p>\n\u003ch4>展示规则\u003c/h4>\n\u003cp>长视频内容卡片样式与全局视频内容卡片保持一致。\u003c/p>\n\u003cp>帖子内容卡片样式与全局动态内容卡片保持一致。\u003c/p>\n\u003cp>广告卡片尺寸与当前内容卡片尺寸保持一致。\u003c/p>\n\u003cp>如果当前选择了具体标签，则只展示包含当前标签的内容。\u003c/p>\n\u003cp>如果当前标题为“全部”，则展示当前分类下全部内容。\u003c/p>\n\u003ch4>交互规则\u003c/h4>\n\u003cp>点击视频内容卡片进入视频详情页。\u003c/p>\n\u003cp>点击动态内容卡片进入动态详情页。\u003c/p>\n\u003cp>点击内容标签跳转搜索结果页，并带入对应内容类型。\u003c/p>\n\u003cp>鼠标悬浮内容卡片时展示选中效果。\u003c/p>\n\u003cp>点击广告卡片跳转对应广告链接。\u003c/p>\n\u003ch4>异常场景\u003c/h4>\n\u003cp>如果当前筛选无内容，展示空状态。\u003c/p>\n\u003cp>如果内容数量不足 25 条，按实际数量展示。\u003c/p>\n\u003cp>如果内容封面为空，展示默认封面占位。\u003c/p>\n\u003cp>如果内容标题为空，展示默认标题。\u003c/p>\n\u003cp>如果内容标签为空，隐藏标签区域。\u003c/p>\n\u003cp>如果详情链接为空，点击卡片不跳转。\u003c/p>\n\u003cp>如果广告为空，不插入广告卡片。\u003c/p>\n\u003cp>如果广告封面加载失败，展示默认广告占位图。\u003c/p>\n\u003cp>如果广告链接为空，点击广告卡片不跳转。\u003c/p>\n\u003ch3>分页器\u003c/h3>\n\u003ch4>展示内容\u003c/h4>\n\u003cp>分页器展示：\u003c/p>\n\u003cul>\n\u003cli>上一页\u003c/li>\n\u003cli>页码\u003c/li>\n\u003cli>下一页\u003c/li>\n\u003c/ul>\n\u003cp>当前页码需要高亮。\u003c/p>\n\u003ch4>展示规则\u003c/h4>\n\u003cp>分页器展示在内容列表下方。\u003c/p>\n\u003cp>分页器跟随当前分类、标签和排序结果变化。\u003c/p>\n\u003ch4>交互规则\u003c/h4>\n\u003cp>点击页码切换到对应页。\u003c/p>\n\u003cp>点击上一页切换到上一页。\u003c/p>\n\u003cp>点击下一页切换到下一页。\u003c/p>\n\u003cp>切换分页后刷新当前列表内容。\u003c/p>\n\u003cp>分页切换时保留当前分类、标签和排序状态。\u003c/p>\n\u003ch4>异常场景\u003c/h4>\n\u003cp>如果当前页为空，默认第 1 页。\u003c/p>\n\u003cp>如果当前页参数非法，默认第 1 页。\u003c/p>\n\u003cp>如果当前页大于最大页数，重置为最后一页。\u003c/p>\n\u003cp>如果当前页为第 1 页，上一页按钮置灰不可点击。\u003c/p>\n\u003cp>如果当前页为最后一页，下一页按钮置灰不可点击。\u003c/p>\n\u003cp>如果当前筛选结果总数为 0，隐藏分页器。\u003c/p>\n\u003cp>如果分页切换失败，保留当前页内容不变。\u003c/p>","lines":320},{"id":"全部分类页广告-categoryy12-3","title":"全部分类页广告：categoryY12","file":"docs/notion-export/ExportBlock-4efbb5e9-6b52-48cb-8bcf-820483b4cd96-Part-1/Y12/全部分类页广告：categoryY12 3497db3145c380dd96f1effe3f345fbc.md","raw":"# 全部分类页广告：categoryY12\n\n广告标识：categoryY12\n\n### **组件用途**\n\n全部分类页广告用于在全部分类页内容流中插入广告内容。\n\n### **展示规则**\n\n广告可插入帖子列表或视频列表。\n\n广告尺寸与所在内容流中的卡片尺寸一致。\n\n帖子流中广告尺寸与动态卡片一致。\n\n视频流中广告尺寸与视频卡片一致。\n\n广告封面铺满卡片区域。\n\n广告名称以底部浮层展示。\n\n### **交互规则**\n\n点击广告卡片跳转广告链接。\n\n### **异常场景**\n\n如果广告为空，则不插入广告位。\n\n如果广告封面缺失，展示默认广告占位图。\n\n如果广告链接为空，点击不跳转。","html":"\u003ch2>全部分类页广告：categoryY12\u003c/h2>\n\u003cp>广告标识：categoryY12\u003c/p>\n\u003ch4>\u003cstrong>组件用途\u003c/strong>\u003c/h4>\n\u003cp>全部分类页广告用于在全部分类页内容流中插入广告内容。\u003c/p>\n\u003ch4>\u003cstrong>展示规则\u003c/strong>\u003c/h4>\n\u003cp>广告可插入帖子列表或视频列表。\u003c/p>\n\u003cp>广告尺寸与所在内容流中的卡片尺寸一致。\u003c/p>\n\u003cp>帖子流中广告尺寸与动态卡片一致。\u003c/p>\n\u003cp>视频流中广告尺寸与视频卡片一致。\u003c/p>\n\u003cp>广告封面铺满卡片区域。\u003c/p>\n\u003cp>广告名称以底部浮层展示。\u003c/p>\n\u003ch4>\u003cstrong>交互规则\u003c/strong>\u003c/h4>\n\u003cp>点击广告卡片跳转广告链接。\u003c/p>\n\u003ch4>\u003cstrong>异常场景\u003c/strong>\u003c/h4>\n\u003cp>如果广告为空，则不插入广告位。\u003c/p>\n\u003cp>如果广告封面缺失，展示默认广告占位图。\u003c/p>\n\u003cp>如果广告链接为空，点击不跳转。\u003c/p>","lines":33},{"id":"分享功能-4","title":"分享功能","file":"docs/notion-export/ExportBlock-4efbb5e9-6b52-48cb-8bcf-820483b4cd96-Part-1/Y12/分享功能 3497db3145c380a09bb1f00265440302.md","raw":"# 分享功能\n\n## **功能名称**\n\n分享功能\n\n## **功能用途**\n\n分享功能用于将当前帖子或视频内容分享给其他用户，支持复制链接或打开分享入口。\n\n## **展示内容**\n\n分享功能包含：\n\n- 分享按钮\n- 分享入口或分享弹层\n- 分享链接\n\n## **展示规则**\n\n分享按钮展示在详情页基础信息区域。\n\n点击分享按钮后，可展示分享入口或直接复制链接。\n\n分享样式与页面整体风格保持一致。\n\n## **交互规则**\n\n点击分享按钮后，可执行以下一种或多种行为：\n\n- 复制当前页面链接\n- 打开分享弹层\n- 展示可分享渠道入口\n\n分享成功后，需要展示成功提示。\n\n如果分享失败，需要展示失败提示。\n\n## **异常场景**\n\n如果分享链接为空，点击分享按钮不执行跳转。\n\n如果复制失败，提示“复制失败”。\n\n如果分享接口异常，提示“分享失败”。\n\n如果内容已下架，分享按钮可隐藏或不可点击。\n\n如果浏览器不支持复制能力，可降级为手动复制链接展示。","html":"\u003ch2>分享功能\u003c/h2>\n\u003ch3>\u003cstrong>功能名称\u003c/strong>\u003c/h3>\n\u003cp>分享功能\u003c/p>\n\u003ch3>\u003cstrong>功能用途\u003c/strong>\u003c/h3>\n\u003cp>分享功能用于将当前帖子或视频内容分享给其他用户，支持复制链接或打开分享入口。\u003c/p>\n\u003ch3>\u003cstrong>展示内容\u003c/strong>\u003c/h3>\n\u003cp>分享功能包含：\u003c/p>\n\u003cul>\n\u003cli>分享按钮\u003c/li>\n\u003cli>分享入口或分享弹层\u003c/li>\n\u003cli>分享链接\u003c/li>\n\u003c/ul>\n\u003ch3>\u003cstrong>展示规则\u003c/strong>\u003c/h3>\n\u003cp>分享按钮展示在详情页基础信息区域。\u003c/p>\n\u003cp>点击分享按钮后，可展示分享入口或直接复制链接。\u003c/p>\n\u003cp>分享样式与页面整体风格保持一致。\u003c/p>\n\u003ch3>\u003cstrong>交互规则\u003c/strong>\u003c/h3>\n\u003cp>点击分享按钮后，可执行以下一种或多种行为：\u003c/p>\n\u003cul>\n\u003cli>复制当前页面链接\u003c/li>\n\u003cli>打开分享弹层\u003c/li>\n\u003cli>展示可分享渠道入口\u003c/li>\n\u003c/ul>\n\u003cp>分享成功后，需要展示成功提示。\u003c/p>\n\u003cp>如果分享失败，需要展示失败提示。\u003c/p>\n\u003ch3>\u003cstrong>异常场景\u003c/strong>\u003c/h3>\n\u003cp>如果分享链接为空，点击分享按钮不执行跳转。\u003c/p>\n\u003cp>如果复制失败，提示“复制失败”。\u003c/p>\n\u003cp>如果分享接口异常，提示“分享失败”。\u003c/p>\n\u003cp>如果内容已下架，分享按钮可隐藏或不可点击。\u003c/p>\n\u003cp>如果浏览器不支持复制能力，可降级为手动复制链接展示。\u003c/p>","lines":49},{"id":"分页器-5","title":"分页器","file":"docs/notion-export/ExportBlock-4efbb5e9-6b52-48cb-8bcf-820483b4cd96-Part-1/Y12/分页器 3497db3145c380d18b70c72bb4a79f8a.md","raw":"# 分页器\n\n## **组件用途**\n\n分页器用于在列表页、搜索结果页、观看历史页、我的点赞页、全部分类页中切换当前列表分页内容。\n\n## **展示内容**\n\n分页器包含：\n\n- 上一页按钮\n- 页码按钮\n- 下一页按钮\n\n## **展示规则**\n\n分页器展示在内容列表下方。\n\n当前页码高亮。\n\n页码数量根据总页数动态生成。\n\n分页器跟随当前列表数据量和筛选条件变化。\n\n## **交互规则**\n\n点击页码按钮切换到对应页。\n\n点击上一页切换到上一页。\n\n点击下一页切换到下一页。\n\n分页切换后刷新当前列表内容。\n\n切换分页时保留当前分类、排序、标签等筛选状态。\n\n## **异常场景**\n\n如果当前页为空，默认第 1 页。\n\n如果当前页参数非法，默认第 1 页。\n\n如果当前页超过最大页数，重置为最后一页。\n\n如果当前页为第 1 页，上一页按钮置灰不可点击。\n\n如果当前页为最后一页，下一页按钮置灰不可点击。\n\n如果总数为 0，隐藏分页器。\n\n如果分页接口失败，保留当前页内容不变。","html":"\u003ch2>分页器\u003c/h2>\n\u003ch3>\u003cstrong>组件用途\u003c/strong>\u003c/h3>\n\u003cp>分页器用于在列表页、搜索结果页、观看历史页、我的点赞页、全部分类页中切换当前列表分页内容。\u003c/p>\n\u003ch3>\u003cstrong>展示内容\u003c/strong>\u003c/h3>\n\u003cp>分页器包含：\u003c/p>\n\u003cul>\n\u003cli>上一页按钮\u003c/li>\n\u003cli>页码按钮\u003c/li>\n\u003cli>下一页按钮\u003c/li>\n\u003c/ul>\n\u003ch3>\u003cstrong>展示规则\u003c/strong>\u003c/h3>\n\u003cp>分页器展示在内容列表下方。\u003c/p>\n\u003cp>当前页码高亮。\u003c/p>\n\u003cp>页码数量根据总页数动态生成。\u003c/p>\n\u003cp>分页器跟随当前列表数据量和筛选条件变化。\u003c/p>\n\u003ch3>\u003cstrong>交互规则\u003c/strong>\u003c/h3>\n\u003cp>点击页码按钮切换到对应页。\u003c/p>\n\u003cp>点击上一页切换到上一页。\u003c/p>\n\u003cp>点击下一页切换到下一页。\u003c/p>\n\u003cp>分页切换后刷新当前列表内容。\u003c/p>\n\u003cp>切换分页时保留当前分类、排序、标签等筛选状态。\u003c/p>\n\u003ch3>\u003cstrong>异常场景\u003c/strong>\u003c/h3>\n\u003cp>如果当前页为空，默认第 1 页。\u003c/p>\n\u003cp>如果当前页参数非法，默认第 1 页。\u003c/p>\n\u003cp>如果当前页超过最大页数，重置为最后一页。\u003c/p>\n\u003cp>如果当前页为第 1 页，上一页按钮置灰不可点击。\u003c/p>\n\u003cp>如果当前页为最后一页，下一页按钮置灰不可点击。\u003c/p>\n\u003cp>如果总数为 0，隐藏分页器。\u003c/p>\n\u003cp>如果分页接口失败，保留当前页内容不变。\u003c/p>","lines":51},{"id":"动态内容卡片-6","title":"动态内容卡片","file":"docs/notion-export/ExportBlock-4efbb5e9-6b52-48cb-8bcf-820483b4cd96-Part-1/Y12/动态内容卡片 3497db3145c380aca907f207337717c8.md","raw":"# 动态内容卡片\n\n## **组件名称**\n\n动态内容卡片\n\n## **组件用途**\n\n动态内容卡片用于展示帖子 / 动态类内容，是首页、帖子列表页、搜索结果页、全部分类页、观看历史页、我的点赞页中的通用内容卡片，用于承载帖子内容入口。\n\n## **展示内容**\n\n动态内容卡片展示以下内容：\n\n- 动态封面\n- 动态标题\n- 发布者信息\n- 上架时间\n- 动态标签\n\n## **展示规则**\n\n动态内容卡片样式需要全局统一。\n\n动态封面比例需要与首页动态内容卡片保持一致。\n\n卡片不展示额外简介文案。\n\n动态标题展示在封面内容区域内。\n\n发布者信息和上架时间展示在标题下方。\n\n动态标签展示在卡片底部区域。\n\n标签数量根据后台返回展示。\n\n卡片内容布局需要在不同页面中保持一致，仅根据列表页布局调整卡片尺寸。\n\n列表页中动态内容卡片需要适配 5 行 5 列布局，同时保证信息完整可读。\n\n## **交互规则**\n\n点击动态内容卡片进入动态详情页。\n\n点击动态标签跳转搜索结果页，并默认选中帖子分类。\n\n鼠标悬浮动态内容卡片时，展示选中效果。\n\n动态标签支持单独点击，不影响整个卡片点击区域。\n\n## **异常场景**\n\n如果动态封面为空，展示默认封面占位图。\n\n如果动态标题为空，展示默认标题“未命名动态”。\n\n如果动态标签为空，隐藏标签区域。\n\n如果发布者信息为空，展示默认发布者。\n\n如果上架时间为空，隐藏上架时间字段。\n\n## **组件名称**\n\n动态内容卡片\n\n## **组件用途**\n\n动态内容卡片用于展示帖子 / 动态类内容，是首页、帖子列表页、搜索结果页、全部分类页、观看历史页、我的点赞页中的通用内容卡片，用于承载帖子内容入口。\n\n## **展示内容**\n\n动态内容卡片展示以下内容：\n\n- 动态封面\n- 动态标题\n- 发布者信息\n- 上架时间\n- 动态标签\n\n## **展示规则**\n\n动态内容卡片样式需要全局统一。\n\n动态封面比例需要与首页动态内容卡片保持一致。\n\n卡片不展示额外简介文案。\n\n动态标题展示在封面内容区域内。\n\n发布者信息和上架时间展示在标题下方。\n\n动态标签展示在卡片底部区域。\n\n标签数量根据后台返回展示。\n\n卡片内容布局需要在不同页面中保持一致，仅根据列表页布局调整卡片尺寸。\n\n列表页中动态内容卡片需要适配 5 行 5 列布局，同时保证信息完整可读。\n\n## **交互规则**\n\n点击动态内容卡片进入动态详情页。\n\n点击动态标签跳转搜索结果页，并默认选中帖子分类。\n\n鼠标悬浮动态内容卡片时，展示选中效果。\n\n动态标签支持单独点击，不影响整个卡片点击区域。\n\n## **异常场景**\n\n如果动态封面为空，展示默认封面占位图。\n\n如果动态标题为空，展示默认标题“未命名动态”。\n\n如果发布者信息为空，展示默认发布者。\n\n如果上架时间为空，隐藏上架时间字段。\n\n如果动态标签为空，隐藏标签区域。\n\n如果动态详情链接为空，点击卡片不跳转。\n\n如果动态标题过长，按组件规则截断或限制行数，不能撑破卡片布局。\n\n如果卡片数据重复，列表渲染时需要去重，避免重复展示。\n\n如果动态内容已下架，前端可根据后台返回状态决定隐藏卡片或展示下架态卡片。\n\n如果展示下架态卡片，卡片需要增加“已下架”标识。\n\n下架卡片封面需要做灰度、遮罩或弱化处理。\n\n点击下架卡片时，不进入正常动态详情页。\n\n点击下架卡片后，可提示“该内容已下架”或进入下架提示页。\n\n下架内容的动态标签不再支持跳转。","html":"\u003ch2>动态内容卡片\u003c/h2>\n\u003ch3>\u003cstrong>组件名称\u003c/strong>\u003c/h3>\n\u003cp>动态内容卡片\u003c/p>\n\u003ch3>\u003cstrong>组件用途\u003c/strong>\u003c/h3>\n\u003cp>动态内容卡片用于展示帖子 / 动态类内容，是首页、帖子列表页、搜索结果页、全部分类页、观看历史页、我的点赞页中的通用内容卡片，用于承载帖子内容入口。\u003c/p>\n\u003ch3>\u003cstrong>展示内容\u003c/strong>\u003c/h3>\n\u003cp>动态内容卡片展示以下内容：\u003c/p>\n\u003cul>\n\u003cli>动态封面\u003c/li>\n\u003cli>动态标题\u003c/li>\n\u003cli>发布者信息\u003c/li>\n\u003cli>上架时间\u003c/li>\n\u003cli>动态标签\u003c/li>\n\u003c/ul>\n\u003ch3>\u003cstrong>展示规则\u003c/strong>\u003c/h3>\n\u003cp>动态内容卡片样式需要全局统一。\u003c/p>\n\u003cp>动态封面比例需要与首页动态内容卡片保持一致。\u003c/p>\n\u003cp>卡片不展示额外简介文案。\u003c/p>\n\u003cp>动态标题展示在封面内容区域内。\u003c/p>\n\u003cp>发布者信息和上架时间展示在标题下方。\u003c/p>\n\u003cp>动态标签展示在卡片底部区域。\u003c/p>\n\u003cp>标签数量根据后台返回展示。\u003c/p>\n\u003cp>卡片内容布局需要在不同页面中保持一致，仅根据列表页布局调整卡片尺寸。\u003c/p>\n\u003cp>列表页中动态内容卡片需要适配 5 行 5 列布局，同时保证信息完整可读。\u003c/p>\n\u003ch3>\u003cstrong>交互规则\u003c/strong>\u003c/h3>\n\u003cp>点击动态内容卡片进入动态详情页。\u003c/p>\n\u003cp>点击动态标签跳转搜索结果页，并默认选中帖子分类。\u003c/p>\n\u003cp>鼠标悬浮动态内容卡片时，展示选中效果。\u003c/p>\n\u003cp>动态标签支持单独点击，不影响整个卡片点击区域。\u003c/p>\n\u003ch3>\u003cstrong>异常场景\u003c/strong>\u003c/h3>\n\u003cp>如果动态封面为空，展示默认封面占位图。\u003c/p>\n\u003cp>如果动态标题为空，展示默认标题“未命名动态”。\u003c/p>\n\u003cp>如果动态标签为空，隐藏标签区域。\u003c/p>\n\u003cp>如果发布者信息为空，展示默认发布者。\u003c/p>\n\u003cp>如果上架时间为空，隐藏上架时间字段。\u003c/p>\n\u003ch3>\u003cstrong>组件名称\u003c/strong>\u003c/h3>\n\u003cp>动态内容卡片\u003c/p>\n\u003ch3>\u003cstrong>组件用途\u003c/strong>\u003c/h3>\n\u003cp>动态内容卡片用于展示帖子 / 动态类内容，是首页、帖子列表页、搜索结果页、全部分类页、观看历史页、我的点赞页中的通用内容卡片，用于承载帖子内容入口。\u003c/p>\n\u003ch3>\u003cstrong>展示内容\u003c/strong>\u003c/h3>\n\u003cp>动态内容卡片展示以下内容：\u003c/p>\n\u003cul>\n\u003cli>动态封面\u003c/li>\n\u003cli>动态标题\u003c/li>\n\u003cli>发布者信息\u003c/li>\n\u003cli>上架时间\u003c/li>\n\u003cli>动态标签\u003c/li>\n\u003c/ul>\n\u003ch3>\u003cstrong>展示规则\u003c/strong>\u003c/h3>\n\u003cp>动态内容卡片样式需要全局统一。\u003c/p>\n\u003cp>动态封面比例需要与首页动态内容卡片保持一致。\u003c/p>\n\u003cp>卡片不展示额外简介文案。\u003c/p>\n\u003cp>动态标题展示在封面内容区域内。\u003c/p>\n\u003cp>发布者信息和上架时间展示在标题下方。\u003c/p>\n\u003cp>动态标签展示在卡片底部区域。\u003c/p>\n\u003cp>标签数量根据后台返回展示。\u003c/p>\n\u003cp>卡片内容布局需要在不同页面中保持一致，仅根据列表页布局调整卡片尺寸。\u003c/p>\n\u003cp>列表页中动态内容卡片需要适配 5 行 5 列布局，同时保证信息完整可读。\u003c/p>\n\u003ch3>\u003cstrong>交互规则\u003c/strong>\u003c/h3>\n\u003cp>点击动态内容卡片进入动态详情页。\u003c/p>\n\u003cp>点击动态标签跳转搜索结果页，并默认选中帖子分类。\u003c/p>\n\u003cp>鼠标悬浮动态内容卡片时，展示选中效果。\u003c/p>\n\u003cp>动态标签支持单独点击，不影响整个卡片点击区域。\u003c/p>\n\u003ch3>\u003cstrong>异常场景\u003c/strong>\u003c/h3>\n\u003cp>如果动态封面为空，展示默认封面占位图。\u003c/p>\n\u003cp>如果动态标题为空，展示默认标题“未命名动态”。\u003c/p>\n\u003cp>如果发布者信息为空，展示默认发布者。\u003c/p>\n\u003cp>如果上架时间为空，隐藏上架时间字段。\u003c/p>\n\u003cp>如果动态标签为空，隐藏标签区域。\u003c/p>\n\u003cp>如果动态详情链接为空，点击卡片不跳转。\u003c/p>\n\u003cp>如果动态标题过长，按组件规则截断或限制行数，不能撑破卡片布局。\u003c/p>\n\u003cp>如果卡片数据重复，列表渲染时需要去重，避免重复展示。\u003c/p>\n\u003cp>如果动态内容已下架，前端可根据后台返回状态决定隐藏卡片或展示下架态卡片。\u003c/p>\n\u003cp>如果展示下架态卡片，卡片需要增加“已下架”标识。\u003c/p>\n\u003cp>下架卡片封面需要做灰度、遮罩或弱化处理。\u003c/p>\n\u003cp>点击下架卡片时，不进入正常动态详情页。\u003c/p>\n\u003cp>点击下架卡片后，可提示“该内容已下架”或进入下架提示页。\u003c/p>\n\u003cp>下架内容的动态标签不再支持跳转。\u003c/p>","lines":139},{"id":"动态详情页-7","title":"动态详情页","file":"docs/notion-export/ExportBlock-4efbb5e9-6b52-48cb-8bcf-820483b4cd96-Part-1/Y12/动态详情页 3497db3145c3806da03afe2dc9a82bdc.md","raw":"# 动态详情页\n\n页面用途：\n\n动态详情页用于展示单条帖子 / 动态内容的完整详情，包括动态基础信息、正文内容、图片内容、视频内容、上一篇 / 下一篇切换、猜你喜欢和评论功能。本文档仅描述动态详情页主体内容，不包含全站通用组件。\n\n---\n\n## **页面主体结构**\n\n- 动态详情页主体从上至下包含：\n- 顶部广告位。\n- 动态标题。\n- 发布者、上架时间、动态标签。\n- 正文文案。\n- 图片内容。\n- 视频播放。\n- 动态标签区域。\n- 上一篇 / 下一篇切换按钮。\n- 底部广告位。\n- 评论功能。\n- 猜你喜欢列表。\n\n---\n\n## **二、顶部广告位**\n\n### 展示内容：\n\n- 顶部广告位展示在动态详情内容最上方。\n- 广告位展示广告封面、广告名称或广告文案。\n- 广告位用于承载动态详情页顶部推广内容。\n\n### 数据来源：\n\n- 广告数据由后台返回。\n- 后台可配置广告封面、广告名称、广告链接、排序值、开启状态。\n- 只有开启状态的广告才展示。\n\n### 交互规则：\n\n点击广告位跳转后台配置的广告链接。\n\n鼠标悬浮广告位时展示选中反馈。\n\n### 异常场景：\n\n- 如果广告数据为空，隐藏顶部广告位。\n- 如果广告状态为关闭，隐藏顶部广告位。\n- 如果广告封面加载失败，展示默认广告占位图。\n- 如果广告链接为空，点击广告位不跳转。\n\n---\n\n## **动态基础信息**\n\n### 展示内容：\n\n- 动态标题。\n- 发布者信息。\n- 上架时间。\n- 动态标签。\n- 浏览量。\n- 展示规则：\n- 动态标题展示在正文内容上方。\n- 发布者、上架时间、浏览量展示在同一信息区域。\n- 动态标签展示为标签按钮。\n- 标签数量根据后台返回展示。\n\n### 交互规则：\n\n- 点击动态标签跳转搜索结果页，并默认选中帖子分类。\n- 点击发布者信息可预留跳转发布者主页能力。\n- 异常场景：\n- 如果动态标题为空，展示默认标题“未命名动态”。\n- 如果发布者为空，展示默认发布者“匿名用户”。\n- 如果上架时间为空，隐藏上架时间字段。\n- 如果浏览量为空，展示 0。\n- 如果动态标签为空，隐藏标签区域。\n- 如果标签链接为空，点击标签不跳转。\n\n---\n\n## **正文文案**\n\n### 展示内容：\n\n- 正文区域展示当前动态的完整文字内容。\n- 正文支持多段文本展示。\n\n### 展示规则：\n\n- 正文按照后台返回的段落顺序展示。\n- 正文需要保持舒适行高和阅读间距。\n- 正文内容不做强制截断。\n\n### 异常场景：\n\n- 如果正文为空，展示空状态或隐藏正文区域。\n- 如果正文包含超长连续字符，需要自动换行，不能撑破内容区域。\n- 如果正文包含非法 HTML，前端需要过滤或转义后展示。\n\n---\n\n## **图片内容**\n\n### 展示内容：\n\n- 图片内容展示动态正文中的图片。\n- 图片可包含多张。\n- 图片支持不同原始比例，例如 16:9、9:16、1:1。\n\n### 展示规则：\n\n- 图片从上至下依次展示。\n- 每张图片宽度保持一致。\n- 图片原始比例保持不变。\n- 图片居中展示。\n- 图片之间保持统一间距。\n\n### 交互规则：\n\n- 点击图片可预留图片预览能力。\n- 鼠标悬浮图片时可展示轻微高亮反馈。\n\n### 异常场景：\n\n- 如果图片列表为空，隐藏图片区域。\n- 如果某张图片加载失败，展示默认图片占位。\n- 如果图片比例异常，仍按固定宽度等比例展示。\n- 如果图片数量较多，按后台返回顺序完整展示。\n\n---\n\n### **视频播放**\n\n#### 展示内容：\n\n- 动态详情页可展示一个视频播放器。\n- 视频播放器比例为 16:9。\n- 播放器用于播放与当前动态关联的视频内容。\n\n#### 展示规则：\n\n- 视频播放器展示在图片内容下方。\n- 视频播放器宽度与正文内容区域保持协调。\n- 播放器不展示额外边框。\n- 视频区域居中展示。\n\n#### 交互规则：\n\n- 播放器支持基础播放、暂停、进度控制、音量控制和全屏能力。\n- 如果使用浏览器原生播放器，交互以浏览器原生控件为准。\n\n#### 异常场景：\n\n- 如果动态未关联视频，隐藏视频播放区域。\n- 如果视频地址为空，展示视频不可播放状态或隐藏播放器。\n- 如果视频加载失败，展示加载失败提示。\n- 如果视频封面为空，使用默认封面或播放器默认背景。\n\n---\n\n## **动态标签区域**\n\n### 展示内容：\n\n- 视频播放下方再次展示动态标签。\n- 标签内容与动态基础信息中的标签保持一致。\n\n### 交互规则：\n\n- 点击标签跳转搜索结果页，并默认选中帖子分类。\n\n异常场景：\n\n- 如果动态标签为空，隐藏该区域。\n\n---\n\n## **上一篇 / 下一篇**\n\n### 展示内容：\n\n- 上一篇按钮。\n- 下一篇按钮。\n- 每个按钮展示方向标识和对应动态标题。\n\n### 交互规则：\n\n- 点击上一篇跳转上一条动态详情页。\n- 点击下一篇跳转下一条动态详情页。\n- 鼠标悬浮按钮时展示高亮反馈。\n\n## 异常场景：\n\n- 如果没有上一篇，上一篇按钮置灰或隐藏。\n- 如果没有下一篇，下一篇按钮置灰或隐藏。\n- 如果上一篇 / 下一篇链接为空，点击不跳转。\n\n---\n\n## **底部广告位**\n\n### 展示内容：\n\n- 底部广告位展示在上一篇 / 下一篇下方、评论功能上方。\n- 广告位展示广告封面、广告名称或广告文案。\n\n### 数据来源：\n\n- 广告数据由后台返回。\n- 后台可配置广告封面、广告名称、广告链接、开启状态。\n\n### 交互规则：\n\n- 点击广告位跳转后台配置的广告链接。\n\n### 异常场景：\n\n- 如果广告数据为空，隐藏底部广告位。\n- 如果广告状态为关闭，隐藏底部广告位。\n- 如果广告链接为空，点击不跳转。\n- 如果广告封面加载失败，展示默认广告占位图。\n\n---\n\n## **评论功能**\n\n### 展示内容：\n\n评论区包含评论列表、评论输入栏、字数统计、评论按钮和登录按钮。\n\n### 登录状态规则：\n\n- 用户已登录时，展示评论输入栏、字数统计和评论按钮。\n- 用户未登录时，隐藏评论输入栏、字数统计和评论按钮，展示登录按钮。\n- 未登录用户点击登录按钮后，打开登录弹窗或跳转登录页。\n- 登录成功后，评论区切换为已登录状态。\n\n### 输入规则：\n\n- 评论输入框最多输入 50 个字。\n- 输入框未输入内容时，评论按钮置灰不可点击。\n- 输入内容后，评论按钮高亮可点击。\n- 字数统计实时显示当前字数，例如 `0/50`。\n\n### 提交规则：\n\n- 点击评论按钮提交评论内容。\n- 提交中评论按钮置灰并显示加载状态，防止重复提交。\n- 提交成功后，评论内容添加到评论列表。\n- 提交成功后清空输入框，字数统计重置为 `0/50`。\n\n### 异常场景：\n\n- 如果用户未登录，不展示评论输入栏，只展示登录按钮。\n- 如果评论内容为空，评论按钮保持置灰。\n- 如果评论提交失败，保留输入内容并提示提交失败。\n- 如果评论列表为空，展示暂无评论状态。\n- 如果登录状态读取失败，默认按未登录状态处理。\n- 如果提交过程中用户重复点击评论按钮，只提交一次。\n\n---\n\n## **猜你喜欢列表**\n\n### 展示内容：\n\n- 猜你喜欢列表展示与当前动态相关的推荐内容。\n- 列表展示 8 条数据。\n- 列表底部展示 1 个广告位。\n- 广告位比例为 1:1。\n\n### 展示规则：\n\n- 猜你喜欢列表中的内容以卡片形式展示。\n- 推荐内容优先展示帖子 / 动态类内容。\n- 广告位展示在猜你喜欢列表底部。\n- 广告位展示广告封面和广告名称。\n\n### 交互规则：\n\n- 点击猜你喜欢内容卡片，跳转对应动态详情页。\n- 点击广告位，跳转后台配置的广告链接。\n- 鼠标悬浮卡片或广告位时展示选中效果。\n\n### 异常场景：\n\n- 如果猜你喜欢数据为空，隐藏猜你喜欢列表或展示空状态。\n- 如果猜你喜欢数据不足 8 条，按实际数量展示。\n- 如果广告数据为空，隐藏猜你喜欢底部广告位。\n- 如果推荐内容标题为空，展示默认标题“未命名动态”。\n- 如果推荐内容链接为空，点击卡片不跳转。","html":"\u003ch2>动态详情页\u003c/h2>\n\u003cp>页面用途：\u003c/p>\n\u003cp>动态详情页用于展示单条帖子 / 动态内容的完整详情，包括动态基础信息、正文内容、图片内容、视频内容、上一篇 / 下一篇切换、猜你喜欢和评论功能。本文档仅描述动态详情页主体内容，不包含全站通用组件。\u003c/p>\n\u003chr>\n\u003ch3>\u003cstrong>页面主体结构\u003c/strong>\u003c/h3>\n\u003cul>\n\u003cli>动态详情页主体从上至下包含：\u003c/li>\n\u003cli>顶部广告位。\u003c/li>\n\u003cli>动态标题。\u003c/li>\n\u003cli>发布者、上架时间、动态标签。\u003c/li>\n\u003cli>正文文案。\u003c/li>\n\u003cli>图片内容。\u003c/li>\n\u003cli>视频播放。\u003c/li>\n\u003cli>动态标签区域。\u003c/li>\n\u003cli>上一篇 / 下一篇切换按钮。\u003c/li>\n\u003cli>底部广告位。\u003c/li>\n\u003cli>评论功能。\u003c/li>\n\u003cli>猜你喜欢列表。\u003c/li>\n\u003c/ul>\n\u003chr>\n\u003ch3>\u003cstrong>二、顶部广告位\u003c/strong>\u003c/h3>\n\u003ch4>展示内容：\u003c/h4>\n\u003cul>\n\u003cli>顶部广告位展示在动态详情内容最上方。\u003c/li>\n\u003cli>广告位展示广告封面、广告名称或广告文案。\u003c/li>\n\u003cli>广告位用于承载动态详情页顶部推广内容。\u003c/li>\n\u003c/ul>\n\u003ch4>数据来源：\u003c/h4>\n\u003cul>\n\u003cli>广告数据由后台返回。\u003c/li>\n\u003cli>后台可配置广告封面、广告名称、广告链接、排序值、开启状态。\u003c/li>\n\u003cli>只有开启状态的广告才展示。\u003c/li>\n\u003c/ul>\n\u003ch4>交互规则：\u003c/h4>\n\u003cp>点击广告位跳转后台配置的广告链接。\u003c/p>\n\u003cp>鼠标悬浮广告位时展示选中反馈。\u003c/p>\n\u003ch4>异常场景：\u003c/h4>\n\u003cul>\n\u003cli>如果广告数据为空，隐藏顶部广告位。\u003c/li>\n\u003cli>如果广告状态为关闭，隐藏顶部广告位。\u003c/li>\n\u003cli>如果广告封面加载失败，展示默认广告占位图。\u003c/li>\n\u003cli>如果广告链接为空，点击广告位不跳转。\u003c/li>\n\u003c/ul>\n\u003chr>\n\u003ch3>\u003cstrong>动态基础信息\u003c/strong>\u003c/h3>\n\u003ch4>展示内容：\u003c/h4>\n\u003cul>\n\u003cli>动态标题。\u003c/li>\n\u003cli>发布者信息。\u003c/li>\n\u003cli>上架时间。\u003c/li>\n\u003cli>动态标签。\u003c/li>\n\u003cli>浏览量。\u003c/li>\n\u003cli>展示规则：\u003c/li>\n\u003cli>动态标题展示在正文内容上方。\u003c/li>\n\u003cli>发布者、上架时间、浏览量展示在同一信息区域。\u003c/li>\n\u003cli>动态标签展示为标签按钮。\u003c/li>\n\u003cli>标签数量根据后台返回展示。\u003c/li>\n\u003c/ul>\n\u003ch4>交互规则：\u003c/h4>\n\u003cul>\n\u003cli>点击动态标签跳转搜索结果页，并默认选中帖子分类。\u003c/li>\n\u003cli>点击发布者信息可预留跳转发布者主页能力。\u003c/li>\n\u003cli>异常场景：\u003c/li>\n\u003cli>如果动态标题为空，展示默认标题“未命名动态”。\u003c/li>\n\u003cli>如果发布者为空，展示默认发布者“匿名用户”。\u003c/li>\n\u003cli>如果上架时间为空，隐藏上架时间字段。\u003c/li>\n\u003cli>如果浏览量为空，展示 0。\u003c/li>\n\u003cli>如果动态标签为空，隐藏标签区域。\u003c/li>\n\u003cli>如果标签链接为空，点击标签不跳转。\u003c/li>\n\u003c/ul>\n\u003chr>\n\u003ch3>\u003cstrong>正文文案\u003c/strong>\u003c/h3>\n\u003ch4>展示内容：\u003c/h4>\n\u003cul>\n\u003cli>正文区域展示当前动态的完整文字内容。\u003c/li>\n\u003cli>正文支持多段文本展示。\u003c/li>\n\u003c/ul>\n\u003ch4>展示规则：\u003c/h4>\n\u003cul>\n\u003cli>正文按照后台返回的段落顺序展示。\u003c/li>\n\u003cli>正文需要保持舒适行高和阅读间距。\u003c/li>\n\u003cli>正文内容不做强制截断。\u003c/li>\n\u003c/ul>\n\u003ch4>异常场景：\u003c/h4>\n\u003cul>\n\u003cli>如果正文为空，展示空状态或隐藏正文区域。\u003c/li>\n\u003cli>如果正文包含超长连续字符，需要自动换行，不能撑破内容区域。\u003c/li>\n\u003cli>如果正文包含非法 HTML，前端需要过滤或转义后展示。\u003c/li>\n\u003c/ul>\n\u003chr>\n\u003ch3>\u003cstrong>图片内容\u003c/strong>\u003c/h3>\n\u003ch4>展示内容：\u003c/h4>\n\u003cul>\n\u003cli>图片内容展示动态正文中的图片。\u003c/li>\n\u003cli>图片可包含多张。\u003c/li>\n\u003cli>图片支持不同原始比例，例如 16:9、9:16、1:1。\u003c/li>\n\u003c/ul>\n\u003ch4>展示规则：\u003c/h4>\n\u003cul>\n\u003cli>图片从上至下依次展示。\u003c/li>\n\u003cli>每张图片宽度保持一致。\u003c/li>\n\u003cli>图片原始比例保持不变。\u003c/li>\n\u003cli>图片居中展示。\u003c/li>\n\u003cli>图片之间保持统一间距。\u003c/li>\n\u003c/ul>\n\u003ch4>交互规则：\u003c/h4>\n\u003cul>\n\u003cli>点击图片可预留图片预览能力。\u003c/li>\n\u003cli>鼠标悬浮图片时可展示轻微高亮反馈。\u003c/li>\n\u003c/ul>\n\u003ch4>异常场景：\u003c/h4>\n\u003cul>\n\u003cli>如果图片列表为空，隐藏图片区域。\u003c/li>\n\u003cli>如果某张图片加载失败，展示默认图片占位。\u003c/li>\n\u003cli>如果图片比例异常，仍按固定宽度等比例展示。\u003c/li>\n\u003cli>如果图片数量较多，按后台返回顺序完整展示。\u003c/li>\n\u003c/ul>\n\u003chr>\n\u003ch4>\u003cstrong>视频播放\u003c/strong>\u003c/h4>\n\u003ch5>展示内容：\u003c/h5>\n\u003cul>\n\u003cli>动态详情页可展示一个视频播放器。\u003c/li>\n\u003cli>视频播放器比例为 16:9。\u003c/li>\n\u003cli>播放器用于播放与当前动态关联的视频内容。\u003c/li>\n\u003c/ul>\n\u003ch5>展示规则：\u003c/h5>\n\u003cul>\n\u003cli>视频播放器展示在图片内容下方。\u003c/li>\n\u003cli>视频播放器宽度与正文内容区域保持协调。\u003c/li>\n\u003cli>播放器不展示额外边框。\u003c/li>\n\u003cli>视频区域居中展示。\u003c/li>\n\u003c/ul>\n\u003ch5>交互规则：\u003c/h5>\n\u003cul>\n\u003cli>播放器支持基础播放、暂停、进度控制、音量控制和全屏能力。\u003c/li>\n\u003cli>如果使用浏览器原生播放器，交互以浏览器原生控件为准。\u003c/li>\n\u003c/ul>\n\u003ch5>异常场景：\u003c/h5>\n\u003cul>\n\u003cli>如果动态未关联视频，隐藏视频播放区域。\u003c/li>\n\u003cli>如果视频地址为空，展示视频不可播放状态或隐藏播放器。\u003c/li>\n\u003cli>如果视频加载失败，展示加载失败提示。\u003c/li>\n\u003cli>如果视频封面为空，使用默认封面或播放器默认背景。\u003c/li>\n\u003c/ul>\n\u003chr>\n\u003ch3>\u003cstrong>动态标签区域\u003c/strong>\u003c/h3>\n\u003ch4>展示内容：\u003c/h4>\n\u003cul>\n\u003cli>视频播放下方再次展示动态标签。\u003c/li>\n\u003cli>标签内容与动态基础信息中的标签保持一致。\u003c/li>\n\u003c/ul>\n\u003ch4>交互规则：\u003c/h4>\n\u003cul>\n\u003cli>点击标签跳转搜索结果页，并默认选中帖子分类。\u003c/li>\n\u003c/ul>\n\u003cp>异常场景：\u003c/p>\n\u003cul>\n\u003cli>如果动态标签为空，隐藏该区域。\u003c/li>\n\u003c/ul>\n\u003chr>\n\u003ch3>\u003cstrong>上一篇 / 下一篇\u003c/strong>\u003c/h3>\n\u003ch4>展示内容：\u003c/h4>\n\u003cul>\n\u003cli>上一篇按钮。\u003c/li>\n\u003cli>下一篇按钮。\u003c/li>\n\u003cli>每个按钮展示方向标识和对应动态标题。\u003c/li>\n\u003c/ul>\n\u003ch4>交互规则：\u003c/h4>\n\u003cul>\n\u003cli>点击上一篇跳转上一条动态详情页。\u003c/li>\n\u003cli>点击下一篇跳转下一条动态详情页。\u003c/li>\n\u003cli>鼠标悬浮按钮时展示高亮反馈。\u003c/li>\n\u003c/ul>\n\u003ch3>异常场景：\u003c/h3>\n\u003cul>\n\u003cli>如果没有上一篇，上一篇按钮置灰或隐藏。\u003c/li>\n\u003cli>如果没有下一篇，下一篇按钮置灰或隐藏。\u003c/li>\n\u003cli>如果上一篇 / 下一篇链接为空，点击不跳转。\u003c/li>\n\u003c/ul>\n\u003chr>\n\u003ch3>\u003cstrong>底部广告位\u003c/strong>\u003c/h3>\n\u003ch4>展示内容：\u003c/h4>\n\u003cul>\n\u003cli>底部广告位展示在上一篇 / 下一篇下方、评论功能上方。\u003c/li>\n\u003cli>广告位展示广告封面、广告名称或广告文案。\u003c/li>\n\u003c/ul>\n\u003ch4>数据来源：\u003c/h4>\n\u003cul>\n\u003cli>广告数据由后台返回。\u003c/li>\n\u003cli>后台可配置广告封面、广告名称、广告链接、开启状态。\u003c/li>\n\u003c/ul>\n\u003ch4>交互规则：\u003c/h4>\n\u003cul>\n\u003cli>点击广告位跳转后台配置的广告链接。\u003c/li>\n\u003c/ul>\n\u003ch4>异常场景：\u003c/h4>\n\u003cul>\n\u003cli>如果广告数据为空，隐藏底部广告位。\u003c/li>\n\u003cli>如果广告状态为关闭，隐藏底部广告位。\u003c/li>\n\u003cli>如果广告链接为空，点击不跳转。\u003c/li>\n\u003cli>如果广告封面加载失败，展示默认广告占位图。\u003c/li>\n\u003c/ul>\n\u003chr>\n\u003ch3>\u003cstrong>评论功能\u003c/strong>\u003c/h3>\n\u003ch4>展示内容：\u003c/h4>\n\u003cp>评论区包含评论列表、评论输入栏、字数统计、评论按钮和登录按钮。\u003c/p>\n\u003ch4>登录状态规则：\u003c/h4>\n\u003cul>\n\u003cli>用户已登录时，展示评论输入栏、字数统计和评论按钮。\u003c/li>\n\u003cli>用户未登录时，隐藏评论输入栏、字数统计和评论按钮，展示登录按钮。\u003c/li>\n\u003cli>未登录用户点击登录按钮后，打开登录弹窗或跳转登录页。\u003c/li>\n\u003cli>登录成功后，评论区切换为已登录状态。\u003c/li>\n\u003c/ul>\n\u003ch4>输入规则：\u003c/h4>\n\u003cul>\n\u003cli>评论输入框最多输入 50 个字。\u003c/li>\n\u003cli>输入框未输入内容时，评论按钮置灰不可点击。\u003c/li>\n\u003cli>输入内容后，评论按钮高亮可点击。\u003c/li>\n\u003cli>字数统计实时显示当前字数，例如 \u003ccode>0/50\u003c/code>。\u003c/li>\n\u003c/ul>\n\u003ch4>提交规则：\u003c/h4>\n\u003cul>\n\u003cli>点击评论按钮提交评论内容。\u003c/li>\n\u003cli>提交中评论按钮置灰并显示加载状态，防止重复提交。\u003c/li>\n\u003cli>提交成功后，评论内容添加到评论列表。\u003c/li>\n\u003cli>提交成功后清空输入框，字数统计重置为 \u003ccode>0/50\u003c/code>。\u003c/li>\n\u003c/ul>\n\u003ch4>异常场景：\u003c/h4>\n\u003cul>\n\u003cli>如果用户未登录，不展示评论输入栏，只展示登录按钮。\u003c/li>\n\u003cli>如果评论内容为空，评论按钮保持置灰。\u003c/li>\n\u003cli>如果评论提交失败，保留输入内容并提示提交失败。\u003c/li>\n\u003cli>如果评论列表为空，展示暂无评论状态。\u003c/li>\n\u003cli>如果登录状态读取失败，默认按未登录状态处理。\u003c/li>\n\u003cli>如果提交过程中用户重复点击评论按钮，只提交一次。\u003c/li>\n\u003c/ul>\n\u003chr>\n\u003ch3>\u003cstrong>猜你喜欢列表\u003c/strong>\u003c/h3>\n\u003ch4>展示内容：\u003c/h4>\n\u003cul>\n\u003cli>猜你喜欢列表展示与当前动态相关的推荐内容。\u003c/li>\n\u003cli>列表展示 8 条数据。\u003c/li>\n\u003cli>列表底部展示 1 个广告位。\u003c/li>\n\u003cli>广告位比例为 1:1。\u003c/li>\n\u003c/ul>\n\u003ch4>展示规则：\u003c/h4>\n\u003cul>\n\u003cli>猜你喜欢列表中的内容以卡片形式展示。\u003c/li>\n\u003cli>推荐内容优先展示帖子 / 动态类内容。\u003c/li>\n\u003cli>广告位展示在猜你喜欢列表底部。\u003c/li>\n\u003cli>广告位展示广告封面和广告名称。\u003c/li>\n\u003c/ul>\n\u003ch4>交互规则：\u003c/h4>\n\u003cul>\n\u003cli>点击猜你喜欢内容卡片，跳转对应动态详情页。\u003c/li>\n\u003cli>点击广告位，跳转后台配置的广告链接。\u003c/li>\n\u003cli>鼠标悬浮卡片或广告位时展示选中效果。\u003c/li>\n\u003c/ul>\n\u003ch4>异常场景：\u003c/h4>\n\u003cul>\n\u003cli>如果猜你喜欢数据为空，隐藏猜你喜欢列表或展示空状态。\u003c/li>\n\u003cli>如果猜你喜欢数据不足 8 条，按实际数量展示。\u003c/li>\n\u003cli>如果广告数据为空，隐藏猜你喜欢底部广告位。\u003c/li>\n\u003cli>如果推荐内容标题为空，展示默认标题“未命名动态”。\u003c/li>\n\u003cli>如果推荐内容链接为空，点击卡片不跳转。\u003c/li>\n\u003c/ul>","lines":294},{"id":"动态详情页底部广告-dynamicbottomy12-8","title":"动态详情页底部广告：dynamicBottomY12","file":"docs/notion-export/ExportBlock-4efbb5e9-6b52-48cb-8bcf-820483b4cd96-Part-1/Y12/动态详情页底部广告：dynamicBottomY12 3497db3145c3809ba08acf2eef3eb9b5.md","raw":"# 动态详情页底部广告：dynamicBottomY12\n\n广告标识：dynamicBottomY12\n\n### **组件用途**\n\n动态详情页底部广告用于在上一篇 / 下一篇与评论区之间展示广告内容。\n\n### **展示规则**\n\n广告展示在动态详情页底部内容区域。\n\n广告可展示广告封面、广告名称或广告文案。\n\n### **交互规则**\n\n点击广告位跳转广告链接。\n\n### **异常场景**\n\n如果广告为空，隐藏该广告位。\n\n如果广告封面为空，展示默认占位图。\n\n如果广告链接为空，点击不跳转。","html":"\u003ch2>动态详情页底部广告：dynamicBottomY12\u003c/h2>\n\u003cp>广告标识：dynamicBottomY12\u003c/p>\n\u003ch4>\u003cstrong>组件用途\u003c/strong>\u003c/h4>\n\u003cp>动态详情页底部广告用于在上一篇 / 下一篇与评论区之间展示广告内容。\u003c/p>\n\u003ch4>\u003cstrong>展示规则\u003c/strong>\u003c/h4>\n\u003cp>广告展示在动态详情页底部内容区域。\u003c/p>\n\u003cp>广告可展示广告封面、广告名称或广告文案。\u003c/p>\n\u003ch4>\u003cstrong>交互规则\u003c/strong>\u003c/h4>\n\u003cp>点击广告位跳转广告链接。\u003c/p>\n\u003ch4>\u003cstrong>异常场景\u003c/strong>\u003c/h4>\n\u003cp>如果广告为空，隐藏该广告位。\u003c/p>\n\u003cp>如果广告封面为空，展示默认占位图。\u003c/p>\n\u003cp>如果广告链接为空，点击不跳转。\u003c/p>","lines":25},{"id":"动态详情页猜你喜欢广告-dynamicguessy12-9","title":"动态详情页猜你喜欢广告：dynamicGuessY12","file":"docs/notion-export/ExportBlock-4efbb5e9-6b52-48cb-8bcf-820483b4cd96-Part-1/Y12/动态详情页猜你喜欢广告：dynamicGuessY12 3497db3145c380ea8e53d0d3ba8fa008.md","raw":"# 动态详情页猜你喜欢广告：dynamicGuessY12\n\n广告标识：dynamicGuessY12\n\n### **组件用途**\n\n动态详情页猜你喜欢广告用于展示在猜你喜欢列表底部的广告位。\n\n### **展示规则**\n\n广告展示在猜你喜欢列表底部。\n\n广告比例为 1:1。\n\n广告展示广告封面和广告名称。\n\n### **交互规则**\n\n点击广告卡片跳转广告链接。\n\n### **异常场景**\n\n如果广告为空，隐藏该广告位。\n\n如果广告封面为空，展示默认封面。\n\n如果广告名称为空，展示默认名称“广告位”。\n\n如果广告链接为空，点击不跳转。","html":"\u003ch2>动态详情页猜你喜欢广告：dynamicGuessY12\u003c/h2>\n\u003cp>广告标识：dynamicGuessY12\u003c/p>\n\u003ch4>\u003cstrong>组件用途\u003c/strong>\u003c/h4>\n\u003cp>动态详情页猜你喜欢广告用于展示在猜你喜欢列表底部的广告位。\u003c/p>\n\u003ch4>\u003cstrong>展示规则\u003c/strong>\u003c/h4>\n\u003cp>广告展示在猜你喜欢列表底部。\u003c/p>\n\u003cp>广告比例为 1:1。\u003c/p>\n\u003cp>广告展示广告封面和广告名称。\u003c/p>\n\u003ch4>\u003cstrong>交互规则\u003c/strong>\u003c/h4>\n\u003cp>点击广告卡片跳转广告链接。\u003c/p>\n\u003ch4>\u003cstrong>异常场景\u003c/strong>\u003c/h4>\n\u003cp>如果广告为空，隐藏该广告位。\u003c/p>\n\u003cp>如果广告封面为空，展示默认封面。\u003c/p>\n\u003cp>如果广告名称为空，展示默认名称“广告位”。\u003c/p>\n\u003cp>如果广告链接为空，点击不跳转。\u003c/p>","lines":29},{"id":"动态详情页顶部广告-dynamictopy12-10","title":"动态详情页顶部广告：dynamicTopY12","file":"docs/notion-export/ExportBlock-4efbb5e9-6b52-48cb-8bcf-820483b4cd96-Part-1/Y12/动态详情页顶部广告：dynamicTopY12 3497db3145c380d98b06e78653316695.md","raw":"# 动态详情页顶部广告：dynamicTopY12\n\n广告标识：dynamicTopY12\n\n### **组件用途**\n\n动态详情页顶部广告用于在动态详情主体顶部展示广告内容。\n\n### **展示规则**\n\n广告位展示在动态标题上方。\n\n广告可展示广告封面、广告名称或广告文案。\n\n广告宽度与正文区域保持协调。\n\n### **交互规则**\n\n点击广告位跳转广告链接。\n\n### **异常场景**\n\n如果广告为空，隐藏该广告位。\n\n如果广告封面加载失败，展示默认广告占位图。\n\n如果广告链接为空，点击不跳转。","html":"\u003ch2>动态详情页顶部广告：dynamicTopY12\u003c/h2>\n\u003cp>广告标识：dynamicTopY12\u003c/p>\n\u003ch4>\u003cstrong>组件用途\u003c/strong>\u003c/h4>\n\u003cp>动态详情页顶部广告用于在动态详情主体顶部展示广告内容。\u003c/p>\n\u003ch4>\u003cstrong>展示规则\u003c/strong>\u003c/h4>\n\u003cp>广告位展示在动态标题上方。\u003c/p>\n\u003cp>广告可展示广告封面、广告名称或广告文案。\u003c/p>\n\u003cp>广告宽度与正文区域保持协调。\u003c/p>\n\u003ch4>\u003cstrong>交互规则\u003c/strong>\u003c/h4>\n\u003cp>点击广告位跳转广告链接。\u003c/p>\n\u003ch4>\u003cstrong>异常场景\u003c/strong>\u003c/h4>\n\u003cp>如果广告为空，隐藏该广告位。\u003c/p>\n\u003cp>如果广告封面加载失败，展示默认广告占位图。\u003c/p>\n\u003cp>如果广告链接为空，点击不跳转。\u003c/p>","lines":27},{"id":"封面页内容区-11","title":"封面页内容区","file":"docs/notion-export/ExportBlock-4efbb5e9-6b52-48cb-8bcf-820483b4cd96-Part-1/Y12/封面页内容区 3497db3145c38083a9fbe67af533c9d7.md","raw":"# 封面页内容区\n\n封面页内容区用于展示首页核心内容模块，包括固定视频模块和后台配置的一级菜单内容模块。该区域用于承载首页主要内容消费入口，帮助用户快速浏览推荐内容（猜你喜欢）、每日更新内容、随机视频内容以及后台配置的菜单内容。\n\n## 主要展示内容：\n\n- 封面页内容区包含固定模块和一级菜单模块。 固定模块包含：猜你喜欢、每日更新、随机视频。\n- 一级菜单模块由后台配置返回。\n- 当前页面中展示的一级菜单均为示例菜单，实际菜单名称、排序、菜单数量和内容数据以后台返回为准。\n\n## 固定模块规则：\n\n- 固定模块包含猜你喜欢、每日更新、随机视频。\n- 固定模块位置固定，不受后台一级菜单排序影响。 固定模块内容类型固定为长视频。\n- 固定模块样式固定为两行五列。 固定模块每个模块展示 10 条长视频内容。\n- 固定模块的视频内容卡片样式与全局视频内容卡片保持一致。\n- 固定模块可根据业务需要支持“换一批”刷新当前模块内容。\n\n## 一级菜单展示规则：\n\n- 封面页内容区展示的一级菜单由后台配置返回。\n- 只有满足以下条件的一级菜单才展示在封面页内容区： 状态为非禁用。\n- 菜单类型为展示媒体内容。 后台配置为展示在封面页。 不满足以上条件的一级菜单不展示，也不占位。\n- 一级菜单名称、排序、菜单数量和具体内容均以后台返回为准。 一级菜单按照后台配置的排序值展示。\n- 如果后台未返回排序值，则按接口返回顺序展示。 一级菜单内容样式固定为一行五列。\n- 每个一级菜单模块展示 5 条内容。 一级菜单内容卡片样式根据后台返回的内容类型决定，帖子使用动态内容卡片，长视频使用视频内容卡片。\n\n## 模块排序规则：\n\n- 固定模块猜你喜欢、每日更新、随机视频的位置固定。\n- 后台配置的一级菜单模块按照后台排序插入到内容区。\n- 如果后台未明确一级菜单插入位置，默认展示在固定模块之间或固定模块之后，具体以产品配置为准。\n- 当前静态页面仅用于展示示例布局，不代表最终线上排序。\n\n## 交互规则：\n\n- 点击视频内容卡片进入视频详情页。\n- 点击动态内容卡片进入动态详情页。\n- 点击固定模块中的“换一批”按钮，刷新当前固定模块内容。\n- 点击一级菜单模块中的“查看更多”按钮，跳转至对应内容列表页。\n- 点击一级菜单内容卡片，跳转至对应内容详情页。 鼠标悬浮内容卡片时展示选中效果。\n- 鼠标悬浮按钮时展示高亮反馈。\n\n## 异常场景：\n\n- 如果固定模块内容为空，该固定模块可展示空状态或隐藏内容列表，但模块标题仍可保留。\n- 如果固定模块接口加载失败，展示空状态，不影响其他模块展示。\n- 如果固定模块返回内容不足 10 条，按实际返回数量展示，不用空卡片补位。\n- 如果点击“换一批”后无新数据，保持当前内容不变或提示暂无更多内容。\n- 如果后台未返回一级菜单，封面页内容区只展示固定模块。\n- 如果一级菜单状态为禁用，该菜单不展示。","html":"\u003ch2>封面页内容区\u003c/h2>\n\u003cp>封面页内容区用于展示首页核心内容模块，包括固定视频模块和后台配置的一级菜单内容模块。该区域用于承载首页主要内容消费入口，帮助用户快速浏览推荐内容（猜你喜欢）、每日更新内容、随机视频内容以及后台配置的菜单内容。\u003c/p>\n\u003ch3>主要展示内容：\u003c/h3>\n\u003cul>\n\u003cli>封面页内容区包含固定模块和一级菜单模块。 固定模块包含：猜你喜欢、每日更新、随机视频。\u003c/li>\n\u003cli>一级菜单模块由后台配置返回。\u003c/li>\n\u003cli>当前页面中展示的一级菜单均为示例菜单，实际菜单名称、排序、菜单数量和内容数据以后台返回为准。\u003c/li>\n\u003c/ul>\n\u003ch3>固定模块规则：\u003c/h3>\n\u003cul>\n\u003cli>固定模块包含猜你喜欢、每日更新、随机视频。\u003c/li>\n\u003cli>固定模块位置固定，不受后台一级菜单排序影响。 固定模块内容类型固定为长视频。\u003c/li>\n\u003cli>固定模块样式固定为两行五列。 固定模块每个模块展示 10 条长视频内容。\u003c/li>\n\u003cli>固定模块的视频内容卡片样式与全局视频内容卡片保持一致。\u003c/li>\n\u003cli>固定模块可根据业务需要支持“换一批”刷新当前模块内容。\u003c/li>\n\u003c/ul>\n\u003ch3>一级菜单展示规则：\u003c/h3>\n\u003cul>\n\u003cli>封面页内容区展示的一级菜单由后台配置返回。\u003c/li>\n\u003cli>只有满足以下条件的一级菜单才展示在封面页内容区： 状态为非禁用。\u003c/li>\n\u003cli>菜单类型为展示媒体内容。 后台配置为展示在封面页。 不满足以上条件的一级菜单不展示，也不占位。\u003c/li>\n\u003cli>一级菜单名称、排序、菜单数量和具体内容均以后台返回为准。 一级菜单按照后台配置的排序值展示。\u003c/li>\n\u003cli>如果后台未返回排序值，则按接口返回顺序展示。 一级菜单内容样式固定为一行五列。\u003c/li>\n\u003cli>每个一级菜单模块展示 5 条内容。 一级菜单内容卡片样式根据后台返回的内容类型决定，帖子使用动态内容卡片，长视频使用视频内容卡片。\u003c/li>\n\u003c/ul>\n\u003ch3>模块排序规则：\u003c/h3>\n\u003cul>\n\u003cli>固定模块猜你喜欢、每日更新、随机视频的位置固定。\u003c/li>\n\u003cli>后台配置的一级菜单模块按照后台排序插入到内容区。\u003c/li>\n\u003cli>如果后台未明确一级菜单插入位置，默认展示在固定模块之间或固定模块之后，具体以产品配置为准。\u003c/li>\n\u003cli>当前静态页面仅用于展示示例布局，不代表最终线上排序。\u003c/li>\n\u003c/ul>\n\u003ch3>交互规则：\u003c/h3>\n\u003cul>\n\u003cli>点击视频内容卡片进入视频详情页。\u003c/li>\n\u003cli>点击动态内容卡片进入动态详情页。\u003c/li>\n\u003cli>点击固定模块中的“换一批”按钮，刷新当前固定模块内容。\u003c/li>\n\u003cli>点击一级菜单模块中的“查看更多”按钮，跳转至对应内容列表页。\u003c/li>\n\u003cli>点击一级菜单内容卡片，跳转至对应内容详情页。 鼠标悬浮内容卡片时展示选中效果。\u003c/li>\n\u003cli>鼠标悬浮按钮时展示高亮反馈。\u003c/li>\n\u003c/ul>\n\u003ch3>异常场景：\u003c/h3>\n\u003cul>\n\u003cli>如果固定模块内容为空，该固定模块可展示空状态或隐藏内容列表，但模块标题仍可保留。\u003c/li>\n\u003cli>如果固定模块接口加载失败，展示空状态，不影响其他模块展示。\u003c/li>\n\u003cli>如果固定模块返回内容不足 10 条，按实际返回数量展示，不用空卡片补位。\u003c/li>\n\u003cli>如果点击“换一批”后无新数据，保持当前内容不变或提示暂无更多内容。\u003c/li>\n\u003cli>如果后台未返回一级菜单，封面页内容区只展示固定模块。\u003c/li>\n\u003cli>如果一级菜单状态为禁用，该菜单不展示。\u003c/li>\n\u003c/ul>","lines":51},{"id":"帖子列表广告-postlisty12-12","title":"帖子列表广告：postListY12","file":"docs/notion-export/ExportBlock-4efbb5e9-6b52-48cb-8bcf-820483b4cd96-Part-1/Y12/帖子列表广告：postListY12 3497db3145c3807bafe2e8e0c36c4d87.md","raw":"# 帖子列表广告：postListY12\n\n广告标识：postListY12\n\n### **组件用途**\n\n帖子列表广告用于在帖子内容流中插入广告卡片，提升列表内容中的广告曝光。\n\n### **展示规则**\n\n广告卡片插入到帖子列表中。\n\n广告卡片尺寸与动态内容卡片一致。\n\n广告封面铺满整个卡片。\n\n广告名称以底部浮层形式展示。\n\n底部浮层透明度为 60%。\n\n### **交互规则**\n\n点击广告卡片跳转广告链接。\n\n鼠标悬浮广告卡片时展示选中效果。\n\n### **异常场景**\n\n如果广告为空，不插入广告卡片。\n\n如果广告封面为空，展示默认广告封面。\n\n如果广告名称为空，展示“广告位”。\n\n如果广告链接为空，点击不跳转。","html":"\u003ch2>帖子列表广告：postListY12\u003c/h2>\n\u003cp>广告标识：postListY12\u003c/p>\n\u003ch4>\u003cstrong>组件用途\u003c/strong>\u003c/h4>\n\u003cp>帖子列表广告用于在帖子内容流中插入广告卡片，提升列表内容中的广告曝光。\u003c/p>\n\u003ch4>\u003cstrong>展示规则\u003c/strong>\u003c/h4>\n\u003cp>广告卡片插入到帖子列表中。\u003c/p>\n\u003cp>广告卡片尺寸与动态内容卡片一致。\u003c/p>\n\u003cp>广告封面铺满整个卡片。\u003c/p>\n\u003cp>广告名称以底部浮层形式展示。\u003c/p>\n\u003cp>底部浮层透明度为 60%。\u003c/p>\n\u003ch4>\u003cstrong>交互规则\u003c/strong>\u003c/h4>\n\u003cp>点击广告卡片跳转广告链接。\u003c/p>\n\u003cp>鼠标悬浮广告卡片时展示选中效果。\u003c/p>\n\u003ch4>\u003cstrong>异常场景\u003c/strong>\u003c/h4>\n\u003cp>如果广告为空，不插入广告卡片。\u003c/p>\n\u003cp>如果广告封面为空，展示默认广告封面。\u003c/p>\n\u003cp>如果广告名称为空，展示“广告位”。\u003c/p>\n\u003cp>如果广告链接为空，点击不跳转。\u003c/p>","lines":35},{"id":"帖子列表页-13","title":"帖子列表页","file":"docs/notion-export/ExportBlock-4efbb5e9-6b52-48cb-8bcf-820483b4cd96-Part-1/Y12/帖子列表页 3497db3145c3804d93e0ca389533fa29.md","raw":"# 帖子列表页\n\n页面用途：\n\n帖子列表页用于展示帖子 / 动态类内容列表，承接顶部菜单中的帖子类菜单跳转和封面页中帖子类内容的“查看更多”入口。页面支持排序、分页、广告插入和内容卡片跳转。本文档仅描述帖子列表页主体内容，不包含全站通用组件。\n\n---\n\n## **页面主体结构**\n\n- 帖子列表页主体从上至下包含：\n- 当前菜单名称展示区域。\n- 排序筛选区域。\n- 帖子内容列表。\n- 分页器。\n\n---\n\n## **当前菜单名称展示区域**\n\n### 展示内容：\n\n- 展示当前菜单名称。\n- 页面标题区域显示为当前菜单名称，而不是固定写死“帖子列表页”。\n\n### 展示规则：\n\n- 如果当前菜单为帖子类菜单，则页面标题展示对应菜单名称。\n- 例如：一级菜单A（帖子）。\n- 标题区域只展示菜单名称，不展示额外说明文案。\n\n### 异常场景：\n\n- 如果菜单名称为空，展示默认标题“帖子列表”。\n- 如果菜单参数解析失败，展示默认标题“帖子列表”。\n- 如果后台未返回菜单名称，使用 URL 参数或默认标题兜底。\n\n---\n\n## **排序筛选区域**\n\n### 展示内容：\n\n- 排序按钮包含：最新上架、最多点赞、最多观看、随机展示。\n- 当前选中的排序按钮需要高亮。\n- 默认选中最新上架。\n\n### 交互规则：\n\n- 点击排序按钮后，列表按对应规则刷新。\n- 切换排序时，同步更新 URL 参数中的 sort。\n- 切换排序后，分页重置为第 1 页。\n- 排序按钮只影响当前帖子列表内容。\n\n### 异常场景：\n\n- 如果排序接口请求失败，保留当前列表并提示加载失败。\n- 如果某个排序字段缺失，按默认排序或接口返回顺序展示。\n- 如果随机展示无新数据，仍保持当前排序按钮选中态。\n\n---\n\n## **帖子内容列表**\n\n### 展示内容：\n\n- 帖子列表展示动态内容卡片。\n- 列表整体为 5 行 5 列布局。\n- 每页最多展示 25 条帖子数据。\n- 列表中可插入一条广告位。\n- 广告位尺寸与动态内容卡片保持一致。\n\n### 数据来源：\n\n- 帖子列表数据由后台返回。\n- 后台返回内容包括帖子 ID、封面、标题、发布者、上架时间、标签、浏览量、点赞量、详情链接等。\n- 广告数据由后台返回。\n\n### 展示规则：\n\n- 动态内容卡片样式与全局动态内容卡片保持一致。\n- 动态卡片封面比例需要与首页动态内容卡片保持一致。\n- 动态卡片展示内容包括：动态封面、动态标题、发布者信息、上架时间、动态标签。\n- 不展示额外简介文案。\n- 列表中的广告卡片使用独立广告样式，尺寸与动态卡片一致。\n- 广告封面铺满整个广告卡片，广告名称作为底部浮层展示。\n- 广告底部浮层透明度为 60%。\n\n### 交互规则：\n\n- 点击动态内容卡片进入动态详情页。\n- 点击动态标签跳转搜索结果页，并默认选中帖子分类。\n- 鼠标悬浮动态卡片时展示选中效果。\n- 点击广告卡片跳转后台配置广告链接。\n- 如果广告链接为空，点击广告卡片不跳转。\n\n### 异常场景：\n\n- 如果帖子列表为空，展示空状态。\n- 如果帖子数据不足 25 条，按实际数量展示。\n- 如果封面为空，展示默认封面占位。\n- 如果标题为空，展示默认标题“未命名动态”。\n- 如果发布者为空，展示默认发布者。\n- 如果上架时间为空，隐藏上架时间字段。\n- 如果标签为空，隐藏标签区域。\n- 如果详情链接为空，点击卡片不跳转。\n- 如果后台返回重复帖子 ID，需要去重，避免重复卡片。\n- 如果广告数据为空，不插入广告卡片。\n- 如果广告封面加载失败，展示默认广告占位图。\n- 如果广告名称为空，展示默认名称“广告位”。\n- 如果广告链接异常，点击广告卡片不跳转。\n- 如果广告插入位置数据异常，默认插入到当前页中部或固定位置。\n\n---\n\n## **分页器**\n\n### 展示内容：\n\n- 分页器展示上一页、页码、下一页。\n- 当前页码高亮。\n\n### 数据规则：\n\n- 默认页码为第 1 页。\n- 分页器根据帖子列表总数计算总页数。\n\n### 交互规则：\n\n- 点击页码切换到对应页。\n- 点击上一页切换到上一页。\n- 点击下一页切换到下一页。\n- 分页切换后刷新当前列表数据。\n\n### 异常场景：\n\n- 如果当前页超过最大页数，重置为最后一页。\n- 如果当前页为第 1 页，上一页按钮置灰不可点击。\n- 如果当前页为最后一页，下一页按钮置灰不可点击。\n- 如果帖子总数为 0，隐藏分页器。\n- 如果分页接口加载失败，保留当前页内容并提示加载失败。","html":"\u003ch2>帖子列表页\u003c/h2>\n\u003cp>页面用途：\u003c/p>\n\u003cp>帖子列表页用于展示帖子 / 动态类内容列表，承接顶部菜单中的帖子类菜单跳转和封面页中帖子类内容的“查看更多”入口。页面支持排序、分页、广告插入和内容卡片跳转。本文档仅描述帖子列表页主体内容，不包含全站通用组件。\u003c/p>\n\u003chr>\n\u003ch3>\u003cstrong>页面主体结构\u003c/strong>\u003c/h3>\n\u003cul>\n\u003cli>帖子列表页主体从上至下包含：\u003c/li>\n\u003cli>当前菜单名称展示区域。\u003c/li>\n\u003cli>排序筛选区域。\u003c/li>\n\u003cli>帖子内容列表。\u003c/li>\n\u003cli>分页器。\u003c/li>\n\u003c/ul>\n\u003chr>\n\u003ch3>\u003cstrong>当前菜单名称展示区域\u003c/strong>\u003c/h3>\n\u003ch4>展示内容：\u003c/h4>\n\u003cul>\n\u003cli>展示当前菜单名称。\u003c/li>\n\u003cli>页面标题区域显示为当前菜单名称，而不是固定写死“帖子列表页”。\u003c/li>\n\u003c/ul>\n\u003ch4>展示规则：\u003c/h4>\n\u003cul>\n\u003cli>如果当前菜单为帖子类菜单，则页面标题展示对应菜单名称。\u003c/li>\n\u003cli>例如：一级菜单A（帖子）。\u003c/li>\n\u003cli>标题区域只展示菜单名称，不展示额外说明文案。\u003c/li>\n\u003c/ul>\n\u003ch4>异常场景：\u003c/h4>\n\u003cul>\n\u003cli>如果菜单名称为空，展示默认标题“帖子列表”。\u003c/li>\n\u003cli>如果菜单参数解析失败，展示默认标题“帖子列表”。\u003c/li>\n\u003cli>如果后台未返回菜单名称，使用 URL 参数或默认标题兜底。\u003c/li>\n\u003c/ul>\n\u003chr>\n\u003ch3>\u003cstrong>排序筛选区域\u003c/strong>\u003c/h3>\n\u003ch4>展示内容：\u003c/h4>\n\u003cul>\n\u003cli>排序按钮包含：最新上架、最多点赞、最多观看、随机展示。\u003c/li>\n\u003cli>当前选中的排序按钮需要高亮。\u003c/li>\n\u003cli>默认选中最新上架。\u003c/li>\n\u003c/ul>\n\u003ch4>交互规则：\u003c/h4>\n\u003cul>\n\u003cli>点击排序按钮后，列表按对应规则刷新。\u003c/li>\n\u003cli>切换排序时，同步更新 URL 参数中的 sort。\u003c/li>\n\u003cli>切换排序后，分页重置为第 1 页。\u003c/li>\n\u003cli>排序按钮只影响当前帖子列表内容。\u003c/li>\n\u003c/ul>\n\u003ch4>异常场景：\u003c/h4>\n\u003cul>\n\u003cli>如果排序接口请求失败，保留当前列表并提示加载失败。\u003c/li>\n\u003cli>如果某个排序字段缺失，按默认排序或接口返回顺序展示。\u003c/li>\n\u003cli>如果随机展示无新数据，仍保持当前排序按钮选中态。\u003c/li>\n\u003c/ul>\n\u003chr>\n\u003ch3>\u003cstrong>帖子内容列表\u003c/strong>\u003c/h3>\n\u003ch4>展示内容：\u003c/h4>\n\u003cul>\n\u003cli>帖子列表展示动态内容卡片。\u003c/li>\n\u003cli>列表整体为 5 行 5 列布局。\u003c/li>\n\u003cli>每页最多展示 25 条帖子数据。\u003c/li>\n\u003cli>列表中可插入一条广告位。\u003c/li>\n\u003cli>广告位尺寸与动态内容卡片保持一致。\u003c/li>\n\u003c/ul>\n\u003ch4>数据来源：\u003c/h4>\n\u003cul>\n\u003cli>帖子列表数据由后台返回。\u003c/li>\n\u003cli>后台返回内容包括帖子 ID、封面、标题、发布者、上架时间、标签、浏览量、点赞量、详情链接等。\u003c/li>\n\u003cli>广告数据由后台返回。\u003c/li>\n\u003c/ul>\n\u003ch4>展示规则：\u003c/h4>\n\u003cul>\n\u003cli>动态内容卡片样式与全局动态内容卡片保持一致。\u003c/li>\n\u003cli>动态卡片封面比例需要与首页动态内容卡片保持一致。\u003c/li>\n\u003cli>动态卡片展示内容包括：动态封面、动态标题、发布者信息、上架时间、动态标签。\u003c/li>\n\u003cli>不展示额外简介文案。\u003c/li>\n\u003cli>列表中的广告卡片使用独立广告样式，尺寸与动态卡片一致。\u003c/li>\n\u003cli>广告封面铺满整个广告卡片，广告名称作为底部浮层展示。\u003c/li>\n\u003cli>广告底部浮层透明度为 60%。\u003c/li>\n\u003c/ul>\n\u003ch4>交互规则：\u003c/h4>\n\u003cul>\n\u003cli>点击动态内容卡片进入动态详情页。\u003c/li>\n\u003cli>点击动态标签跳转搜索结果页，并默认选中帖子分类。\u003c/li>\n\u003cli>鼠标悬浮动态卡片时展示选中效果。\u003c/li>\n\u003cli>点击广告卡片跳转后台配置广告链接。\u003c/li>\n\u003cli>如果广告链接为空，点击广告卡片不跳转。\u003c/li>\n\u003c/ul>\n\u003ch4>异常场景：\u003c/h4>\n\u003cul>\n\u003cli>如果帖子列表为空，展示空状态。\u003c/li>\n\u003cli>如果帖子数据不足 25 条，按实际数量展示。\u003c/li>\n\u003cli>如果封面为空，展示默认封面占位。\u003c/li>\n\u003cli>如果标题为空，展示默认标题“未命名动态”。\u003c/li>\n\u003cli>如果发布者为空，展示默认发布者。\u003c/li>\n\u003cli>如果上架时间为空，隐藏上架时间字段。\u003c/li>\n\u003cli>如果标签为空，隐藏标签区域。\u003c/li>\n\u003cli>如果详情链接为空，点击卡片不跳转。\u003c/li>\n\u003cli>如果后台返回重复帖子 ID，需要去重，避免重复卡片。\u003c/li>\n\u003cli>如果广告数据为空，不插入广告卡片。\u003c/li>\n\u003cli>如果广告封面加载失败，展示默认广告占位图。\u003c/li>\n\u003cli>如果广告名称为空，展示默认名称“广告位”。\u003c/li>\n\u003cli>如果广告链接异常，点击广告卡片不跳转。\u003c/li>\n\u003cli>如果广告插入位置数据异常，默认插入到当前页中部或固定位置。\u003c/li>\n\u003c/ul>\n\u003chr>\n\u003ch3>\u003cstrong>分页器\u003c/strong>\u003c/h3>\n\u003ch4>展示内容：\u003c/h4>\n\u003cul>\n\u003cli>分页器展示上一页、页码、下一页。\u003c/li>\n\u003cli>当前页码高亮。\u003c/li>\n\u003c/ul>\n\u003ch4>数据规则：\u003c/h4>\n\u003cul>\n\u003cli>默认页码为第 1 页。\u003c/li>\n\u003cli>分页器根据帖子列表总数计算总页数。\u003c/li>\n\u003c/ul>\n\u003ch4>交互规则：\u003c/h4>\n\u003cul>\n\u003cli>点击页码切换到对应页。\u003c/li>\n\u003cli>点击上一页切换到上一页。\u003c/li>\n\u003cli>点击下一页切换到下一页。\u003c/li>\n\u003cli>分页切换后刷新当前列表数据。\u003c/li>\n\u003c/ul>\n\u003ch4>异常场景：\u003c/h4>\n\u003cul>\n\u003cli>如果当前页超过最大页数，重置为最后一页。\u003c/li>\n\u003cli>如果当前页为第 1 页，上一页按钮置灰不可点击。\u003c/li>\n\u003cli>如果当前页为最后一页，下一页按钮置灰不可点击。\u003c/li>\n\u003cli>如果帖子总数为 0，隐藏分页器。\u003c/li>\n\u003cli>如果分页接口加载失败，保留当前页内容并提示加载失败。\u003c/li>\n\u003c/ul>","lines":141},{"id":"广告内容卡片-14","title":"广告内容卡片","file":"docs/notion-export/ExportBlock-4efbb5e9-6b52-48cb-8bcf-820483b4cd96-Part-1/Y12/广告内容卡片 3497db3145c380b38490c9a539a714be.md","raw":"# 广告内容卡片\n\n## **组件名称**\n\n广告内容卡片\n\n## **组件用途**\n\n广告内容卡片用于在内容列表中插入广告位，承载运营推广或商业广告入口。广告内容卡片可出现在帖子列表、视频列表、全部分类页及其他内容流中。\n\n## **展示内容**\n\n广告内容卡片展示以下内容：\n\n- 广告封面\n- 广告名称\n\n## **展示规则**\n\n广告内容卡片尺寸需要与所在列表中的内容卡片尺寸保持一致。\n\n在帖子列表中，广告内容卡片尺寸需要与动态内容卡片一致。\n\n在视频列表中，广告内容卡片尺寸需要与视频内容卡片一致。\n\n广告封面需要铺满整个广告卡片区域。\n\n广告名称作为底部浮层展示。\n\n底部浮层透明度为 60%。\n\n广告卡片不展示额外标签、简介、播放量或点赞量。\n\n广告卡片整体视觉风格需要与所在内容流保持协调，但需能明确识别为广告位。\n\n## **交互规则**\n\n点击广告内容卡片跳转后台配置的广告链接。\n\n鼠标悬浮广告内容卡片时，展示选中效果。\n\n广告卡片整体为可点击区域。\n\n## **异常场景**\n\n如果广告封面为空，展示默认广告占位图。\n\n如果广告名称为空，展示默认名称“广告位”。\n\n如果广告链接为空，点击广告卡片不跳转。\n\n如果广告链接格式异常，点击广告卡片不跳转，并保持当前页面。\n\n如果广告封面加载失败，展示默认广告占位图，不能出现破图。\n\n如果广告插入位置异常，前端使用默认插入位置。\n\n如果广告数据为空，则不渲染广告内容卡片。\n\n如果广告内容已下架，广告卡片不展示。\n\n广告下架后不保留占位。\n\n广告下架后，列表中的后续内容自动补齐当前位置。","html":"\u003ch2>广告内容卡片\u003c/h2>\n\u003ch3>\u003cstrong>组件名称\u003c/strong>\u003c/h3>\n\u003cp>广告内容卡片\u003c/p>\n\u003ch3>\u003cstrong>组件用途\u003c/strong>\u003c/h3>\n\u003cp>广告内容卡片用于在内容列表中插入广告位，承载运营推广或商业广告入口。广告内容卡片可出现在帖子列表、视频列表、全部分类页及其他内容流中。\u003c/p>\n\u003ch3>\u003cstrong>展示内容\u003c/strong>\u003c/h3>\n\u003cp>广告内容卡片展示以下内容：\u003c/p>\n\u003cul>\n\u003cli>广告封面\u003c/li>\n\u003cli>广告名称\u003c/li>\n\u003c/ul>\n\u003ch3>\u003cstrong>展示规则\u003c/strong>\u003c/h3>\n\u003cp>广告内容卡片尺寸需要与所在列表中的内容卡片尺寸保持一致。\u003c/p>\n\u003cp>在帖子列表中，广告内容卡片尺寸需要与动态内容卡片一致。\u003c/p>\n\u003cp>在视频列表中，广告内容卡片尺寸需要与视频内容卡片一致。\u003c/p>\n\u003cp>广告封面需要铺满整个广告卡片区域。\u003c/p>\n\u003cp>广告名称作为底部浮层展示。\u003c/p>\n\u003cp>底部浮层透明度为 60%。\u003c/p>\n\u003cp>广告卡片不展示额外标签、简介、播放量或点赞量。\u003c/p>\n\u003cp>广告卡片整体视觉风格需要与所在内容流保持协调，但需能明确识别为广告位。\u003c/p>\n\u003ch3>\u003cstrong>交互规则\u003c/strong>\u003c/h3>\n\u003cp>点击广告内容卡片跳转后台配置的广告链接。\u003c/p>\n\u003cp>鼠标悬浮广告内容卡片时，展示选中效果。\u003c/p>\n\u003cp>广告卡片整体为可点击区域。\u003c/p>\n\u003ch3>\u003cstrong>异常场景\u003c/strong>\u003c/h3>\n\u003cp>如果广告封面为空，展示默认广告占位图。\u003c/p>\n\u003cp>如果广告名称为空，展示默认名称“广告位”。\u003c/p>\n\u003cp>如果广告链接为空，点击广告卡片不跳转。\u003c/p>\n\u003cp>如果广告链接格式异常，点击广告卡片不跳转，并保持当前页面。\u003c/p>\n\u003cp>如果广告封面加载失败，展示默认广告占位图，不能出现破图。\u003c/p>\n\u003cp>如果广告插入位置异常，前端使用默认插入位置。\u003c/p>\n\u003cp>如果广告数据为空，则不渲染广告内容卡片。\u003c/p>\n\u003cp>如果广告内容已下架，广告卡片不展示。\u003c/p>\n\u003cp>广告下架后不保留占位。\u003c/p>\n\u003cp>广告下架后，列表中的后续内容自动补齐当前位置。\u003c/p>","lines":64},{"id":"底部广告栏-bottombannery12-15","title":"底部广告栏：bottomBannerY12","file":"docs/notion-export/ExportBlock-4efbb5e9-6b52-48cb-8bcf-820483b4cd96-Part-1/Y12/底部广告栏：bottomBannerY12 3497db3145c380a5b3a2defacbe68248.md","raw":"# 底部广告栏：bottomBannerY12\n\n广告标识：bottomBannerY12\n\n### **组件用途**\n\n底部广告栏用于在页脚上方展示合作广告或推广入口。\n\n### **展示规则**\n\n广告展示在页面底部、页脚上方。\n\n广告卡片为深色样式。\n\n广告卡片展示广告图标、广告名称和进入图标。\n\n广告数量较多时可自动适配布局。\n\n### **交互规则**\n\n点击广告卡片跳转广告链接。\n\n鼠标悬浮广告卡片时展示高亮反馈。\n\n### **异常场景**\n\n如果广告为空，隐藏底部广告栏。\n\n如果广告图标加载失败，展示默认占位图标。\n\n如果广告链接为空，点击不跳转。","html":"\u003ch2>底部广告栏：bottomBannerY12\u003c/h2>\n\u003cp>广告标识：bottomBannerY12\u003c/p>\n\u003ch4>\u003cstrong>组件用途\u003c/strong>\u003c/h4>\n\u003cp>底部广告栏用于在页脚上方展示合作广告或推广入口。\u003c/p>\n\u003ch4>\u003cstrong>展示规则\u003c/strong>\u003c/h4>\n\u003cp>广告展示在页面底部、页脚上方。\u003c/p>\n\u003cp>广告卡片为深色样式。\u003c/p>\n\u003cp>广告卡片展示广告图标、广告名称和进入图标。\u003c/p>\n\u003cp>广告数量较多时可自动适配布局。\u003c/p>\n\u003ch4>\u003cstrong>交互规则\u003c/strong>\u003c/h4>\n\u003cp>点击广告卡片跳转广告链接。\u003c/p>\n\u003cp>鼠标悬浮广告卡片时展示高亮反馈。\u003c/p>\n\u003ch4>\u003cstrong>异常场景\u003c/strong>\u003c/h4>\n\u003cp>如果广告为空，隐藏底部广告栏。\u003c/p>\n\u003cp>如果广告图标加载失败，展示默认占位图标。\u003c/p>\n\u003cp>如果广告链接为空，点击不跳转。\u003c/p>","lines":31},{"id":"底部栏广告位-16","title":"底部栏广告位","file":"docs/notion-export/ExportBlock-4efbb5e9-6b52-48cb-8bcf-820483b4cd96-Part-1/Y12/底部栏广告位 3497db3145c38087b7cac3baaad554a2.md","raw":"# 底部栏广告位\n\n**底部广告栏需求说明**\n\n组件名称：底部广告栏\n\n## 组件用途：\n\n底部广告栏用于在页面底部、页脚上方展示合作广告、外部入口或运营推荐内容。该组件为全站通用模块，需要在所有页面保持统一展示样式和交互规则。\n\n## 主要展示内容：\n\n- 底部广告栏展示多条广告入口卡片。\n- 每条广告卡片包含广告图标、广告名称和右侧进入图标。\n- 广告卡片采用深色背景样式。\n- 广告图标展示在左侧，广告名称展示在中间，右侧展示进入箭头或圆形进入按钮。\n\n## 展示位置：\n\n- 底部广告栏展示在页面主体内容之后、页脚之前。\n- 所有页面均需要展示底部广告栏。\n- 底部广告栏不属于页脚内容，但位置紧邻页脚上方。\n\n## 数据来源：\n\n- 底部广告数据由后台返回。\n- 后台可配置广告名称、广告图标、跳转链接、排序值、开启状态。\n- 只有开启状态的广告才展示。\n- 关闭状态的广告不展示，也不占位。\n- 前端按照后台返回的排序值展示广告顺序。\n- 如果后台没有返回排序值，则按接口返回顺序展示。\n\n## 交互规则：\n\n- 点击广告卡片跳转对应广告链接。\n- 广告链接可在当前页打开，也可根据后台配置新窗口打开。\n- 鼠标悬浮广告卡片时，需要展示高亮或选中反馈。\n- 广告卡片整体为可点击区域，不仅限于右侧进入图标。\n- 如果广告链接为空，点击广告卡片不跳转。\n\n## 状态规则：\n\n- 底部广告栏在全站页面保持统一样式。\n- 广告卡片数量较少时，保持左对齐展示。\n- 广告卡片数量较多时，按当前布局自动换行或横向适配。\n- 广告名称过长时，单行省略展示，不能撑破卡片。\n- 广告图标需要保持固定尺寸，不能因图片原始比例异常导致布局错乱。\n\n## 异常场景：\n\n- 如果后台没有返回广告数据，隐藏整个底部广告栏，不展示空白区域。\n- 如果某条广告状态为关闭，该广告不展示。\n- 如果广告名称为空，展示默认名称“广告位”。\n- 如果广告图标为空，展示默认广告图标或默认字母标识。\n- 如果广告图标加载失败，展示默认占位图标，不能出现破图。\n- 如果广告链接为空，点击卡片不跳转，也不报错。\n- 如果广告链接格式异常，点击卡片不跳转，并保持当前页面。\n- 如果广告数量过多，底部广告栏不能撑破页面宽度，需要自动换行或横向滚动。\n- 如果移动端屏幕宽度不足，广告卡片需要自适应单列或横向滚动展示。\n- 如果广告接口加载失败，隐藏底部广告栏，页面主体和页脚正常展示。\n- 如果广告接口加载较慢，页面主体内容和页脚不应被阻塞。","html":"\u003ch2>底部栏广告位\u003c/h2>\n\u003cp>\u003cstrong>底部广告栏需求说明\u003c/strong>\u003c/p>\n\u003cp>组件名称：底部广告栏\u003c/p>\n\u003ch3>组件用途：\u003c/h3>\n\u003cp>底部广告栏用于在页面底部、页脚上方展示合作广告、外部入口或运营推荐内容。该组件为全站通用模块，需要在所有页面保持统一展示样式和交互规则。\u003c/p>\n\u003ch3>主要展示内容：\u003c/h3>\n\u003cul>\n\u003cli>底部广告栏展示多条广告入口卡片。\u003c/li>\n\u003cli>每条广告卡片包含广告图标、广告名称和右侧进入图标。\u003c/li>\n\u003cli>广告卡片采用深色背景样式。\u003c/li>\n\u003cli>广告图标展示在左侧，广告名称展示在中间，右侧展示进入箭头或圆形进入按钮。\u003c/li>\n\u003c/ul>\n\u003ch3>展示位置：\u003c/h3>\n\u003cul>\n\u003cli>底部广告栏展示在页面主体内容之后、页脚之前。\u003c/li>\n\u003cli>所有页面均需要展示底部广告栏。\u003c/li>\n\u003cli>底部广告栏不属于页脚内容，但位置紧邻页脚上方。\u003c/li>\n\u003c/ul>\n\u003ch3>数据来源：\u003c/h3>\n\u003cul>\n\u003cli>底部广告数据由后台返回。\u003c/li>\n\u003cli>后台可配置广告名称、广告图标、跳转链接、排序值、开启状态。\u003c/li>\n\u003cli>只有开启状态的广告才展示。\u003c/li>\n\u003cli>关闭状态的广告不展示，也不占位。\u003c/li>\n\u003cli>前端按照后台返回的排序值展示广告顺序。\u003c/li>\n\u003cli>如果后台没有返回排序值，则按接口返回顺序展示。\u003c/li>\n\u003c/ul>\n\u003ch3>交互规则：\u003c/h3>\n\u003cul>\n\u003cli>点击广告卡片跳转对应广告链接。\u003c/li>\n\u003cli>广告链接可在当前页打开，也可根据后台配置新窗口打开。\u003c/li>\n\u003cli>鼠标悬浮广告卡片时，需要展示高亮或选中反馈。\u003c/li>\n\u003cli>广告卡片整体为可点击区域，不仅限于右侧进入图标。\u003c/li>\n\u003cli>如果广告链接为空，点击广告卡片不跳转。\u003c/li>\n\u003c/ul>\n\u003ch3>状态规则：\u003c/h3>\n\u003cul>\n\u003cli>底部广告栏在全站页面保持统一样式。\u003c/li>\n\u003cli>广告卡片数量较少时，保持左对齐展示。\u003c/li>\n\u003cli>广告卡片数量较多时，按当前布局自动换行或横向适配。\u003c/li>\n\u003cli>广告名称过长时，单行省略展示，不能撑破卡片。\u003c/li>\n\u003cli>广告图标需要保持固定尺寸，不能因图片原始比例异常导致布局错乱。\u003c/li>\n\u003c/ul>\n\u003ch3>异常场景：\u003c/h3>\n\u003cul>\n\u003cli>如果后台没有返回广告数据，隐藏整个底部广告栏，不展示空白区域。\u003c/li>\n\u003cli>如果某条广告状态为关闭，该广告不展示。\u003c/li>\n\u003cli>如果广告名称为空，展示默认名称“广告位”。\u003c/li>\n\u003cli>如果广告图标为空，展示默认广告图标或默认字母标识。\u003c/li>\n\u003cli>如果广告图标加载失败，展示默认占位图标，不能出现破图。\u003c/li>\n\u003cli>如果广告链接为空，点击卡片不跳转，也不报错。\u003c/li>\n\u003cli>如果广告链接格式异常，点击卡片不跳转，并保持当前页面。\u003c/li>\n\u003cli>如果广告数量过多，底部广告栏不能撑破页面宽度，需要自动换行或横向滚动。\u003c/li>\n\u003cli>如果移动端屏幕宽度不足，广告卡片需要自适应单列或横向滚动展示。\u003c/li>\n\u003cli>如果广告接口加载失败，隐藏底部广告栏，页面主体和页脚正常展示。\u003c/li>\n\u003cli>如果广告接口加载较慢，页面主体内容和页脚不应被阻塞。\u003c/li>\n\u003c/ul>","lines":61},{"id":"底部页脚需求说明-17","title":"底部页脚需求说明","file":"docs/notion-export/ExportBlock-4efbb5e9-6b52-48cb-8bcf-820483b4cd96-Part-1/Y12/底部页脚需求说明 3497db3145c3804ba5f2ebc6dbb77f9b.md","raw":"# 底部页脚需求说明\n\n## 组件名称：底部页脚\n\n## 组件用途：\n\n底部页脚用于展示平台基础信息和功能入口，帮助用户在页面底部快速找到客服、官方群组和商务合作入口。该组件为全站通用模块，需要在所有页面保持统一展示样式和交互规则。\n\n## 主要展示内容：\n\n底部页脚包含产品名称、联系客服、官方群组、商务合作。\n\n产品名称用于展示当前站点或平台名称。\n\n联系客服、官方群组、商务合作均作为功能入口按钮展示。\n\n页脚不展示产品简介。\n\n## 展示位置：\n\n底部页脚展示在页面最底部。\n\n底部广告栏展示在页脚上方。\n\n页脚与底部广告栏是两个独立模块，不能合并。\n\n## 数据来源：\n\n页脚信息由后台配置返回。\n\n后台可配置产品名称、客服入口、官方群组入口、商务合作入口。\n\n产品名称默认使用项目基础设置中的产品名称。\n\n联系客服、官方群组、商务合作可分别配置链接【tg链接等】。\n\n## 交互规则：\n\n点击“联系客服”进入客服功能入口。\n\n点击“官方群组”进入官方群组入口。\n\n点击“商务合作”进入商务合作入口。\n\n如果入口配置为外部链接，可根据后台配置决定当前页打开或新窗口打开。\n\n如果入口配置为空，点击后不跳转。\n\n## 状态规则：\n\n页脚在全站所有页面保持统一样式。\n\n页脚内容按固定顺序展示：产品名称、联系客服、官方群组、商务合作。\n\n功能入口以按钮或链接样式展示，保持统一视觉风格。\n\n## 异常场景：\n\n如果后台未配置产品名称，展示默认产品名称。\n\n如果客服入口为空，显示“联系客服”入口但点击不跳转，或隐藏该入口，建议优先隐藏。\n\n如果官方群组入口为空，显示“官方群组”入口但点击不跳转，或隐藏该入口，建议优先隐藏。\n\n如果商务合作入口为空，显示“商务合作”入口但点击不跳转，或隐藏该入口，建议优先隐藏。\n\n如果所有功能入口都为空，仅展示产品名称。\n\n如果外部链接格式异常，点击不跳转，并保持当前页面。\n\n如果后台配置接口加载失败，展示默认产品名称并隐藏功能入口。","html":"\u003ch2>底部页脚需求说明\u003c/h2>\n\u003ch3>组件名称：底部页脚\u003c/h3>\n\u003ch3>组件用途：\u003c/h3>\n\u003cp>底部页脚用于展示平台基础信息和功能入口，帮助用户在页面底部快速找到客服、官方群组和商务合作入口。该组件为全站通用模块，需要在所有页面保持统一展示样式和交互规则。\u003c/p>\n\u003ch3>主要展示内容：\u003c/h3>\n\u003cp>底部页脚包含产品名称、联系客服、官方群组、商务合作。\u003c/p>\n\u003cp>产品名称用于展示当前站点或平台名称。\u003c/p>\n\u003cp>联系客服、官方群组、商务合作均作为功能入口按钮展示。\u003c/p>\n\u003cp>页脚不展示产品简介。\u003c/p>\n\u003ch3>展示位置：\u003c/h3>\n\u003cp>底部页脚展示在页面最底部。\u003c/p>\n\u003cp>底部广告栏展示在页脚上方。\u003c/p>\n\u003cp>页脚与底部广告栏是两个独立模块，不能合并。\u003c/p>\n\u003ch3>数据来源：\u003c/h3>\n\u003cp>页脚信息由后台配置返回。\u003c/p>\n\u003cp>后台可配置产品名称、客服入口、官方群组入口、商务合作入口。\u003c/p>\n\u003cp>产品名称默认使用项目基础设置中的产品名称。\u003c/p>\n\u003cp>联系客服、官方群组、商务合作可分别配置链接【tg链接等】。\u003c/p>\n\u003ch3>交互规则：\u003c/h3>\n\u003cp>点击“联系客服”进入客服功能入口。\u003c/p>\n\u003cp>点击“官方群组”进入官方群组入口。\u003c/p>\n\u003cp>点击“商务合作”进入商务合作入口。\u003c/p>\n\u003cp>如果入口配置为外部链接，可根据后台配置决定当前页打开或新窗口打开。\u003c/p>\n\u003cp>如果入口配置为空，点击后不跳转。\u003c/p>\n\u003ch3>状态规则：\u003c/h3>\n\u003cp>页脚在全站所有页面保持统一样式。\u003c/p>\n\u003cp>页脚内容按固定顺序展示：产品名称、联系客服、官方群组、商务合作。\u003c/p>\n\u003cp>功能入口以按钮或链接样式展示，保持统一视觉风格。\u003c/p>\n\u003ch3>异常场景：\u003c/h3>\n\u003cp>如果后台未配置产品名称，展示默认产品名称。\u003c/p>\n\u003cp>如果客服入口为空，显示“联系客服”入口但点击不跳转，或隐藏该入口，建议优先隐藏。\u003c/p>\n\u003cp>如果官方群组入口为空，显示“官方群组”入口但点击不跳转，或隐藏该入口，建议优先隐藏。\u003c/p>\n\u003cp>如果商务合作入口为空，显示“商务合作”入口但点击不跳转，或隐藏该入口，建议优先隐藏。\u003c/p>\n\u003cp>如果所有功能入口都为空，仅展示产品名称。\u003c/p>\n\u003cp>如果外部链接格式异常，点击不跳转，并保持当前页面。\u003c/p>\n\u003cp>如果后台配置接口加载失败，展示默认产品名称并隐藏功能入口。\u003c/p>","lines":71},{"id":"异常场景汇总-18","title":"异常场景汇总","file":"docs/notion-export/ExportBlock-4efbb5e9-6b52-48cb-8bcf-820483b4cd96-Part-1/Y12/异常场景汇总 3497db3145c3801eb11cdc22409e20c3.md","raw":"# 异常场景汇总\n\n- 如果退出账号后状态未正确清除，需强制重置为游客状态。\n- 如果用户状态与页面展示不一致，页面刷新后应重新同步状态。\n- 如果登录态失效但用户仍停留在登录页面面中，涉及点赞、评论、个人中心时应重新校验。\n- 如果同一浏览器多个标签页状态不一致，刷新页面后以最新本地状态为准","html":"\u003ch2>异常场景汇总\u003c/h2>\n\u003cul>\n\u003cli>如果退出账号后状态未正确清除，需强制重置为游客状态。\u003c/li>\n\u003cli>如果用户状态与页面展示不一致，页面刷新后应重新同步状态。\u003c/li>\n\u003cli>如果登录态失效但用户仍停留在登录页面面中，涉及点赞、评论、个人中心时应重新校验。\u003c/li>\n\u003cli>如果同一浏览器多个标签页状态不一致，刷新页面后以最新本地状态为准\u003c/li>\n\u003c/ul>","lines":6},{"id":"我的点赞与用户状态-19","title":"我的点赞与用户状态","file":"docs/notion-export/ExportBlock-4efbb5e9-6b52-48cb-8bcf-820483b4cd96-Part-1/Y12/我的点赞与用户状态 3497db3145c380e89629d0f9368dfa63.md","raw":"# 我的点赞与用户状态\n\n### **游客状态**\n\n游客状态下不应生成正式点赞记录。\n\n如果进入我的点赞页，建议展示空状态或引导登录。\n\n### **登录状态**\n\n登录状态下，用户点赞过的帖子和视频进入“我的点赞”页面。\n\n页面支持帖子和视频分类切换。\n\n### **异常场景**\n\n如果点赞记录为空，展示空状态。\n\n如果点赞记录加载失败，展示加载失败或空状态。\n\n如果用户状态失效，提示重新登录。","html":"\u003ch2>我的点赞与用户状态\u003c/h2>\n\u003ch4>\u003cstrong>游客状态\u003c/strong>\u003c/h4>\n\u003cp>游客状态下不应生成正式点赞记录。\u003c/p>\n\u003cp>如果进入我的点赞页，建议展示空状态或引导登录。\u003c/p>\n\u003ch4>\u003cstrong>登录状态\u003c/strong>\u003c/h4>\n\u003cp>登录状态下，用户点赞过的帖子和视频进入“我的点赞”页面。\u003c/p>\n\u003cp>页面支持帖子和视频分类切换。\u003c/p>\n\u003ch4>\u003cstrong>异常场景\u003c/strong>\u003c/h4>\n\u003cp>如果点赞记录为空，展示空状态。\u003c/p>\n\u003cp>如果点赞记录加载失败，展示加载失败或空状态。\u003c/p>\n\u003cp>如果用户状态失效，提示重新登录。\u003c/p>","lines":21},{"id":"我的点赞页-20","title":"我的点赞页","file":"docs/notion-export/ExportBlock-4efbb5e9-6b52-48cb-8bcf-820483b4cd96-Part-1/Y12/我的点赞页 3497db3145c380baaf6eecb1efc9ff2e.md","raw":"# 我的点赞页\n\n## 页面名称\n\n我的点赞页\n\n## 页面用途\n\n我的点赞页用于展示当前用户已点赞过的内容记录，帮助用户快速查看和回访自己点赞过的帖子和视频内容。页面支持按内容类型切换，并支持分页查看点赞记录。本文档仅描述我的点赞页主体内容，不包含全站通用组件。\n\n## 页面主体结构\n\n我的点赞页主体从上至下包含：\n\n- 页面标题区域\n- 内容分类切换区域\n- 点赞记录列表\n- 分页器\n\n## 页面标题区域\n\n### 展示内容\n\n页面标题固定展示为：`我的点赞`。\n\n### 展示规则\n\n标题区域只展示页面名称，不展示额外说明文案。\n\n### 异常场景\n\n如果标题区域渲染失败，默认展示“我的点赞”。\n\n## 内容分类切换区域\n\n### 展示内容\n\n分类切换按钮包含：\n\n- 帖子\n- 视频\n\n默认选中帖子。\n\n当前选中的分类按钮需要高亮。\n\n### 展示规则\n\n分类按钮顺序固定为：帖子、视频。\n\n分类按钮始终展示，不因当前分类内容为空而隐藏。\n\n### 交互规则\n\n点击“帖子”按钮，切换至帖子点赞记录列表。\n\n点击“视频”按钮，切换至视频点赞记录列表。\n\n切换分类后，分页重置为第 1 页。\n\n切换分类后，当前列表刷新为对应分类的点赞记录。\n\n分类切换只影响当前页面内容，不影响其他页面状态。\n\n### 异常场景\n\n如果分类参数为空，默认选中帖子。\n\n如果分类参数非法，默认选中帖子。\n\n如果当前分类下没有点赞记录，展示对应分类的空状态。\n\n如果切换分类失败，保持当前分类不变。\n\n## 帖子点赞记录列表\n\n### 展示内容\n\n帖子点赞记录列表展示动态内容卡片。\n\n列表整体为 5 行 5 列布局。\n\n每页最多展示 25 条帖子点赞记录。\n\n### 展示规则\n\n动态内容卡片样式与全局动态内容卡片保持一致。\n\n动态卡片封面比例与首页动态内容卡片保持一致。\n\n卡片展示内容包括：\n\n- 动态封面\n- 动态标题\n- 发布者信息\n- 上架时间\n- 动态标签\n\n帖子点赞记录列表不展示额外简介文案。\n\n帖子点赞卡片尺寸与帖子列表页保持统一。\n\n### 交互规则\n\n点击动态内容卡片进入对应动态详情页。\n\n点击动态标签跳转搜索结果页，并默认选中帖子分类。\n\n鼠标悬浮动态卡片时展示选中效果。\n\n### 异常场景\n\n如果帖子点赞记录为空，展示帖子空状态。\n\n如果帖子数量不足 25 条，按实际数量展示。\n\n如果封面为空，展示默认封面占位。\n\n如果标题为空，展示默认标题“未命名动态”。\n\n如果发布者为空，展示默认发布者。\n\n如果上架时间为空，隐藏上架时间字段。\n\n如果标签为空，隐藏标签区域。\n\n如果详情链接为空，点击卡片不跳转。\n\n如果点赞记录中存在重复内容，需要去重，避免重复展示。\n\n## 视频点赞记录列表\n\n### 展示内容\n\n视频点赞记录列表展示视频内容卡片。\n\n列表整体为 5 行 5 列布局。\n\n每页最多展示 25 条视频点赞记录。\n\n### 展示规则\n\n视频内容卡片样式与全局视频内容卡片保持一致。\n\n视频封面比例为 16:9。\n\n播放量展示在封面左下角。\n\n点赞量展示在封面右下角。\n\n播放量和点赞量均使用 icon + 数字形式展示。\n\n视频卡片展示内容包括：\n\n- 视频封面\n- 播放量\n- 点赞量\n- 视频标题\n- 视频标签\n\n视频点赞记录卡片不展示上架时间。\n\n### 交互规则\n\n点击视频内容卡片进入对应视频详情页。\n\n点击视频标签跳转搜索结果页，并默认选中视频分类。\n\n鼠标悬浮视频卡片时展示选中效果。\n\n### 异常场景\n\n如果视频点赞记录为空，展示视频空状态。\n\n如果视频数量不足 25 条，按实际数量展示。\n\n如果封面为空，展示默认封面占位。\n\n如果标题为空，展示默认标题“未命名视频”。\n\n如果播放量为空，展示 0。\n\n如果点赞量为空，展示 0。\n\n如果标签为空，隐藏标签区域。\n\n如果详情链接为空，点击卡片不跳转。\n\n如果点赞记录中存在重复内容，需要去重，避免重复展示。\n\n## 分页器\n\n### 展示内容\n\n分页器展示：\n\n- 上一页\n- 页码\n- 下一页\n\n当前页码需要高亮。\n\n### 展示规则\n\n分页器展示在点赞记录列表下方。\n\n分页器跟随当前分类记录总数变化。\n\n### 交互规则\n\n点击页码切换到对应页。\n\n点击上一页切换到上一页。\n\n点击下一页切换到下一页。\n\n切换分页后刷新当前列表内容。\n\n分页切换时保留当前分类状态。\n\n### 异常场景\n\n如果当前页为空，默认第 1 页。\n\n如果当前页参数非法，默认第 1 页。\n\n如果当前页大于最大页数，重置为最后一页。\n\n如果当前页为第 1 页，上一页按钮置灰不可点击。\n\n如果当前页为最后一页，下一页按钮置灰不可点击。\n\n如果当前分类点赞记录总数为 0，隐藏分页器。\n\n如果分页切换失败，保留当前页内容不变。","html":"\u003ch2>我的点赞页\u003c/h2>\n\u003ch3>页面名称\u003c/h3>\n\u003cp>我的点赞页\u003c/p>\n\u003ch3>页面用途\u003c/h3>\n\u003cp>我的点赞页用于展示当前用户已点赞过的内容记录，帮助用户快速查看和回访自己点赞过的帖子和视频内容。页面支持按内容类型切换，并支持分页查看点赞记录。本文档仅描述我的点赞页主体内容，不包含全站通用组件。\u003c/p>\n\u003ch3>页面主体结构\u003c/h3>\n\u003cp>我的点赞页主体从上至下包含：\u003c/p>\n\u003cul>\n\u003cli>页面标题区域\u003c/li>\n\u003cli>内容分类切换区域\u003c/li>\n\u003cli>点赞记录列表\u003c/li>\n\u003cli>分页器\u003c/li>\n\u003c/ul>\n\u003ch3>页面标题区域\u003c/h3>\n\u003ch4>展示内容\u003c/h4>\n\u003cp>页面标题固定展示为：\u003ccode>我的点赞\u003c/code>。\u003c/p>\n\u003ch4>展示规则\u003c/h4>\n\u003cp>标题区域只展示页面名称，不展示额外说明文案。\u003c/p>\n\u003ch4>异常场景\u003c/h4>\n\u003cp>如果标题区域渲染失败，默认展示“我的点赞”。\u003c/p>\n\u003ch3>内容分类切换区域\u003c/h3>\n\u003ch4>展示内容\u003c/h4>\n\u003cp>分类切换按钮包含：\u003c/p>\n\u003cul>\n\u003cli>帖子\u003c/li>\n\u003cli>视频\u003c/li>\n\u003c/ul>\n\u003cp>默认选中帖子。\u003c/p>\n\u003cp>当前选中的分类按钮需要高亮。\u003c/p>\n\u003ch4>展示规则\u003c/h4>\n\u003cp>分类按钮顺序固定为：帖子、视频。\u003c/p>\n\u003cp>分类按钮始终展示，不因当前分类内容为空而隐藏。\u003c/p>\n\u003ch4>交互规则\u003c/h4>\n\u003cp>点击“帖子”按钮，切换至帖子点赞记录列表。\u003c/p>\n\u003cp>点击“视频”按钮，切换至视频点赞记录列表。\u003c/p>\n\u003cp>切换分类后，分页重置为第 1 页。\u003c/p>\n\u003cp>切换分类后，当前列表刷新为对应分类的点赞记录。\u003c/p>\n\u003cp>分类切换只影响当前页面内容，不影响其他页面状态。\u003c/p>\n\u003ch4>异常场景\u003c/h4>\n\u003cp>如果分类参数为空，默认选中帖子。\u003c/p>\n\u003cp>如果分类参数非法，默认选中帖子。\u003c/p>\n\u003cp>如果当前分类下没有点赞记录，展示对应分类的空状态。\u003c/p>\n\u003cp>如果切换分类失败，保持当前分类不变。\u003c/p>\n\u003ch3>帖子点赞记录列表\u003c/h3>\n\u003ch4>展示内容\u003c/h4>\n\u003cp>帖子点赞记录列表展示动态内容卡片。\u003c/p>\n\u003cp>列表整体为 5 行 5 列布局。\u003c/p>\n\u003cp>每页最多展示 25 条帖子点赞记录。\u003c/p>\n\u003ch4>展示规则\u003c/h4>\n\u003cp>动态内容卡片样式与全局动态内容卡片保持一致。\u003c/p>\n\u003cp>动态卡片封面比例与首页动态内容卡片保持一致。\u003c/p>\n\u003cp>卡片展示内容包括：\u003c/p>\n\u003cul>\n\u003cli>动态封面\u003c/li>\n\u003cli>动态标题\u003c/li>\n\u003cli>发布者信息\u003c/li>\n\u003cli>上架时间\u003c/li>\n\u003cli>动态标签\u003c/li>\n\u003c/ul>\n\u003cp>帖子点赞记录列表不展示额外简介文案。\u003c/p>\n\u003cp>帖子点赞卡片尺寸与帖子列表页保持统一。\u003c/p>\n\u003ch4>交互规则\u003c/h4>\n\u003cp>点击动态内容卡片进入对应动态详情页。\u003c/p>\n\u003cp>点击动态标签跳转搜索结果页，并默认选中帖子分类。\u003c/p>\n\u003cp>鼠标悬浮动态卡片时展示选中效果。\u003c/p>\n\u003ch4>异常场景\u003c/h4>\n\u003cp>如果帖子点赞记录为空，展示帖子空状态。\u003c/p>\n\u003cp>如果帖子数量不足 25 条，按实际数量展示。\u003c/p>\n\u003cp>如果封面为空，展示默认封面占位。\u003c/p>\n\u003cp>如果标题为空，展示默认标题“未命名动态”。\u003c/p>\n\u003cp>如果发布者为空，展示默认发布者。\u003c/p>\n\u003cp>如果上架时间为空，隐藏上架时间字段。\u003c/p>\n\u003cp>如果标签为空，隐藏标签区域。\u003c/p>\n\u003cp>如果详情链接为空，点击卡片不跳转。\u003c/p>\n\u003cp>如果点赞记录中存在重复内容，需要去重，避免重复展示。\u003c/p>\n\u003ch3>视频点赞记录列表\u003c/h3>\n\u003ch4>展示内容\u003c/h4>\n\u003cp>视频点赞记录列表展示视频内容卡片。\u003c/p>\n\u003cp>列表整体为 5 行 5 列布局。\u003c/p>\n\u003cp>每页最多展示 25 条视频点赞记录。\u003c/p>\n\u003ch4>展示规则\u003c/h4>\n\u003cp>视频内容卡片样式与全局视频内容卡片保持一致。\u003c/p>\n\u003cp>视频封面比例为 16:9。\u003c/p>\n\u003cp>播放量展示在封面左下角。\u003c/p>\n\u003cp>点赞量展示在封面右下角。\u003c/p>\n\u003cp>播放量和点赞量均使用 icon + 数字形式展示。\u003c/p>\n\u003cp>视频卡片展示内容包括：\u003c/p>\n\u003cul>\n\u003cli>视频封面\u003c/li>\n\u003cli>播放量\u003c/li>\n\u003cli>点赞量\u003c/li>\n\u003cli>视频标题\u003c/li>\n\u003cli>视频标签\u003c/li>\n\u003c/ul>\n\u003cp>视频点赞记录卡片不展示上架时间。\u003c/p>\n\u003ch4>交互规则\u003c/h4>\n\u003cp>点击视频内容卡片进入对应视频详情页。\u003c/p>\n\u003cp>点击视频标签跳转搜索结果页，并默认选中视频分类。\u003c/p>\n\u003cp>鼠标悬浮视频卡片时展示选中效果。\u003c/p>\n\u003ch4>异常场景\u003c/h4>\n\u003cp>如果视频点赞记录为空，展示视频空状态。\u003c/p>\n\u003cp>如果视频数量不足 25 条，按实际数量展示。\u003c/p>\n\u003cp>如果封面为空，展示默认封面占位。\u003c/p>\n\u003cp>如果标题为空，展示默认标题“未命名视频”。\u003c/p>\n\u003cp>如果播放量为空，展示 0。\u003c/p>\n\u003cp>如果点赞量为空，展示 0。\u003c/p>\n\u003cp>如果标签为空，隐藏标签区域。\u003c/p>\n\u003cp>如果详情链接为空，点击卡片不跳转。\u003c/p>\n\u003cp>如果点赞记录中存在重复内容，需要去重，避免重复展示。\u003c/p>\n\u003ch3>分页器\u003c/h3>\n\u003ch4>展示内容\u003c/h4>\n\u003cp>分页器展示：\u003c/p>\n\u003cul>\n\u003cli>上一页\u003c/li>\n\u003cli>页码\u003c/li>\n\u003cli>下一页\u003c/li>\n\u003c/ul>\n\u003cp>当前页码需要高亮。\u003c/p>\n\u003ch4>展示规则\u003c/h4>\n\u003cp>分页器展示在点赞记录列表下方。\u003c/p>\n\u003cp>分页器跟随当前分类记录总数变化。\u003c/p>\n\u003ch4>交互规则\u003c/h4>\n\u003cp>点击页码切换到对应页。\u003c/p>\n\u003cp>点击上一页切换到上一页。\u003c/p>\n\u003cp>点击下一页切换到下一页。\u003c/p>\n\u003cp>切换分页后刷新当前列表内容。\u003c/p>\n\u003cp>分页切换时保留当前分类状态。\u003c/p>\n\u003ch4>异常场景\u003c/h4>\n\u003cp>如果当前页为空，默认第 1 页。\u003c/p>\n\u003cp>如果当前页参数非法，默认第 1 页。\u003c/p>\n\u003cp>如果当前页大于最大页数，重置为最后一页。\u003c/p>\n\u003cp>如果当前页为第 1 页，上一页按钮置灰不可点击。\u003c/p>\n\u003cp>如果当前页为最后一页，下一页按钮置灰不可点击。\u003c/p>\n\u003cp>如果当前分类点赞记录总数为 0，隐藏分页器。\u003c/p>\n\u003cp>如果分页切换失败，保留当前页内容不变。\u003c/p>","lines":235},{"id":"排序筛选-21","title":"排序筛选","file":"docs/notion-export/ExportBlock-4efbb5e9-6b52-48cb-8bcf-820483b4cd96-Part-1/Y12/排序筛选 3497db3145c38062a5a9cfeb83f9315a.md","raw":"# 排序筛选\n\n## **组件名称**\n\n排序筛选\n\n## **组件用途**\n\n排序筛选用于让用户快速调整当前列表内容的展示顺序。\n\n## **展示内容**\n\n排序按钮包含：\n\n- 最新上架\n- 最多点赞\n- 最多观看\n- 随机展示\n\n## **展示规则**\n\n默认选中“最新上架”。\n\n当前选中的排序按钮需要高亮。\n\n排序按钮始终展示在列表顶部筛选区。\n\n排序按钮只作用于当前列表结果。\n\n## **交互规则**\n\n点击排序按钮后，当前列表按对应规则刷新。\n\n切换排序后，分页重置为第 1 页。\n\n切换排序后保留当前分类和其他筛选状态。\n\n随机展示用于打散当前结果顺序。\n\n## **异常场景**\n\n如果排序参数为空，默认选中最新上架。\n\n如果排序参数非法，默认选中最新上架。\n\n如果排序接口失败，保留当前列表不变。\n\n如果列表无内容，排序按钮仍可展示，但不触发实际变化。\n\n如果随机排序无新结果，仍保持当前排序按钮选中态。","html":"\u003ch2>排序筛选\u003c/h2>\n\u003ch3>\u003cstrong>组件名称\u003c/strong>\u003c/h3>\n\u003cp>排序筛选\u003c/p>\n\u003ch3>\u003cstrong>组件用途\u003c/strong>\u003c/h3>\n\u003cp>排序筛选用于让用户快速调整当前列表内容的展示顺序。\u003c/p>\n\u003ch3>\u003cstrong>展示内容\u003c/strong>\u003c/h3>\n\u003cp>排序按钮包含：\u003c/p>\n\u003cul>\n\u003cli>最新上架\u003c/li>\n\u003cli>最多点赞\u003c/li>\n\u003cli>最多观看\u003c/li>\n\u003cli>随机展示\u003c/li>\n\u003c/ul>\n\u003ch3>\u003cstrong>展示规则\u003c/strong>\u003c/h3>\n\u003cp>默认选中“最新上架”。\u003c/p>\n\u003cp>当前选中的排序按钮需要高亮。\u003c/p>\n\u003cp>排序按钮始终展示在列表顶部筛选区。\u003c/p>\n\u003cp>排序按钮只作用于当前列表结果。\u003c/p>\n\u003ch3>\u003cstrong>交互规则\u003c/strong>\u003c/h3>\n\u003cp>点击排序按钮后，当前列表按对应规则刷新。\u003c/p>\n\u003cp>切换排序后，分页重置为第 1 页。\u003c/p>\n\u003cp>切换排序后保留当前分类和其他筛选状态。\u003c/p>\n\u003cp>随机展示用于打散当前结果顺序。\u003c/p>\n\u003ch3>\u003cstrong>异常场景\u003c/strong>\u003c/h3>\n\u003cp>如果排序参数为空，默认选中最新上架。\u003c/p>\n\u003cp>如果排序参数非法，默认选中最新上架。\u003c/p>\n\u003cp>如果排序接口失败，保留当前列表不变。\u003c/p>\n\u003cp>如果列表无内容，排序按钮仍可展示，但不触发实际变化。\u003c/p>\n\u003cp>如果随机排序无新结果，仍保持当前排序按钮选中态。\u003c/p>","lines":50},{"id":"搜索下拉框-22","title":"搜索下拉框","file":"docs/notion-export/ExportBlock-4efbb5e9-6b52-48cb-8bcf-820483b4cd96-Part-1/Y12/搜索下拉框 3497db3145c38044a716d89722416df3.md","raw":"# 搜索下拉框\n\n## **组件名称**\n\n搜索下拉框\n\n## **组件用途**\n\n搜索下拉框用于辅助用户快速使用历史搜索记录和热门搜索词，提高搜索效率。该组件与搜索栏联动，在用户点击或聚焦搜索栏时展示。\n\n## **展示内容**\n\n搜索下拉框包含以下内容：\n\n- 历史记录区域\n- 一键清空历史按钮\n- 单条历史删除按钮\n- 热门搜索区域\n- 热门搜索词条\n\n## **展示规则**\n\n点击或聚焦搜索栏时，展示搜索下拉框。\n\n搜索下拉框层级必须高于菜单栏、内容卡片和页面普通内容。\n\n历史记录区域展示用户最近搜索内容。\n\n热门搜索区域始终展示预设热搜词条。\n\n如果历史记录为空，则隐藏历史记录标题、清空按钮和历史记录列表，只展示热门搜索区域。\n\n## **交互规则**\n\n点击历史记录词条，跳转搜索结果页。\n\n点击热门搜索词条，跳转搜索结果页。\n\n点击单条历史删除按钮，仅删除当前历史记录，不收起下拉框。\n\n点击一键清空历史按钮，清空全部历史记录，并隐藏整个历史记录区域。\n\n鼠标悬浮历史记录词条或热门搜索词条时，展示高亮状态。\n\n点击页面空白区域时，下拉框收起。\n\n## **异常场景**\n\n如果历史记录为空，隐藏整个历史记录区域。\n\n如果热门搜索为空，隐藏热门搜索区域。\n\n如果历史记录删除失败，保持当前数据不变。\n\n如果清空历史失败，保持当前历史记录不变。\n\n如果搜索词为空，点击词条不跳转。\n\n如果搜索结果链接异常，点击词条不跳转。\n\n如果下拉框层级异常被遮挡，需要提高层级保证完整显示。","html":"\u003ch2>搜索下拉框\u003c/h2>\n\u003ch3>\u003cstrong>组件名称\u003c/strong>\u003c/h3>\n\u003cp>搜索下拉框\u003c/p>\n\u003ch3>\u003cstrong>组件用途\u003c/strong>\u003c/h3>\n\u003cp>搜索下拉框用于辅助用户快速使用历史搜索记录和热门搜索词，提高搜索效率。该组件与搜索栏联动，在用户点击或聚焦搜索栏时展示。\u003c/p>\n\u003ch3>\u003cstrong>展示内容\u003c/strong>\u003c/h3>\n\u003cp>搜索下拉框包含以下内容：\u003c/p>\n\u003cul>\n\u003cli>历史记录区域\u003c/li>\n\u003cli>一键清空历史按钮\u003c/li>\n\u003cli>单条历史删除按钮\u003c/li>\n\u003cli>热门搜索区域\u003c/li>\n\u003cli>热门搜索词条\u003c/li>\n\u003c/ul>\n\u003ch3>\u003cstrong>展示规则\u003c/strong>\u003c/h3>\n\u003cp>点击或聚焦搜索栏时，展示搜索下拉框。\u003c/p>\n\u003cp>搜索下拉框层级必须高于菜单栏、内容卡片和页面普通内容。\u003c/p>\n\u003cp>历史记录区域展示用户最近搜索内容。\u003c/p>\n\u003cp>热门搜索区域始终展示预设热搜词条。\u003c/p>\n\u003cp>如果历史记录为空，则隐藏历史记录标题、清空按钮和历史记录列表，只展示热门搜索区域。\u003c/p>\n\u003ch3>\u003cstrong>交互规则\u003c/strong>\u003c/h3>\n\u003cp>点击历史记录词条，跳转搜索结果页。\u003c/p>\n\u003cp>点击热门搜索词条，跳转搜索结果页。\u003c/p>\n\u003cp>点击单条历史删除按钮，仅删除当前历史记录，不收起下拉框。\u003c/p>\n\u003cp>点击一键清空历史按钮，清空全部历史记录，并隐藏整个历史记录区域。\u003c/p>\n\u003cp>鼠标悬浮历史记录词条或热门搜索词条时，展示高亮状态。\u003c/p>\n\u003cp>点击页面空白区域时，下拉框收起。\u003c/p>\n\u003ch3>\u003cstrong>异常场景\u003c/strong>\u003c/h3>\n\u003cp>如果历史记录为空，隐藏整个历史记录区域。\u003c/p>\n\u003cp>如果热门搜索为空，隐藏热门搜索区域。\u003c/p>\n\u003cp>如果历史记录删除失败，保持当前数据不变。\u003c/p>\n\u003cp>如果清空历史失败，保持当前历史记录不变。\u003c/p>\n\u003cp>如果搜索词为空，点击词条不跳转。\u003c/p>\n\u003cp>如果搜索结果链接异常，点击词条不跳转。\u003c/p>\n\u003cp>如果下拉框层级异常被遮挡，需要提高层级保证完整显示。\u003c/p>","lines":61},{"id":"搜索功能-23","title":"搜索功能","file":"docs/notion-export/ExportBlock-4efbb5e9-6b52-48cb-8bcf-820483b4cd96-Part-1/Y12/搜索功能 3497db3145c380bcab7fcffa7fbca367.md","raw":"# 搜索功能\n\n组件名称：搜索栏\n\n## 组件用途：\n\n- 搜索栏用于让用户输入关键词，并跳转至搜索结果页查看对应内容。搜索栏属于全站通用组件，需要在所有页面顶部栏中保持统一样式和交互规则。\n- 主要展示内容：\n- 搜索栏包含搜索图标、关键词输入框和搜索按钮。\n- 输入框默认占位文案为“搜索关键字”。\n- 搜索按钮固定显示在搜索栏右侧。\n- 搜索栏展示在顶部栏中，位于品牌图片右侧。\n\n## 搜索范围：\n\n- 搜索支持帖子和视频内容。\n- 搜索结果页支持按内容类型切换帖子和视频。\n- 用户输入的关键词通过 URL 参数传递到搜索结果页。\n\n## 交互规则：\n\n- 点击搜索输入框时，展示搜索下拉框。\n- 用户输入关键词后，点击搜索按钮跳转搜索结果页。\n- 用户输入关键词后，按回车跳转搜索结果页。\n- 点击搜索历史记录或热门搜索词，也跳转搜索结果页。\n- 搜索跳转时默认进入帖子分类。\n- 搜索关键词需要去除前后空格。\n- 输入为空时，点击搜索按钮或按回车不跳转。\n\n## 状态规则：\n\n- 默认状态下显示占位文案“搜索关键字”。\n- 聚焦状态下展示搜索下拉框。\n- 输入内容时保留用户输入的关键词。\n- 搜索结果页中，搜索栏需要回填当前搜索关键词。\n- 搜索按钮始终显示，不能因为输入为空而隐藏。\n- 搜索栏在所有页面保持统一高度、圆角、边框和按钮样式。\n\n## 异常场景：\n\n- 如果用户输入为空或只输入空格，不执行搜索跳转。\n- 如果用户输入超长关键词，输入框内应正常滚动或截断展示，不能撑破顶部栏。\n- 如果关键词包含特殊字符，跳转 URL 需要进行编码。\n- 如果搜索结果页没有接收到关键词，显示空搜索状态或默认提示。\n- 如果搜索跳转失败，当前页面保持不变。\n- 如果搜索下拉框数据为空，只展示输入框和搜索按钮，不展示空白下拉区域。\n- 如果移动端屏幕宽度不足，搜索栏需要自适应缩小，不能遮挡品牌图片和账号入口。\n- 如果搜索按钮被快速重复点击，只触发一次有效跳转。\n- 如果用户正在输入中文拼音组合，按回车时需要避免误触发未完成输入的搜索。","html":"\u003ch2>搜索功能\u003c/h2>\n\u003cp>组件名称：搜索栏\u003c/p>\n\u003ch3>组件用途：\u003c/h3>\n\u003cul>\n\u003cli>搜索栏用于让用户输入关键词，并跳转至搜索结果页查看对应内容。搜索栏属于全站通用组件，需要在所有页面顶部栏中保持统一样式和交互规则。\u003c/li>\n\u003cli>主要展示内容：\u003c/li>\n\u003cli>搜索栏包含搜索图标、关键词输入框和搜索按钮。\u003c/li>\n\u003cli>输入框默认占位文案为“搜索关键字”。\u003c/li>\n\u003cli>搜索按钮固定显示在搜索栏右侧。\u003c/li>\n\u003cli>搜索栏展示在顶部栏中，位于品牌图片右侧。\u003c/li>\n\u003c/ul>\n\u003ch3>搜索范围：\u003c/h3>\n\u003cul>\n\u003cli>搜索支持帖子和视频内容。\u003c/li>\n\u003cli>搜索结果页支持按内容类型切换帖子和视频。\u003c/li>\n\u003cli>用户输入的关键词通过 URL 参数传递到搜索结果页。\u003c/li>\n\u003c/ul>\n\u003ch3>交互规则：\u003c/h3>\n\u003cul>\n\u003cli>点击搜索输入框时，展示搜索下拉框。\u003c/li>\n\u003cli>用户输入关键词后，点击搜索按钮跳转搜索结果页。\u003c/li>\n\u003cli>用户输入关键词后，按回车跳转搜索结果页。\u003c/li>\n\u003cli>点击搜索历史记录或热门搜索词，也跳转搜索结果页。\u003c/li>\n\u003cli>搜索跳转时默认进入帖子分类。\u003c/li>\n\u003cli>搜索关键词需要去除前后空格。\u003c/li>\n\u003cli>输入为空时，点击搜索按钮或按回车不跳转。\u003c/li>\n\u003c/ul>\n\u003ch3>状态规则：\u003c/h3>\n\u003cul>\n\u003cli>默认状态下显示占位文案“搜索关键字”。\u003c/li>\n\u003cli>聚焦状态下展示搜索下拉框。\u003c/li>\n\u003cli>输入内容时保留用户输入的关键词。\u003c/li>\n\u003cli>搜索结果页中，搜索栏需要回填当前搜索关键词。\u003c/li>\n\u003cli>搜索按钮始终显示，不能因为输入为空而隐藏。\u003c/li>\n\u003cli>搜索栏在所有页面保持统一高度、圆角、边框和按钮样式。\u003c/li>\n\u003c/ul>\n\u003ch3>异常场景：\u003c/h3>\n\u003cul>\n\u003cli>如果用户输入为空或只输入空格，不执行搜索跳转。\u003c/li>\n\u003cli>如果用户输入超长关键词，输入框内应正常滚动或截断展示，不能撑破顶部栏。\u003c/li>\n\u003cli>如果关键词包含特殊字符，跳转 URL 需要进行编码。\u003c/li>\n\u003cli>如果搜索结果页没有接收到关键词，显示空搜索状态或默认提示。\u003c/li>\n\u003cli>如果搜索跳转失败，当前页面保持不变。\u003c/li>\n\u003cli>如果搜索下拉框数据为空，只展示输入框和搜索按钮，不展示空白下拉区域。\u003c/li>\n\u003cli>如果移动端屏幕宽度不足，搜索栏需要自适应缩小，不能遮挡品牌图片和账号入口。\u003c/li>\n\u003cli>如果搜索按钮被快速重复点击，只触发一次有效跳转。\u003c/li>\n\u003cli>如果用户正在输入中文拼音组合，按回车时需要避免误触发未完成输入的搜索。\u003c/li>\n\u003c/ul>","lines":49},{"id":"搜索结果页-24","title":"搜索结果页","file":"docs/notion-export/ExportBlock-4efbb5e9-6b52-48cb-8bcf-820483b4cd96-Part-1/Y12/搜索结果页 3497db3145c3800982c6fb6fb8cd1bea.md","raw":"# 搜索结果页\n\n页面名称：搜索结果页\n\n页面用途：\n\n搜索结果页用于展示用户输入关键词后的内容搜索结果。页面支持帖子和视频两类内容切换，并支持排序、分页、内容卡片点击跳转等功能。本文档仅描述搜索结果页主体内容，不包含全站通用组件。\n\n---\n\n## **页面主体结构**\n\n### 搜索结果页主体从上至下包含：\n\n- 搜索关键词展示区域。\n- 内容分类切换按钮。\n- 排序筛选区域。\n- 搜索结果列表。\n- 分页器。\n\n---\n\n### **搜索关键词展示区域**\n\n#### 展示内容：\n\n- 展示当前用户搜索的关键词。\n\n#### 展示格式为：\n\n- 搜索结果：关键词。\n- 关键词需要高亮展示。\n\n#### 展示规则：\n\n- 搜索栏中需要回填当前关键词。\n\n#### 异常场景：\n\n- 如果关键词过长，页面展示时需要截断或换行，不能撑破布局。\n\n---\n\n### **内容分类切换**\n\n#### 展示内容：\n\n- 分类切换按钮包含：帖子、视频。\n\n默认选中帖子。\n\n- 当前选中的分类按钮需要高亮。\n\n#### 数据规则：\n\n- 分类由前端固定展示。\n- 帖子分类对应动态 / 帖子结果列表。\n- 视频分类对应视频结果列表。\n\n#### 交互规则：\n\n- 点击“帖子”按钮，切换至帖子搜索结果列表。\n- 点击“视频”按钮，切换至视频搜索结果列表。\n- 切换分类时，需要同步更新 URL 参数中的 type。\n- 切换分类后，分页重置为第 1 页。\n- 切换分类后，排序默认保持当前排序；如果当前排序不适用，则重置为最新上架。\n\n#### 异常场景：\n\n- 如果当前分类无搜索结果，展示对应分类的空状态。\n- 如果切换分类时接口请求失败，保留当前页面状态并提示加载失败。\n\n---\n\n### **排序筛选区域**\n\n#### 展示内容：\n\n- 排序按钮包含：最新上架、最多点赞、最多观看、随机展示。\n- 默认选中最新上架。\n- 当前选中的排序按钮需要高亮。\n\n#### 交互规则：\n\n- 点击排序按钮后，当前列表根据对应排序规则刷新。\n- 切换排序时，需要同步更新 URL 参数中的 sort。\n- 切换排序后，分页重置为第 1 页。\n- 排序按钮只影响当前分类下的结果列表。\n- 帖子和视频分类共用同一套排序按钮。\n\n#### 异常场景：\n\n- 如果排序接口失败，保留当前列表并提示加载失败。\n- 如果某个排序字段缺失，按默认排序或接口返回顺序展示。\n- 如果随机展示无数据变化，仍保持当前排序按钮选中态。\n\n---\n\n### **帖子搜索结果列表**\n\n#### 展示内容：\n\n- 帖子列表展示动态内容卡片。\n- 帖子结果列表为 5 行 5 列。\n- 每页最多展示 25 条帖子数据。\n- 列表中可插入广告位。\n- 广告位尺寸与动态内容卡片保持一致。\n\n#### 卡片内容：\n\n- 动态封面。\n- 动态标题。\n- 发布者信息。\n- 上架时间。\n- 动态标签。\n\n#### 交互规则：\n\n- 点击动态内容卡片进入动态详情页。\n- 点击动态标签跳转搜索结果页，并默认选中帖子分类。\n- 鼠标悬浮动态卡片时展示选中效果。\n- 点击广告卡片跳转后台配置广告链接。\n\n#### 异常场景：\n\n- 如果帖子搜索结果为空，展示帖子空状态。\n- 如果帖子封面为空，展示默认封面占位。\n- 如果帖子标题为空，展示默认标题“未命名动态”。\n- 如果发布者为空，展示默认发布者。\n- 如果上架时间为空，隐藏上架时间字段。\n- 如果标签为空，隐藏标签区域。\n- 如果详情链接为空，点击卡片不跳转。\n- 如果广告数据为空，不插入广告位。\n- 如果广告封面加载失败，展示默认广告占位。\n\n---\n\n### **视频搜索结果列表**\n\n#### 展示内容：\n\n- 视频列表展示视频内容卡片。\n- 视频结果列表为 5 行 5 列。\n- 每页最多展示 25 条视频数据。\n- 列表中可插入广告位。\n- 广告位尺寸与视频内容卡片保持一致。\n\n#### 卡片内容：\n\n- 视频封面。\n- 播放量。\n- 点赞量。\n- 视频标题。\n- 视频标签。\n\n#### 展示规则：\n\n- 视频封面比例为 16:9。\n- 播放量展示在封面左下角。\n- 点赞量展示在封面右下角。\n- 播放量和点赞量均使用 icon + 数字形式展示。\n- 视频卡片不展示上架时间。\n\n#### 交互规则：\n\n- 点击视频内容卡片进入视频详情页。\n- 点击视频标签跳转搜索结果页，并默认选中视频分类。\n- 鼠标悬浮视频卡片时展示选中效果。\n- 点击广告卡片跳转后台配置广告链接。\n\n#### 异常场景：\n\n- 如果视频搜索结果为空，展示视频空状态。\n- 如果视频封面为空，展示默认封面占位。\n- 如果视频标题为空，展示默认标题“未命名视频”。\n- 如果播放量为空，展示 0。\n- 如果点赞量为空，展示 0。\n- 如果标签为空，隐藏标签区域。\n- 如果视频详情链接为空，点击卡片不跳转。\n- 如果广告数据为空，不插入广告位。\n- 如果广告封面加载失败，展示默认广告占位。\n\n---\n\n### **分页器**\n\n#### 展示内容：\n\n- 分页器展示上一页、页码、下一页。\n- 当前页码需要高亮。\n- 默认页码为第 1 页。\n- 分页器根据当前分类和排序结果总数计算页数。\n\n#### 交互规则：\n\n- 点击页码切换至对应页。\n- 点击上一页切换到上一页。\n- 点击下一页切换到下一页。\n- 切换分页后，页面列表刷新为对应页数据。\n\n#### 异常场景：\n\n- 如果当前页大于最大页数，跳转或重置为最大页。\n- 如果当前页为第 1 页，上一页按钮置灰不可点击。\n- 如果当前页为最后一页，下一页按钮置灰不可点击。\n- 如果搜索结果总数为 0，隐藏分页器。\n- 如果分页接口请求失败，保留当前页内容并提示加载失败。","html":"\u003ch2>搜索结果页\u003c/h2>\n\u003cp>页面名称：搜索结果页\u003c/p>\n\u003cp>页面用途：\u003c/p>\n\u003cp>搜索结果页用于展示用户输入关键词后的内容搜索结果。页面支持帖子和视频两类内容切换，并支持排序、分页、内容卡片点击跳转等功能。本文档仅描述搜索结果页主体内容，不包含全站通用组件。\u003c/p>\n\u003chr>\n\u003ch3>\u003cstrong>页面主体结构\u003c/strong>\u003c/h3>\n\u003ch4>搜索结果页主体从上至下包含：\u003c/h4>\n\u003cul>\n\u003cli>搜索关键词展示区域。\u003c/li>\n\u003cli>内容分类切换按钮。\u003c/li>\n\u003cli>排序筛选区域。\u003c/li>\n\u003cli>搜索结果列表。\u003c/li>\n\u003cli>分页器。\u003c/li>\n\u003c/ul>\n\u003chr>\n\u003ch4>\u003cstrong>搜索关键词展示区域\u003c/strong>\u003c/h4>\n\u003ch5>展示内容：\u003c/h5>\n\u003cul>\n\u003cli>展示当前用户搜索的关键词。\u003c/li>\n\u003c/ul>\n\u003ch5>展示格式为：\u003c/h5>\n\u003cul>\n\u003cli>搜索结果：关键词。\u003c/li>\n\u003cli>关键词需要高亮展示。\u003c/li>\n\u003c/ul>\n\u003ch5>展示规则：\u003c/h5>\n\u003cul>\n\u003cli>搜索栏中需要回填当前关键词。\u003c/li>\n\u003c/ul>\n\u003ch5>异常场景：\u003c/h5>\n\u003cul>\n\u003cli>如果关键词过长，页面展示时需要截断或换行，不能撑破布局。\u003c/li>\n\u003c/ul>\n\u003chr>\n\u003ch4>\u003cstrong>内容分类切换\u003c/strong>\u003c/h4>\n\u003ch5>展示内容：\u003c/h5>\n\u003cul>\n\u003cli>分类切换按钮包含：帖子、视频。\u003c/li>\n\u003c/ul>\n\u003cp>默认选中帖子。\u003c/p>\n\u003cul>\n\u003cli>当前选中的分类按钮需要高亮。\u003c/li>\n\u003c/ul>\n\u003ch5>数据规则：\u003c/h5>\n\u003cul>\n\u003cli>分类由前端固定展示。\u003c/li>\n\u003cli>帖子分类对应动态 / 帖子结果列表。\u003c/li>\n\u003cli>视频分类对应视频结果列表。\u003c/li>\n\u003c/ul>\n\u003ch5>交互规则：\u003c/h5>\n\u003cul>\n\u003cli>点击“帖子”按钮，切换至帖子搜索结果列表。\u003c/li>\n\u003cli>点击“视频”按钮，切换至视频搜索结果列表。\u003c/li>\n\u003cli>切换分类时，需要同步更新 URL 参数中的 type。\u003c/li>\n\u003cli>切换分类后，分页重置为第 1 页。\u003c/li>\n\u003cli>切换分类后，排序默认保持当前排序；如果当前排序不适用，则重置为最新上架。\u003c/li>\n\u003c/ul>\n\u003ch5>异常场景：\u003c/h5>\n\u003cul>\n\u003cli>如果当前分类无搜索结果，展示对应分类的空状态。\u003c/li>\n\u003cli>如果切换分类时接口请求失败，保留当前页面状态并提示加载失败。\u003c/li>\n\u003c/ul>\n\u003chr>\n\u003ch4>\u003cstrong>排序筛选区域\u003c/strong>\u003c/h4>\n\u003ch5>展示内容：\u003c/h5>\n\u003cul>\n\u003cli>排序按钮包含：最新上架、最多点赞、最多观看、随机展示。\u003c/li>\n\u003cli>默认选中最新上架。\u003c/li>\n\u003cli>当前选中的排序按钮需要高亮。\u003c/li>\n\u003c/ul>\n\u003ch5>交互规则：\u003c/h5>\n\u003cul>\n\u003cli>点击排序按钮后，当前列表根据对应排序规则刷新。\u003c/li>\n\u003cli>切换排序时，需要同步更新 URL 参数中的 sort。\u003c/li>\n\u003cli>切换排序后，分页重置为第 1 页。\u003c/li>\n\u003cli>排序按钮只影响当前分类下的结果列表。\u003c/li>\n\u003cli>帖子和视频分类共用同一套排序按钮。\u003c/li>\n\u003c/ul>\n\u003ch5>异常场景：\u003c/h5>\n\u003cul>\n\u003cli>如果排序接口失败，保留当前列表并提示加载失败。\u003c/li>\n\u003cli>如果某个排序字段缺失，按默认排序或接口返回顺序展示。\u003c/li>\n\u003cli>如果随机展示无数据变化，仍保持当前排序按钮选中态。\u003c/li>\n\u003c/ul>\n\u003chr>\n\u003ch4>\u003cstrong>帖子搜索结果列表\u003c/strong>\u003c/h4>\n\u003ch5>展示内容：\u003c/h5>\n\u003cul>\n\u003cli>帖子列表展示动态内容卡片。\u003c/li>\n\u003cli>帖子结果列表为 5 行 5 列。\u003c/li>\n\u003cli>每页最多展示 25 条帖子数据。\u003c/li>\n\u003cli>列表中可插入广告位。\u003c/li>\n\u003cli>广告位尺寸与动态内容卡片保持一致。\u003c/li>\n\u003c/ul>\n\u003ch5>卡片内容：\u003c/h5>\n\u003cul>\n\u003cli>动态封面。\u003c/li>\n\u003cli>动态标题。\u003c/li>\n\u003cli>发布者信息。\u003c/li>\n\u003cli>上架时间。\u003c/li>\n\u003cli>动态标签。\u003c/li>\n\u003c/ul>\n\u003ch5>交互规则：\u003c/h5>\n\u003cul>\n\u003cli>点击动态内容卡片进入动态详情页。\u003c/li>\n\u003cli>点击动态标签跳转搜索结果页，并默认选中帖子分类。\u003c/li>\n\u003cli>鼠标悬浮动态卡片时展示选中效果。\u003c/li>\n\u003cli>点击广告卡片跳转后台配置广告链接。\u003c/li>\n\u003c/ul>\n\u003ch5>异常场景：\u003c/h5>\n\u003cul>\n\u003cli>如果帖子搜索结果为空，展示帖子空状态。\u003c/li>\n\u003cli>如果帖子封面为空，展示默认封面占位。\u003c/li>\n\u003cli>如果帖子标题为空，展示默认标题“未命名动态”。\u003c/li>\n\u003cli>如果发布者为空，展示默认发布者。\u003c/li>\n\u003cli>如果上架时间为空，隐藏上架时间字段。\u003c/li>\n\u003cli>如果标签为空，隐藏标签区域。\u003c/li>\n\u003cli>如果详情链接为空，点击卡片不跳转。\u003c/li>\n\u003cli>如果广告数据为空，不插入广告位。\u003c/li>\n\u003cli>如果广告封面加载失败，展示默认广告占位。\u003c/li>\n\u003c/ul>\n\u003chr>\n\u003ch4>\u003cstrong>视频搜索结果列表\u003c/strong>\u003c/h4>\n\u003ch5>展示内容：\u003c/h5>\n\u003cul>\n\u003cli>视频列表展示视频内容卡片。\u003c/li>\n\u003cli>视频结果列表为 5 行 5 列。\u003c/li>\n\u003cli>每页最多展示 25 条视频数据。\u003c/li>\n\u003cli>列表中可插入广告位。\u003c/li>\n\u003cli>广告位尺寸与视频内容卡片保持一致。\u003c/li>\n\u003c/ul>\n\u003ch5>卡片内容：\u003c/h5>\n\u003cul>\n\u003cli>视频封面。\u003c/li>\n\u003cli>播放量。\u003c/li>\n\u003cli>点赞量。\u003c/li>\n\u003cli>视频标题。\u003c/li>\n\u003cli>视频标签。\u003c/li>\n\u003c/ul>\n\u003ch5>展示规则：\u003c/h5>\n\u003cul>\n\u003cli>视频封面比例为 16:9。\u003c/li>\n\u003cli>播放量展示在封面左下角。\u003c/li>\n\u003cli>点赞量展示在封面右下角。\u003c/li>\n\u003cli>播放量和点赞量均使用 icon + 数字形式展示。\u003c/li>\n\u003cli>视频卡片不展示上架时间。\u003c/li>\n\u003c/ul>\n\u003ch5>交互规则：\u003c/h5>\n\u003cul>\n\u003cli>点击视频内容卡片进入视频详情页。\u003c/li>\n\u003cli>点击视频标签跳转搜索结果页，并默认选中视频分类。\u003c/li>\n\u003cli>鼠标悬浮视频卡片时展示选中效果。\u003c/li>\n\u003cli>点击广告卡片跳转后台配置广告链接。\u003c/li>\n\u003c/ul>\n\u003ch5>异常场景：\u003c/h5>\n\u003cul>\n\u003cli>如果视频搜索结果为空，展示视频空状态。\u003c/li>\n\u003cli>如果视频封面为空，展示默认封面占位。\u003c/li>\n\u003cli>如果视频标题为空，展示默认标题“未命名视频”。\u003c/li>\n\u003cli>如果播放量为空，展示 0。\u003c/li>\n\u003cli>如果点赞量为空，展示 0。\u003c/li>\n\u003cli>如果标签为空，隐藏标签区域。\u003c/li>\n\u003cli>如果视频详情链接为空，点击卡片不跳转。\u003c/li>\n\u003cli>如果广告数据为空，不插入广告位。\u003c/li>\n\u003cli>如果广告封面加载失败，展示默认广告占位。\u003c/li>\n\u003c/ul>\n\u003chr>\n\u003ch4>\u003cstrong>分页器\u003c/strong>\u003c/h4>\n\u003ch5>展示内容：\u003c/h5>\n\u003cul>\n\u003cli>分页器展示上一页、页码、下一页。\u003c/li>\n\u003cli>当前页码需要高亮。\u003c/li>\n\u003cli>默认页码为第 1 页。\u003c/li>\n\u003cli>分页器根据当前分类和排序结果总数计算页数。\u003c/li>\n\u003c/ul>\n\u003ch5>交互规则：\u003c/h5>\n\u003cul>\n\u003cli>点击页码切换至对应页。\u003c/li>\n\u003cli>点击上一页切换到上一页。\u003c/li>\n\u003cli>点击下一页切换到下一页。\u003c/li>\n\u003cli>切换分页后，页面列表刷新为对应页数据。\u003c/li>\n\u003c/ul>\n\u003ch5>异常场景：\u003c/h5>\n\u003cul>\n\u003cli>如果当前页大于最大页数，跳转或重置为最大页。\u003c/li>\n\u003cli>如果当前页为第 1 页，上一页按钮置灰不可点击。\u003c/li>\n\u003cli>如果当前页为最后一页，下一页按钮置灰不可点击。\u003c/li>\n\u003cli>如果搜索结果总数为 0，隐藏分页器。\u003c/li>\n
