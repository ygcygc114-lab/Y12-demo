续播放，直至倒计时至00:00结束；\u003c/p>\n\u003cp>视频结束后按通用规则弹出充值引导弹窗；\u003c/p>\n\u003cp>关闭付费弹窗后，视频仍按原进度播放（未结束则继续，已结束则停留在00:00）。\u003c/p>\n\u003cp>\u003cstrong>2.安卓/IOS-H5\u003c/strong>\u003c/p>\n\u003cp>点击后立即弹出付费弹窗；\u003c/p>\n\u003cp>弹窗弹出后，预览视频持续播放，直至倒计时至00:00结束；\u003c/p>\n\u003cp>若用户点击弹窗内按钮跳转至会员充值页/金币充值页，返回预览页面时，视频为暂停状态\u003c/p>\n\u003cp>若用户仅关闭付费弹窗，视频仍按原进度播放至结束\u003c/p>\n\u003cp>视频结束后按通用规则弹出充值引导弹窗 |\u003c/p>\n\u003ch4>2. 三端视频预览结束后充值引导弹窗交互规则需求文档\u003c/h4>\n\u003cp>一、需求目的\u003c/p>\n\u003cp>二、核心目标\u003c/p>\n\u003cp>1.统一三端预览结束后的视频播放状态：禁止自动重播\u003c/p>\n\u003cp>2.统一三端充值引导弹窗的触发与交互逻辑\u003c/p>\n\u003cp>3.通过弹窗引导用户充值\u003c/p>\n\u003cp>三、核心规则\u003c/p>\n\u003cp>1.预览结束后视频播放规则（三端统一）\u003c/p>\n\u003cp>| 操作场景 | 规则 |\u003c/p>\n\u003cp>| --- | --- |\u003c/p>\n\u003cp>| 预览播放结束 | 1.20 秒预览视频播放至倒计时为00:00时，视频立即停止播放\u003c/p>\n\u003cp>2.\u003cstrong>禁止视频自动循环预览\u003c/strong>\u003c/p>\n\u003cp>3.进度栏保持完全填充状态，倒计时固定显示00:00\u003c/p>\n\u003cp>4.\u003cstrong>预览视频停止播放的瞬间（倒计时为00:00时），弹窗立即弹出\u003c/strong>\u003c/p>\n\u003cp>5.用户需手动点击播放按钮，再次预览 |\u003c/p>\n\u003cp>2.弹窗关闭后操作规则（三端统一）\u003c/p>\n\u003cp>| 操作场景 | 规则 |\u003c/p>\n\u003cp>| --- | --- |\u003c/p>\n\u003cp>| 关闭弹窗后 | 1.视频仍保持停止状态，需用户手动点击播放按钮才能重新播放预览视频；\u003c/p>\n\u003cp>2.点击播放按钮后，倒计时重置为00:20，进度栏清空，视频重新开始 20秒预览播放；\u003c/p>\n\u003cp>3.重播后再次播放至结束，仍触发上述弹窗规则。 |\u003c/p>","lines":98},{"id":"视频详情页-38","title":"视频详情页","file":"docs/notion-export/ExportBlock-4efbb5e9-6b52-48cb-8bcf-820483b4cd96-Part-1/Y12/视频详情页 3497db3145c380ac8998c71700d9b0f6.md","raw":"# 视频详情页\n\n页面名称：视频详情页\n\n# 页面用途：\n\n视频详情页用于承载单个长视频内容的完整播放、视频信息展示、互动操作、评论和相关推荐。本文档仅描述视频详情页主体内容，不包含全站通用组件。\n\n## 视频播放器\n\n### 展示内容：\n\n- 视频播放器展示当前视频内容。\n- 视频播放前可展示前置广告。\n- 前置广告铺满整个播放器区域。\n- 广告上显示倒计时按钮。\n- 广告倒计时时间由后台返回。\n- 倒计时结束后，广告消失，显示正式视频播放器。\n\n具体组件说明 点击查看\n\n### 后台配置规则：\n\n- 播放器前置广告由后台返回。\n- 后台可配置广告封面、广告名称、广告链接、广告开启状态和倒计时时间。\n- 当广告开启且广告数据有效时，播放器先展示广告。\n- 如果后台未返回倒计时时间，直接显示关闭按钮。\n- 如果后台返回非法倒计时时间，直接显示关闭按钮。\n\n### 播放器功能：\n\n- 播放器包含播放 / 暂停按钮、进度条、可拖动锚点、当前播放时间、视频总时长、快进 15 秒、后退 15 秒、音量控制按钮、全屏按钮。\n- 拖动进度条锚点时，锚点上方显示视频截图预览。\n- 点击音量按钮后弹出音量控制弹窗。\n\n#### 交互规则：\n\n- 广告倒计时未结束前，不允许播放正式视频。\n- 倒计时结束后，用户可正常操作播放器。\n- 点击播放按钮开始播放视频。\n- 播放中点击暂停按钮暂停视频。\n- 点击快进按钮，当前播放时间向后跳转 15 秒。\n- 点击后退按钮，当前播放时间向前回退 15 秒。\n- 拖动进度条锚点时，视频进度同步更新。\n- 点击全屏按钮后播放器进入全屏状态。\n\n#### 异常场景：\n\n- 如果广告数据为空或广告关闭，直接展示正式视频播放器。\n- 如果广告加载失败，跳过广告，展示正式视频播放器。\n- 如果视频地址为空，播放器显示视频不可播放状态。\n- 如果视频加载失败，展示加载失败提示。\n- 如果视频时长获取失败，时长显示为默认值。\n- 如果快进后超过视频总时长，定位到视频结尾。\n- 如果后退后小于 0 秒，定位到 0 秒。\n- 如果截图预览加载失败，只显示进度时间，不显示截图。\n- 如果浏览器不支持全屏能力，隐藏全屏按钮或点击无响应。\n\n### 视频基础信息\n\n#### 展示内容：\n\n- 视频标题、视频标签、播放量、点赞量、分享按钮、点赞按钮。\n- 展示规则：\n- 视频标题展示在播放器下方。\n- 视频标签展示为标签按钮。\n- 播放量和点赞量使用 icon + 数字形式展示。\n- 点赞按钮展示当前是否已点赞状态。\n- 分享入口展示为功能按钮。\n\n#### 交互规则：\n\n- 点击视频标签跳转搜索结果页，并默认选中视频分类。\n- 点击点赞按钮后切换点赞状态。\n- 未点赞时点击，点赞数加 1。\n- 已点赞时点击，取消点赞，点赞数减 1。\n- 点击分享按钮展示分享入口或复制分享链接。\n\n#### 异常场景：\n\n- 如果视频标题为空，展示默认标题“未命名视频”。\n- 如果视频标签为空，不展示标签区域。\n- 如果播放量为空，展示 0。\n- 如果点赞量为空，展示 0。\n- 如果点赞接口失败，点赞状态回退到操作前状态。\n- 如果分享链接生成失败，提示分享失败。\n- 如果用户未登录时点击点赞，提示需要登录后操作或引导登录。\n\n### 猜你喜欢视频列表\n\n#### 展示内容：\n\n- 猜你喜欢视频列表展示 1 列视频内容卡片。\n- 列表展示 8 条视频数据。\n- 列表底部展示 1 个广告位。\n- 广告位比例为 1:1。\n\n#### 展示规则：\n\n- 视频内容卡片样式与全局视频内容卡片保持一致。\n- 广告位展示在猜你喜欢列表最底部。\n- 广告位需要展示广告封面和广告名称。\n\n#### 交互规则：\n\n- 点击猜你喜欢视频卡片，跳转对应视频详情页。\n- 点击广告位，跳转后台配置的广告链接。\n- 鼠标悬浮视频卡片或广告位时展示选中效果。\n\n### 异常场景：\n\n- 如果猜你喜欢数据为空，隐藏猜你喜欢列表或展示空状态。\n- 如果猜你喜欢数据不足 8 条，按实际数量展示。\n- 如果广告数据为空，隐藏底部广告位。\n- 如果广告封面加载失败，展示默认广告占位图。\n- 如果广告链接为空，点击广告位不跳转。\n\n### 评论功能\n\n#### 展示内容：\n\n- 评论区包含评论列表、评论输入栏、字数统计、评论按钮和登录按钮。\n\n#### 登录状态规则：\n\n- 用户已登录时，展示评论输入栏、字数统计和评论按钮。\n- 用户未登录时，隐藏评论输入栏、字数统计和评论按钮，展示登录按钮。\n- 未登录用户点击登录按钮后，打开登录弹窗或跳转登录页。\n- 登录成功后，评论区切换为已登录状态，展示评论输入栏和评论按钮。\n\n#### 输入规则：\n\n- 评论输入框最多输入 50 个字。\n- 输入框未输入内容时，评论按钮置灰不可点击。\n- 输入内容后，评论按钮高亮可点击。\n- 输入超过 50 个字时，不允许继续输入或自动截断。\n- 字数统计实时显示当前字数，例如 `0/50`。\n\n#### 提交规则：\n\n- 点击评论按钮后，提交评论内容。\n- 提交中评论按钮置灰并显示加载状态，防止重复提交。\n- 提交成功后，评论内容添加到评论列表。\n- 提交成功后清空输入框，字数统计重置为 `0/50`。\n- 评论列表展示评论用户、评论时间和评论内容。\n\n#### 异常场景：\n\n- 如果用户未登录，不展示评论输入栏，只展示登录按钮。\n- 如果评论内容为空，评论按钮保持置灰。\n- 如果评论提交失败，保留输入内容并提示提交失败。\n- 如果评论列表为空，展示暂无评论状态。\n- 如果登录状态读取失败，默认按未登录状态处理。\n- 如果提交过程中用户重复点击评论按钮，只提交一次。\n- 如果评论接口加载失败，评论列表展示空状态或加载失败提示。\n\n### 推荐视频列表\n\n#### 展示内容：\n\n- 推荐视频列表展示在评论功能下方。\n- 推荐视频列表采用 4 列布局。\n- 推荐视频内容卡片展示 4 行 4 列，共 16 条数据。\n- 视频内容卡片展示视频封面、播放量、点赞量、标题和标签。\n\n#### 交互规则：\n\n- 点击推荐视频卡片跳转对应视频详情页。\n- 鼠标悬浮推荐视频卡片时展示选中效果。\n\n#### 异常场景：\n\n- 如果推荐视频数据为空，隐藏推荐视频列表或展示空状态。\n- 如果推荐视频数据不足 16 条，按实际数量展示。\n- 如果推荐视频封面缺失，展示默认封面占位。\n- 如果视频标题为空，展示默认标题“未命名视频”。\n- 如果视频详情链接为空，点击卡片不跳转。","html":"\u003ch2>视频详情页\u003c/h2>\n\u003cp>页面名称：视频详情页\u003c/p>\n\u003ch2>页面用途：\u003c/h2>\n\u003cp>视频详情页用于承载单个长视频内容的完整播放、视频信息展示、互动操作、评论和相关推荐。本文档仅描述视频详情页主体内容，不包含全站通用组件。\u003c/p>\n\u003ch3>视频播放器\u003c/h3>\n\u003ch4>展示内容：\u003c/h4>\n\u003cul>\n\u003cli>视频播放器展示当前视频内容。\u003c/li>\n\u003cli>视频播放前可展示前置广告。\u003c/li>\n\u003cli>前置广告铺满整个播放器区域。\u003c/li>\n\u003cli>广告上显示倒计时按钮。\u003c/li>\n\u003cli>广告倒计时时间由后台返回。\u003c/li>\n\u003cli>倒计时结束后，广告消失，显示正式视频播放器。\u003c/li>\n\u003c/ul>\n\u003cp>具体组件说明 点击查看\u003c/p>\n\u003ch4>后台配置规则：\u003c/h4>\n\u003cul>\n\u003cli>播放器前置广告由后台返回。\u003c/li>\n\u003cli>后台可配置广告封面、广告名称、广告链接、广告开启状态和倒计时时间。\u003c/li>\n\u003cli>当广告开启且广告数据有效时，播放器先展示广告。\u003c/li>\n\u003cli>如果后台未返回倒计时时间，直接显示关闭按钮。\u003c/li>\n\u003cli>如果后台返回非法倒计时时间，直接显示关闭按钮。\u003c/li>\n\u003c/ul>\n\u003ch4>播放器功能：\u003c/h4>\n\u003cul>\n\u003cli>播放器包含播放 / 暂停按钮、进度条、可拖动锚点、当前播放时间、视频总时长、快进 15 秒、后退 15 秒、音量控制按钮、全屏按钮。\u003c/li>\n\u003cli>拖动进度条锚点时，锚点上方显示视频截图预览。\u003c/li>\n\u003cli>点击音量按钮后弹出音量控制弹窗。\u003c/li>\n\u003c/ul>\n\u003ch5>交互规则：\u003c/h5>\n\u003cul>\n\u003cli>广告倒计时未结束前，不允许播放正式视频。\u003c/li>\n\u003cli>倒计时结束后，用户可正常操作播放器。\u003c/li>\n\u003cli>点击播放按钮开始播放视频。\u003c/li>\n\u003cli>播放中点击暂停按钮暂停视频。\u003c/li>\n\u003cli>点击快进按钮，当前播放时间向后跳转 15 秒。\u003c/li>\n\u003cli>点击后退按钮，当前播放时间向前回退 15 秒。\u003c/li>\n\u003cli>拖动进度条锚点时，视频进度同步更新。\u003c/li>\n\u003cli>点击全屏按钮后播放器进入全屏状态。\u003c/li>\n\u003c/ul>\n\u003ch5>异常场景：\u003c/h5>\n\u003cul>\n\u003cli>如果广告数据为空或广告关闭，直接展示正式视频播放器。\u003c/li>\n\u003cli>如果广告加载失败，跳过广告，展示正式视频播放器。\u003c/li>\n\u003cli>如果视频地址为空，播放器显示视频不可播放状态。\u003c/li>\n\u003cli>如果视频加载失败，展示加载失败提示。\u003c/li>\n\u003cli>如果视频时长获取失败，时长显示为默认值。\u003c/li>\n\u003cli>如果快进后超过视频总时长，定位到视频结尾。\u003c/li>\n\u003cli>如果后退后小于 0 秒，定位到 0 秒。\u003c/li>\n\u003cli>如果截图预览加载失败，只显示进度时间，不显示截图。\u003c/li>\n\u003cli>如果浏览器不支持全屏能力，隐藏全屏按钮或点击无响应。\u003c/li>\n\u003c/ul>\n\u003ch4>视频基础信息\u003c/h4>\n\u003ch5>展示内容：\u003c/h5>\n\u003cul>\n\u003cli>视频标题、视频标签、播放量、点赞量、分享按钮、点赞按钮。\u003c/li>\n\u003cli>展示规则：\u003c/li>\n\u003cli>视频标题展示在播放器下方。\u003c/li>\n\u003cli>视频标签展示为标签按钮。\u003c/li>\n\u003cli>播放量和点赞量使用 icon + 数字形式展示。\u003c/li>\n\u003cli>点赞按钮展示当前是否已点赞状态。\u003c/li>\n\u003cli>分享入口展示为功能按钮。\u003c/li>\n\u003c/ul>\n\u003ch5>交互规则：\u003c/h5>\n\u003cul>\n\u003cli>点击视频标签跳转搜索结果页，并默认选中视频分类。\u003c/li>\n\u003cli>点击点赞按钮后切换点赞状态。\u003c/li>\n\u003cli>未点赞时点击，点赞数加 1。\u003c/li>\n\u003cli>已点赞时点击，取消点赞，点赞数减 1。\u003c/li>\n\u003cli>点击分享按钮展示分享入口或复制分享链接。\u003c/li>\n\u003c/ul>\n\u003ch5>异常场景：\u003c/h5>\n\u003cul>\n\u003cli>如果视频标题为空，展示默认标题“未命名视频”。\u003c/li>\n\u003cli>如果视频标签为空，不展示标签区域。\u003c/li>\n\u003cli>如果播放量为空，展示 0。\u003c/li>\n\u003cli>如果点赞量为空，展示 0。\u003c/li>\n\u003cli>如果点赞接口失败，点赞状态回退到操作前状态。\u003c/li>\n\u003cli>如果分享链接生成失败，提示分享失败。\u003c/li>\n\u003cli>如果用户未登录时点击点赞，提示需要登录后操作或引导登录。\u003c/li>\n\u003c/ul>\n\u003ch4>猜你喜欢视频列表\u003c/h4>\n\u003ch5>展示内容：\u003c/h5>\n\u003cul>\n\u003cli>猜你喜欢视频列表展示 1 列视频内容卡片。\u003c/li>\n\u003cli>列表展示 8 条视频数据。\u003c/li>\n\u003cli>列表底部展示 1 个广告位。\u003c/li>\n\u003cli>广告位比例为 1:1。\u003c/li>\n\u003c/ul>\n\u003ch5>展示规则：\u003c/h5>\n\u003cul>\n\u003cli>视频内容卡片样式与全局视频内容卡片保持一致。\u003c/li>\n\u003cli>广告位展示在猜你喜欢列表最底部。\u003c/li>\n\u003cli>广告位需要展示广告封面和广告名称。\u003c/li>\n\u003c/ul>\n\u003ch5>交互规则：\u003c/h5>\n\u003cul>\n\u003cli>点击猜你喜欢视频卡片，跳转对应视频详情页。\u003c/li>\n\u003cli>点击广告位，跳转后台配置的广告链接。\u003c/li>\n\u003cli>鼠标悬浮视频卡片或广告位时展示选中效果。\u003c/li>\n\u003c/ul>\n\u003ch4>异常场景：\u003c/h4>\n\u003cul>\n\u003cli>如果猜你喜欢数据为空，隐藏猜你喜欢列表或展示空状态。\u003c/li>\n\u003cli>如果猜你喜欢数据不足 8 条，按实际数量展示。\u003c/li>\n\u003cli>如果广告数据为空，隐藏底部广告位。\u003c/li>\n\u003cli>如果广告封面加载失败，展示默认广告占位图。\u003c/li>\n\u003cli>如果广告链接为空，点击广告位不跳转。\u003c/li>\n\u003c/ul>\n\u003ch4>评论功能\u003c/h4>\n\u003ch5>展示内容：\u003c/h5>\n\u003cul>\n\u003cli>评论区包含评论列表、评论输入栏、字数统计、评论按钮和登录按钮。\u003c/li>\n\u003c/ul>\n\u003ch5>登录状态规则：\u003c/h5>\n\u003cul>\n\u003cli>用户已登录时，展示评论输入栏、字数统计和评论按钮。\u003c/li>\n\u003cli>用户未登录时，隐藏评论输入栏、字数统计和评论按钮，展示登录按钮。\u003c/li>\n\u003cli>未登录用户点击登录按钮后，打开登录弹窗或跳转登录页。\u003c/li>\n\u003cli>登录成功后，评论区切换为已登录状态，展示评论输入栏和评论按钮。\u003c/li>\n\u003c/ul>\n\u003ch5>输入规则：\u003c/h5>\n\u003cul>\n\u003cli>评论输入框最多输入 50 个字。\u003c/li>\n\u003cli>输入框未输入内容时，评论按钮置灰不可点击。\u003c/li>\n\u003cli>输入内容后，评论按钮高亮可点击。\u003c/li>\n\u003cli>输入超过 50 个字时，不允许继续输入或自动截断。\u003c/li>\n\u003cli>字数统计实时显示当前字数，例如 \u003ccode>0/50\u003c/code>。\u003c/li>\n\u003c/ul>\n\u003ch5>提交规则：\u003c/h5>\n\u003cul>\n\u003cli>点击评论按钮后，提交评论内容。\u003c/li>\n\u003cli>提交中评论按钮置灰并显示加载状态，防止重复提交。\u003c/li>\n\u003cli>提交成功后，评论内容添加到评论列表。\u003c/li>\n\u003cli>提交成功后清空输入框，字数统计重置为 \u003ccode>0/50\u003c/code>。\u003c/li>\n\u003cli>评论列表展示评论用户、评论时间和评论内容。\u003c/li>\n\u003c/ul>\n\u003ch5>异常场景：\u003c/h5>\n\u003cul>\n\u003cli>如果用户未登录，不展示评论输入栏，只展示登录按钮。\u003c/li>\n\u003cli>如果评论内容为空，评论按钮保持置灰。\u003c/li>\n\u003cli>如果评论提交失败，保留输入内容并提示提交失败。\u003c/li>\n\u003cli>如果评论列表为空，展示暂无评论状态。\u003c/li>\n\u003cli>如果登录状态读取失败，默认按未登录状态处理。\u003c/li>\n\u003cli>如果提交过程中用户重复点击评论按钮，只提交一次。\u003c/li>\n\u003cli>如果评论接口加载失败，评论列表展示空状态或加载失败提示。\u003c/li>\n\u003c/ul>\n\u003ch4>推荐视频列表\u003c/h4>\n\u003ch5>展示内容：\u003c/h5>\n\u003cul>\n\u003cli>推荐视频列表展示在评论功能下方。\u003c/li>\n\u003cli>推荐视频列表采用 4 列布局。\u003c/li>\n\u003cli>推荐视频内容卡片展示 4 行 4 列，共 16 条数据。\u003c/li>\n\u003cli>视频内容卡片展示视频封面、播放量、点赞量、标题和标签。\u003c/li>\n\u003c/ul>\n\u003ch5>交互规则：\u003c/h5>\n\u003cul>\n\u003cli>点击推荐视频卡片跳转对应视频详情页。\u003c/li>\n\u003cli>鼠标悬浮推荐视频卡片时展示选中效果。\u003c/li>\n\u003c/ul>\n\u003ch5>异常场景：\u003c/h5>\n\u003cul>\n\u003cli>如果推荐视频数据为空，隐藏推荐视频列表或展示空状态。\u003c/li>\n\u003cli>如果推荐视频数据不足 16 条，按实际数量展示。\u003c/li>\n\u003cli>如果推荐视频封面缺失，展示默认封面占位。\u003c/li>\n\u003cli>如果视频标题为空，展示默认标题“未命名视频”。\u003c/li>\n\u003cli>如果视频详情链接为空，点击卡片不跳转。\u003c/li>\n\u003c/ul>","lines":177},{"id":"视频详情页前置广告-videoprerolly12-39","title":"视频详情页前置广告：videoPrerollY12","file":"docs/notion-export/ExportBlock-4efbb5e9-6b52-48cb-8bcf-820483b4cd96-Part-1/Y12/视频详情页前置广告：videoPrerollY12 3497db3145c38044a373e91b471beb8b.md","raw":"# 视频详情页前置广告：videoPrerollY12\n\n广告标识：videoPrerollY12\n\n### **组件用途**\n\n视频详情页前置广告用于在视频播放前展示广告内容。\n\n### **展示规则**\n\n广告铺满整个视频播放器区域。\n\n广告展示倒计时按钮。\n\n倒计时时间由后台返回。\n\n倒计时结束后广告自动消失，显示正式视频播放器。\n\n### **交互规则**\n\n广告倒计时未结束前，不允许播放正式视频。\n\n点击广告可跳转广告链接。\n\n倒计时结束后，自动切换到正式视频播放界面。\n\n### **异常场景**\n\n如果广告为空，直接展示播放器。\n\n如果倒计时时间为空或非法，使用默认值。\n\n如果广告加载失败，直接跳过广告。\n\n如果广告链接为空，点击不跳转。","html":"\u003ch2>视频详情页前置广告：videoPrerollY12\u003c/h2>\n\u003cp>广告标识：videoPrerollY12\u003c/p>\n\u003ch4>\u003cstrong>组件用途\u003c/strong>\u003c/h4>\n\u003cp>视频详情页前置广告用于在视频播放前展示广告内容。\u003c/p>\n\u003ch4>\u003cstrong>展示规则\u003c/strong>\u003c/h4>\n\u003cp>广告铺满整个视频播放器区域。\u003c/p>\n\u003cp>广告展示倒计时按钮。\u003c/p>\n\u003cp>倒计时时间由后台返回。\u003c/p>\n\u003cp>倒计时结束后广告自动消失，显示正式视频播放器。\u003c/p>\n\u003ch4>\u003cstrong>交互规则\u003c/strong>\u003c/h4>\n\u003cp>广告倒计时未结束前，不允许播放正式视频。\u003c/p>\n\u003cp>点击广告可跳转广告链接。\u003c/p>\n\u003cp>倒计时结束后，自动切换到正式视频播放界面。\u003c/p>\n\u003ch4>\u003cstrong>异常场景\u003c/strong>\u003c/h4>\n\u003cp>如果广告为空，直接展示播放器。\u003c/p>\n\u003cp>如果倒计时时间为空或非法，使用默认值。\u003c/p>\n\u003cp>如果广告加载失败，直接跳过广告。\u003c/p>\n\u003cp>如果广告链接为空，点击不跳转。\u003c/p>","lines":35},{"id":"视频详情页推荐区广告-videorecommendy12-40","title":"视频详情页推荐区广告：videoRecommendY12","file":"docs/notion-export/ExportBlock-4efbb5e9-6b52-48cb-8bcf-820483b4cd96-Part-1/Y12/视频详情页推荐区广告：videoRecommendY12 3497db3145c38091a280f430d4fba08f.md","raw":"# 视频详情页推荐区广告：videoRecommendY12\n\n广告标识：videoRecommendY12\n\n### **组件用途**\n\n视频详情页推荐区广告用于展示在推荐视频列表中的广告内容。\n\n### **展示规则**\n\n广告展示在推荐视频列表中。\n\n广告尺寸与推荐视频内容卡片保持一致。\n\n广告封面铺满整个卡片区域。\n\n广告名称以底部浮层方式展示。\n\n### **交互规则**\n\n点击广告卡片跳转广告链接。\n\n### **异常场景**\n\n如果广告为空，不展示广告卡片。\n\n如果广告封面加载失败，展示默认广告占位图。\n\n如果广告链接为空，点击不跳转。","html":"\u003ch2>视频详情页推荐区广告：videoRecommendY12\u003c/h2>\n\u003cp>广告标识：videoRecommendY12\u003c/p>\n\u003ch4>\u003cstrong>组件用途\u003c/strong>\u003c/h4>\n\u003cp>视频详情页推荐区广告用于展示在推荐视频列表中的广告内容。\u003c/p>\n\u003ch4>\u003cstrong>展示规则\u003c/strong>\u003c/h4>\n\u003cp>广告展示在推荐视频列表中。\u003c/p>\n\u003cp>广告尺寸与推荐视频内容卡片保持一致。\u003c/p>\n\u003cp>广告封面铺满整个卡片区域。\u003c/p>\n\u003cp>广告名称以底部浮层方式展示。\u003c/p>\n\u003ch4>\u003cstrong>交互规则\u003c/strong>\u003c/h4>\n\u003cp>点击广告卡片跳转广告链接。\u003c/p>\n\u003ch4>\u003cstrong>异常场景\u003c/strong>\u003c/h4>\n\u003cp>如果广告为空，不展示广告卡片。\u003c/p>\n\u003cp>如果广告封面加载失败，展示默认广告占位图。\u003c/p>\n\u003cp>如果广告链接为空，点击不跳转。\u003c/p>","lines":29},{"id":"视频详情页猜你喜欢广告-videoguessy12-41","title":"视频详情页猜你喜欢广告：videoGuessY12","file":"docs/notion-export/ExportBlock-4efbb5e9-6b52-48cb-8bcf-820483b4cd96-Part-1/Y12/视频详情页猜你喜欢广告：videoGuessY12 3497db3145c380149af7dca47ac31753.md","raw":"# 视频详情页猜你喜欢广告：videoGuessY12\n\n广告标识：videoGuessY12\n\n### **组件用途**\n\n视频详情页猜你喜欢广告用于展示在猜你喜欢视频列表底部的广告位。\n\n### **展示规则**\n\n广告展示在猜你喜欢视频列表底部。\n\n广告比例为 1:1。\n\n广告展示广告封面和广告名称。\n\n### **交互规则**\n\n点击广告卡片跳转广告链接。\n\n### **异常场景**\n\n如果广告为空，隐藏该广告位。\n\n如果广告封面为空，展示默认封面。\n\n如果广告名称为空，展示默认名称“广告位”。\n\n如果广告链接为空，点击不跳转。","html":"\u003ch2>视频详情页猜你喜欢广告：videoGuessY12\u003c/h2>\n\u003cp>广告标识：videoGuessY12\u003c/p>\n\u003ch4>\u003cstrong>组件用途\u003c/strong>\u003c/h4>\n\u003cp>视频详情页猜你喜欢广告用于展示在猜你喜欢视频列表底部的广告位。\u003c/p>\n\u003ch4>\u003cstrong>展示规则\u003c/strong>\u003c/h4>\n\u003cp>广告展示在猜你喜欢视频列表底部。\u003c/p>\n\u003cp>广告比例为 1:1。\u003c/p>\n\u003cp>广告展示广告封面和广告名称。\u003c/p>\n\u003ch4>\u003cstrong>交互规则\u003c/strong>\u003c/h4>\n\u003cp>点击广告卡片跳转广告链接。\u003c/p>\n\u003ch4>\u003cstrong>异常场景\u003c/strong>\u003c/h4>\n\u003cp>如果广告为空，隐藏该广告位。\u003c/p>\n\u003cp>如果广告封面为空，展示默认封面。\u003c/p>\n\u003cp>如果广告名称为空，展示默认名称“广告位”。\u003c/p>\n\u003cp>如果广告链接为空，点击不跳转。\u003c/p>","lines":29},{"id":"评论功能-42","title":"评论功能","file":"docs/notion-export/ExportBlock-4efbb5e9-6b52-48cb-8bcf-820483b4cd96-Part-1/Y12/评论功能 3497db3145c3805ca37af23f2655c2fa.md","raw":"# 评论功能\n\n## **功能用途**\n\n评论功能用于支持用户对帖子或视频内容发表评论，并展示已有评论内容。\n\n## **展示内容**\n\n评论功能包含：\n\n- 评论输入框\n- 字数统计\n- 评论按钮\n- 登录按钮\n- 评论列表\n\n## **展示规则**\n\n评论输入框最多输入 50 个字。\n\n字数统计实时显示当前输入字数，例如 0/50。\n\n已登录用户展示评论输入框、字数统计和评论按钮。\n\n未登录用户隐藏评论输入框、字数统计和评论按钮，仅展示登录按钮。\n\n评论列表展示评论用户、评论时间和评论内容。\n\n## **交互规则**\n\n输入框无内容时，评论按钮置灰不可点击。\n\n输入内容后，评论按钮高亮可点击。\n\n点击评论按钮后，进入提交中状态，按钮置灰并禁止重复点击。\n\n评论提交成功后，评论内容加入评论列表。\n\n提交成功后清空输入框，字数统计重置。\n\n未登录用户点击登录按钮后，打开登录弹窗或跳转登录页。\n\n## **异常场景**\n\n如果用户未登录，不展示评论输入框。\n\n如果评论内容为空，评论按钮保持置灰。\n\n如果输入超过 50 个字，不允许继续输入或自动截断。\n\n如果评论提交失败，保留输入内容并提示提交失败。\n\n如果评论列表为空，展示暂无评论状态。\n\n如果登录状态异常，默认按未登录状态处理。\n\n如果内容已下架，评论功能可关闭或仅保留历史评论展示。","html":"\u003ch2>评论功能\u003c/h2>\n\u003ch3>\u003cstrong>功能用途\u003c/strong>\u003c/h3>\n\u003cp>评论功能用于支持用户对帖子或视频内容发表评论，并展示已有评论内容。\u003c/p>\n\u003ch3>\u003cstrong>展示内容\u003c/strong>\u003c/h3>\n\u003cp>评论功能包含：\u003c/p>\n\u003cul>\n\u003cli>评论输入框\u003c/li>\n\u003cli>字数统计\u003c/li>\n\u003cli>评论按钮\u003c/li>\n\u003cli>登录按钮\u003c/li>\n\u003cli>评论列表\u003c/li>\n\u003c/ul>\n\u003ch3>\u003cstrong>展示规则\u003c/strong>\u003c/h3>\n\u003cp>评论输入框最多输入 50 个字。\u003c/p>\n\u003cp>字数统计实时显示当前输入字数，例如 0/50。\u003c/p>\n\u003cp>已登录用户展示评论输入框、字数统计和评论按钮。\u003c/p>\n\u003cp>未登录用户隐藏评论输入框、字数统计和评论按钮，仅展示登录按钮。\u003c/p>\n\u003cp>评论列表展示评论用户、评论时间和评论内容。\u003c/p>\n\u003ch3>\u003cstrong>交互规则\u003c/strong>\u003c/h3>\n\u003cp>输入框无内容时，评论按钮置灰不可点击。\u003c/p>\n\u003cp>输入内容后，评论按钮高亮可点击。\u003c/p>\n\u003cp>点击评论按钮后，进入提交中状态，按钮置灰并禁止重复点击。\u003c/p>\n\u003cp>评论提交成功后，评论内容加入评论列表。\u003c/p>\n\u003cp>提交成功后清空输入框，字数统计重置。\u003c/p>\n\u003cp>未登录用户点击登录按钮后，打开登录弹窗或跳转登录页。\u003c/p>\n\u003ch3>\u003cstrong>异常场景\u003c/strong>\u003c/h3>\n\u003cp>如果用户未登录，不展示评论输入框。\u003c/p>\n\u003cp>如果评论内容为空，评论按钮保持置灰。\u003c/p>\n\u003cp>如果输入超过 50 个字，不允许继续输入或自动截断。\u003c/p>\n\u003cp>如果评论提交失败，保留输入内容并提示提交失败。\u003c/p>\n\u003cp>如果评论列表为空，展示暂无评论状态。\u003c/p>\n\u003cp>如果登录状态异常，默认按未登录状态处理。\u003c/p>\n\u003cp>如果内容已下架，评论功能可关闭或仅保留历史评论展示。\u003c/p>","lines":57},{"id":"评论功能与用户状态-43","title":"评论功能与用户状态","file":"docs/notion-export/ExportBlock-4efbb5e9-6b52-48cb-8bcf-820483b4cd96-Part-1/Y12/评论功能与用户状态 3497db3145c38062bf9ccb34d604fcf2.md","raw":"# 评论功能与用户状态\n\n### **游客状态**\n\n游客状态下：\n\n- 隐藏评论输入框\n- 隐藏字数统计\n- 隐藏评论按钮\n- 展示登录按钮\n\n点击登录按钮后：\n\n- 打开登录弹窗或跳转登录页\n\n### **登录状态**\n\n登录状态下：\n\n- 展示评论输入框\n- 展示字数统计\n- 展示评论按钮\n- 可正常发表评论\n\n### **异常场景**\n\n如果登录状态读取失败，默认按游客状态处理。\n\n如果评论提交时登录状态失效，提示重新登录。","html":"\u003ch2>评论功能与用户状态\u003c/h2>\n\u003ch4>\u003cstrong>游客状态\u003c/strong>\u003c/h4>\n\u003cp>游客状态下：\u003c/p>\n\u003cul>\n\u003cli>隐藏评论输入框\u003c/li>\n\u003cli>隐藏字数统计\u003c/li>\n\u003cli>隐藏评论按钮\u003c/li>\n\u003cli>展示登录按钮\u003c/li>\n\u003c/ul>\n\u003cp>点击登录按钮后：\u003c/p>\n\u003cul>\n\u003cli>打开登录弹窗或跳转登录页\u003c/li>\n\u003c/ul>\n\u003ch4>\u003cstrong>登录状态\u003c/strong>\u003c/h4>\n\u003cp>登录状态下：\u003c/p>\n\u003cul>\n\u003cli>展示评论输入框\u003c/li>\n\u003cli>展示字数统计\u003c/li>\n\u003cli>展示评论按钮\u003c/li>\n\u003cli>可正常发表评论\u003c/li>\n\u003c/ul>\n\u003ch4>\u003cstrong>异常场景\u003c/strong>\u003c/h4>\n\u003cp>如果登录状态读取失败，默认按游客状态处理。\u003c/p>\n\u003cp>如果评论提交时登录状态失效，提示重新登录。\u003c/p>","lines":29},{"id":"页面同步规则-44","title":"页面同步规则：","file":"docs/notion-export/ExportBlock-4efbb5e9-6b52-48cb-8bcf-820483b4cd96-Part-1/Y12/页面同步规则： 3497db3145c38035bd4ccbcee9c6b331.md","raw":"# 页面同步规则：\n\n用户状态为全站通用状态。\n\n在任意页面登录成功后，跳转到其他页面时应保持登录状态。\n\n在任意页面退出账号后，跳转到其他页面时应保持游客状态。\n\n顶部栏、评论功能、点赞功能、个人中心菜单等均应根据最新用户状态同步更新。","html":"\u003ch2>页面同步规则：\u003c/h2>\n\u003cp>用户状态为全站通用状态。\u003c/p>\n\u003cp>在任意页面登录成功后，跳转到其他页面时应保持登录状态。\u003c/p>\n\u003cp>在任意页面退出账号后，跳转到其他页面时应保持游客状态。\u003c/p>\n\u003cp>顶部栏、评论功能、点赞功能、个人中心菜单等均应根据最新用户状态同步更新。\u003c/p>","lines":9},{"id":"顶部广告栏-45","title":"顶部广告栏","file":"docs/notion-export/ExportBlock-4efbb5e9-6b52-48cb-8bcf-820483b4cd96-Part-1/Y12/顶部广告栏 3497db3145c380caad1cea056c8d4290.md","raw":"# 顶部广告栏\n\n组件名称：顶部广告栏\n\n## 组件用途：\n\n顶部广告栏用于在全站页面顶部展示广告入口，承载平台推广、合作广告或运营推荐内容。该模块需要在所有页面保持统一展示样式，保证用户进入任意页面时都能看到顶部广告信息。\n\n## 主要展示内容：\n\n顶部广告栏展示多条广告卡片，每条广告包含广告图标和广告名称。广告图标位于卡片上方，广告名称位于图标下方。广告名称按“广告A、广告B、广告C……”依次展示。\n\n### 展示规则：\n\n- 顶部广告栏在全站页面展示，位置位于顶部菜单栏下方、页面主体内容上方。广告卡片横向排列，卡片尺寸、间距、圆角、边框和背景色需要与首页保持一致。广告数量较多时，需要保证横向展示稳定，不影响页面主体布局。\n\n### 交互规则：\n\n- 广告卡片可作为点击入口，点击后可跳转到对应广告链接。当前静态版本可先保留占位跳转或不配置真实链接。鼠标悬浮广告卡片时应有轻微高亮或选中反馈，提示用户该区域可点击。\n\n#### 异常场景：\n\n- 如果广告数据为空，顶部广告栏应隐藏整个模块，避免页面出现空白广告容器。\n- 如果某条广告缺少名称，应使用默认名称，例如“广告位”。\n- 如果某条广告缺少图标，应使用默认广告图标或默认字母标识。\n- 如果广告数量过多，广告栏不应撑破页面宽度，应通过横向滚动、轮播或隐藏溢出方式处理。\n- 如果广告图片或图标加载失败，应显示默认占位样式，不能出现破图。\n- 如果广告链接为空，点击该广告时不跳转，也不报错。\n- 如果移动端屏幕宽度不足，广告卡片需要自适应缩小或横向滚动，不能挤压顶部栏、菜单栏和主体内容。\n- 如果广告栏加载较慢，页面主体内容应正常展示，不应因为广告异常导致页面不可用。","html":"\u003ch2>顶部广告栏\u003c/h2>\n\u003cp>组件名称：顶部广告栏\u003c/p>\n\u003ch3>组件用途：\u003c/h3>\n\u003cp>顶部广告栏用于在全站页面顶部展示广告入口，承载平台推广、合作广告或运营推荐内容。该模块需要在所有页面保持统一展示样式，保证用户进入任意页面时都能看到顶部广告信息。\u003c/p>\n\u003ch3>主要展示内容：\u003c/h3>\n\u003cp>顶部广告栏展示多条广告卡片，每条广告包含广告图标和广告名称。广告图标位于卡片上方，广告名称位于图标下方。广告名称按“广告A、广告B、广告C……”依次展示。\u003c/p>\n\u003ch4>展示规则：\u003c/h4>\n\u003cul>\n\u003cli>顶部广告栏在全站页面展示，位置位于顶部菜单栏下方、页面主体内容上方。广告卡片横向排列，卡片尺寸、间距、圆角、边框和背景色需要与首页保持一致。广告数量较多时，需要保证横向展示稳定，不影响页面主体布局。\u003c/li>\n\u003c/ul>\n\u003ch4>交互规则：\u003c/h4>\n\u003cul>\n\u003cli>广告卡片可作为点击入口，点击后可跳转到对应广告链接。当前静态版本可先保留占位跳转或不配置真实链接。鼠标悬浮广告卡片时应有轻微高亮或选中反馈，提示用户该区域可点击。\u003c/li>\n\u003c/ul>\n\u003ch5>异常场景：\u003c/h5>\n\u003cul>\n\u003cli>如果广告数据为空，顶部广告栏应隐藏整个模块，避免页面出现空白广告容器。\u003c/li>\n\u003cli>如果某条广告缺少名称，应使用默认名称，例如“广告位”。\u003c/li>\n\u003cli>如果某条广告缺少图标，应使用默认广告图标或默认字母标识。\u003c/li>\n\u003cli>如果广告数量过多，广告栏不应撑破页面宽度，应通过横向滚动、轮播或隐藏溢出方式处理。\u003c/li>\n\u003cli>如果广告图片或图标加载失败，应显示默认占位样式，不能出现破图。\u003c/li>\n\u003cli>如果广告链接为空，点击该广告时不跳转，也不报错。\u003c/li>\n\u003cli>如果移动端屏幕宽度不足，广告卡片需要自适应缩小或横向滚动，不能挤压顶部栏、菜单栏和主体内容。\u003c/li>\n\u003cli>如果广告栏加载较慢，页面主体内容应正常展示，不应因为广告异常导致页面不可用。\u003c/li>\n\u003c/ul>","lines":30},{"id":"顶部广告栏-topbannery12-46","title":"顶部广告栏：topBannerY12","file":"docs/notion-export/ExportBlock-4efbb5e9-6b52-48cb-8bcf-820483b4cd96-Part-1/Y12/顶部广告栏：topBannerY12 3497db3145c3806e9b70d974f4e931ff.md","raw":"# 顶部广告栏：topBannerY12\n\n广告标识：topBannerY12\n\n### **组件用途**\n\n顶部广告栏用于在全站页面顶部展示横向广告入口。\n\n### **展示规则**\n\n广告展示在页面顶部、菜单栏下方。\n\n广告按横向排列展示。\n\n广告卡片展示广告图标和广告名称。\n\n广告名称显示在广告图标下方。\n\n广告样式在全站页面保持一致。\n\n### **交互规则**\n\n点击广告卡片跳转广告链接。\n\n鼠标悬浮广告卡片时展示高亮反馈。\n\n### **异常场景**\n\n如果广告为空，隐藏整个顶部广告栏。\n\n如果广告图标为空，展示默认图标。\n\n如果广告名称为空，展示默认名称“广告位”。\n\n如果广告链接为空，点击不跳转。","html":"\u003ch2>顶部广告栏：topBannerY12\u003c/h2>\n\u003cp>广告标识：topBannerY12\u003c/p>\n\u003ch4>\u003cstrong>组件用途\u003c/strong>\u003c/h4>\n\u003cp>顶部广告栏用于在全站页面顶部展示横向广告入口。\u003c/p>\n\u003ch4>\u003cstrong>展示规则\u003c/strong>\u003c/h4>\n\u003cp>广告展示在页面顶部、菜单栏下方。\u003c/p>\n\u003cp>广告按横向排列展示。\u003c/p>\n\u003cp>广告卡片展示广告图标和广告名称。\u003c/p>\n\u003cp>广告名称显示在广告图标下方。\u003c/p>\n\u003cp>广告样式在全站页面保持一致。\u003c/p>\n\u003ch4>\u003cstrong>交互规则\u003c/strong>\u003c/h4>\n\u003cp>点击广告卡片跳转广告链接。\u003c/p>\n\u003cp>鼠标悬浮广告卡片时展示高亮反馈。\u003c/p>\n\u003ch4>\u003cstrong>异常场景\u003c/strong>\u003c/h4>\n\u003cp>如果广告为空，隐藏整个顶部广告栏。\u003c/p>\n\u003cp>如果广告图标为空，展示默认图标。\u003c/p>\n\u003cp>如果广告名称为空，展示默认名称“广告位”。\u003c/p>\n\u003cp>如果广告链接为空，点击不跳转。\u003c/p>","lines":35},{"id":"顶部栏-47","title":"顶部栏","file":"docs/notion-export/ExportBlock-4efbb5e9-6b52-48cb-8bcf-820483b4cd96-Part-1/Y12/顶部栏 3497db3145c380ff9b33e43ead20d18d.md","raw":"# 顶部栏\n\n**顶部栏需求说明**\n\n组件名称：顶部栏\n\n## 组件用途：\n\n顶部栏用于承载全站品牌展示、搜索入口、分类入口、APP 下载入口和用户账号入口。顶部栏在全站所有页面保持统一展示和交互规则。\n\n主要展示内容：\n\n顶部栏包含品牌 Logo 图片、搜索栏、全部分类按钮、APP 下载按钮、登录 / 个人中心入口。\n\n产品名称与 Logo 为一张完整图片，不拆分为文字和图标。\n\n品牌图片由商户后台“项目基础设置”上传配置。\n\nAPP 下载按钮由商户后台“项目基础设置”中的 APP 下载开关控制显示或隐藏。\n\n## 后台配置规则：\n\n商户后台项目基础设置支持上传品牌图片。\n\n品牌图片包含产品 Logo 与产品名称。\n\n前端顶部栏直接展示后台上传的完整品牌图片。\n\n如果后台更新品牌图片，前端顶部栏展示内容同步更新。\n\n商户后台项目基础设置支持配置 APP 下载开关。\n\nAPP 下载开关开启时，顶部栏展示“APP 下载”按钮。\n\nAPP 下载开关关闭时，顶部栏不展示“APP 下载”按钮，也不保留占位。\n\n## 交互规则：\n\n点击品牌图片跳转首页。\n\n点击搜索栏可输入关键词，并展示搜索下拉框。\n\n输入关键词后点击搜索按钮或按回车，跳转搜索结果页。\n\n点击“全部分类”按钮跳转全部分类页。\n\n点击“APP 下载”按钮进入 APP 下载入口。\n\n未登录状态下，顶部栏显示“登录”按钮。\n\n点击“登录”按钮打开登录弹窗。\n\n登录成功后，顶部栏入口切换为“个人中心”。\n\n点击“个人中心”展示个人中心下拉框。\n\n## 状态规则：\n\n未登录时显示登录入口。\n\n已登录时显示个人中心入口。\n\nAPP 下载开关开启时显示 APP 下载按钮。\n\nAPP 下载开关关闭时隐藏 APP 下载按钮。\n\n品牌图片正常加载时展示后台上传图片。\n\n顶部栏在所有页面保持统一高度、间距、圆角和视觉风格。\n\n## 异常场景：\n\n如果后台未上传品牌图片，前端展示默认品牌占位图。\n\n如果品牌图片加载失败，前端展示默认品牌占位图，不能出现破图。\n\n如果品牌图片尺寸过大，前端需要按顶部栏高度等比例缩放，不能撑高顶部栏。\n\n如果品牌图片尺寸过小，前端保持原比例展示，不强制拉伸变形。\n\n如果 APP 下载开关关闭，按钮隐藏后搜索栏和账号入口需要自动补位，不能留下空白占位。\n\n如果 APP 下载入口链接为空，点击按钮不跳转。\n\n如果搜索接口或搜索跳转异常，顶部栏其他功能不受影响。\n\n如果后台配置更新但前端缓存未刷新，允许短时间展示旧配置，刷新页面后应展示最新配置。\n\n如果用户登录态读取失败，默认按未登录状态展示。","html":"\u003ch2>顶部栏\u003c/h2>\n\u003cp>\u003cstrong>顶部栏需求说明\u003c/strong>\u003c/p>\n\u003cp>组件名称：顶部栏\u003c/p>\n\u003ch3>组件用途：\u003c/h3>\n\u003cp>顶部栏用于承载全站品牌展示、搜索入口、分类入口、APP 下载入口和用户账号入口。顶部栏在全站所有页面保持统一展示和交互规则。\u003c/p>\n\u003cp>主要展示内容：\u003c/p>\n\u003cp>顶部栏包含品牌 Logo 图片、搜索栏、全部分类按钮、APP 下载按钮、登录 / 个人中心入口。\u003c/p>\n\u003cp>产品名称与 Logo 为一张完整图片，不拆分为文字和图标。\u003c/p>\n\u003cp>品牌图片由商户后台“项目基础设置”上传配置。\u003c/p>\n\u003cp>APP 下载按钮由商户后台“项目基础设置”中的 APP 下载开关控制显示或隐藏。\u003c/p>\n\u003ch3>后台配置规则：\u003c/h3>\n\u003cp>商户后台项目基础设置支持上传品牌图片。\u003c/p>\n\u003cp>品牌图片包含产品 Logo 与产品名称。\u003c/p>\n\u003cp>前端顶部栏直接展示后台上传的完整品牌图片。\u003c/p>\n\u003cp>如果后台更新品牌图片，前端顶部栏展示内容同步更新。\u003c/p>\n\u003cp>商户后台项目基础设置支持配置 APP 下载开关。\u003c/p>\n\u003cp>APP 下载开关开启时，顶部栏展示“APP 下载”按钮。\u003c/p>\n\u003cp>APP 下载开关关闭时，顶部栏不展示“APP 下载”按钮，也不保留占位。\u003c/p>\n\u003ch3>交互规则：\u003c/h3>\n\u003cp>点击品牌图片跳转首页。\u003c/p>\n\u003cp>点击搜索栏可输入关键词，并展示搜索下拉框。\u003c/p>\n\u003cp>输入关键词后点击搜索按钮或按回车，跳转搜索结果页。\u003c/p>\n\u003cp>点击“全部分类”按钮跳转全部分类页。\u003c/p>\n\u003cp>点击“APP 下载”按钮进入 APP 下载入口。\u003c/p>\n\u003cp>未登录状态下，顶部栏显示“登录”按钮。\u003c/p>\n\u003cp>点击“登录”按钮打开登录弹窗。\u003c/p>\n\u003cp>登录成功后，顶部栏入口切换为“个人中心”。\u003c/p>\n\u003cp>点击“个人中心”展示个人中心下拉框。\u003c/p>\n\u003ch3>状态规则：\u003c/h3>\n\u003cp>未登录时显示登录入口。\u003c/p>\n\u003cp>已登录时显示个人中心入口。\u003c/p>\n\u003cp>APP 下载开关开启时显示 APP 下载按钮。\u003c/p>\n\u003cp>APP 下载开关关闭时隐藏 APP 下载按钮。\u003c/p>\n\u003cp>品牌图片正常加载时展示后台上传图片。\u003c/p>\n\u003cp>顶部栏在所有页面保持统一高度、间距、圆角和视觉风格。\u003c/p>\n\u003ch3>异常场景：\u003c/h3>\n\u003cp>如果后台未上传品牌图片，前端展示默认品牌占位图。\u003c/p>\n\u003cp>如果品牌图片加载失败，前端展示默认品牌占位图，不能出现破图。\u003c/p>\n\u003cp>如果品牌图片尺寸过大，前端需要按顶部栏高度等比例缩放，不能撑高顶部栏。\u003c/p>\n\u003cp>如果品牌图片尺寸过小，前端保持原比例展示，不强制拉伸变形。\u003c/p>\n\u003cp>如果 APP 下载开关关闭，按钮隐藏后搜索栏和账号入口需要自动补位，不能留下空白占位。\u003c/p>\n\u003cp>如果 APP 下载入口链接为空，点击按钮不跳转。\u003c/p>\n\u003cp>如果搜索接口或搜索跳转异常，顶部栏其他功能不受影响。\u003c/p>\n\u003cp>如果后台配置更新但前端缓存未刷新，允许短时间展示旧配置，刷新页面后应展示最新配置。\u003c/p>\n\u003cp>如果用户登录态读取失败，默认按未登录状态展示。\u003c/p>","lines":89},{"id":"顶部栏状态规则-48","title":"顶部栏状态规则","file":"docs/notion-export/ExportBlock-4efbb5e9-6b52-48cb-8bcf-820483b4cd96-Part-1/Y12/顶部栏状态规则 3497db3145c380a78ddbf8fee6e113b8.md","raw":"# 顶部栏状态规则\n\n### **游客状态**\n\n顶部栏右侧入口显示“登录”。\n\n点击“登录”按钮后，打开登录弹窗。\n\n不展示个人中心下拉菜单。\n\n### **登录状态**\n\n顶部栏右侧入口显示“个人中心”。\n\n点击“个人中心”后，展示个人中心下拉框。\n\n个人中心下拉框包含：\n\n- 观看历史\n- 我的点赞\n- 退出账号\n\n### **异常场景**\n\n如果用户状态读取失败，默认展示“登录”。\n\n如果本地存储损坏或字段缺失，清空异常状态并按游客状态处理。\n\n如果登录态已失效但本地仍保留旧状态，前端刷新后应重新按最新有效状态渲染，当前静态版本可先按本地状态为准。","html":"\u003ch2>顶部栏状态规则\u003c/h2>\n\u003ch4>\u003cstrong>游客状态\u003c/strong>\u003c/h4>\n\u003cp>顶部栏右侧入口显示“登录”。\u003c/p>\n\u003cp>点击“登录”按钮后，打开登录弹窗。\u003c/p>\n\u003cp>不展示个人中心下拉菜单。\u003c/p>\n\u003ch4>\u003cstrong>登录状态\u003c/strong>\u003c/h4>\n\u003cp>顶部栏右侧入口显示“个人中心”。\u003c/p>\n\u003cp>点击“个人中心”后，展示个人中心下拉框。\u003c/p>\n\u003cp>个人中心下拉框包含：\u003c/p>\n\u003cul>\n\u003cli>观看历史\u003c/li>\n\u003cli>我的点赞\u003c/li>\n\u003cli>退出账号\u003c/li>\n\u003c/ul>\n\u003ch4>\u003cstrong>异常场景\u003c/strong>\u003c/h4>\n\u003cp>如果用户状态读取失败，默认展示“登录”。\u003c/p>\n\u003cp>如果本地存储损坏或字段缺失，清空异常状态并按游客状态处理。\u003c/p>\n\u003cp>如果登录态已失效但本地仍保留旧状态，前端刷新后应重新按最新有效状态渲染，当前静态版本可先按本地状态为准。\u003c/p>","lines":29},{"id":"顶部菜单栏-49","title":"顶部菜单栏","file":"docs/notion-export/ExportBlock-4efbb5e9-6b52-48cb-8bcf-820483b4cd96-Part-1/Y12/顶部菜单栏 3497db3145c380e59ae5f1b101fd8ed7.md","raw":"# 顶部菜单栏\n\n## **顶部菜单栏需求说明**\n\n组件名称：顶部菜单栏\n\n### 组件用途：\n\n顶部菜单栏用于承载全站一级内容导航。当前项目中的所有一级菜单均为示例菜单，仅用于展示前端结构、样式和交互效果。实际业务上线后，一级菜单由后台配置返回，前端根据配置动态渲染。\n\n### 主要展示内容：\n\n- 顶部菜单栏包含：首页、后台返回的一级菜单、一级菜单下拉入口、示例菜单等。一级菜单可配置为两种展示类型：展示媒体内容、展示子菜单。\n\n### 数据规则：\n\n- 一级菜单由后台接口返回。\n- 当前静态页面中的一级菜单均为示例数据。\n- 后台返回的一级菜单需要包含菜单名称、展示类型、内容类型、跳转地址、排序值、开启状态。\n- 只有开启状态的一级菜单才展示。\n- 关闭状态的一级菜单不展示，也不占位。\n- 前端按照后台返回的排序值展示菜单顺序。\n- 如果后台没有返回排序值，则按接口返回顺序展示。\n\n### 一级菜单展示类型规则：\n\n- 如果一级菜单在后台设置为“展示媒体内容”，点击该一级菜单后跳转至内容列表页。\n- 如果一级菜单在后台设置为“展示子菜单”，点击该一级菜单后不直接跳转，而是弹出下拉框展示二级菜单。\n- 二级菜单由后台返回，点击二级菜单后跳转至对应内容列表页。\n- 一级菜单是否展示下拉箭头，由后台展示类型决定。\n- 展示媒体内容的一级菜单不显示下拉箭头。\n- 展示子菜单的一级菜单显示下拉箭头。\n- 内容类型规则：\n- 如果菜单内容类型为帖子，点击后进入帖子列表页。\n- 如果菜单内容类型为视频，点击后进入视频列表页。\n- 内容列表页根据菜单 ID 或菜单名称展示对应内容。\n- 当前静态版本中，帖子类菜单跳转帖子列表页，视频类菜单跳转视频列表页。\n\n### 交互规则：\n\n- 点击首页跳转首页。\n- 点击“展示媒体内容”的一级菜单，跳转至对应内容列表页。\n- 点击“展示子菜单”的一级菜单，展开下拉框显示二级菜单。\n- 点击二级菜单，跳转至对应内容列表页。\n- 点击页面空白区域，下拉框收起。\n- 再次点击已展开的一级菜单，下拉框收起。\n- 鼠标悬浮菜单项时显示高亮状态。\n- 进入对应页面后，根据当前 URL、菜单 ID 或菜单类型显示选中态。\n- 菜单数量过多时，通过左右切换或横向滚动查看完整菜单。\n\n### 异常场景：\n\n- 如果后台返回的一级菜单为空，只展示首页和必要兜底菜单。\n- 如果一级菜单为关闭状态，该菜单不展示。\n- 如果一级菜单名称为空，使用默认名称“未命名菜单”。\n- 如果一级菜单展示类型为空，默认按“展示媒体内容”处理。\n- 如果一级菜单设置为展示媒体内容，但跳转地址为空，点击后不跳转，并提示或保持当前页面。\n- 如果一级菜单设置为展示子菜单，但二级菜单为空，点击后不展示下拉框或展示“暂无子菜单”。\n- 如果二级菜单状态为关闭，则该二级菜单不展示。\n- 如果二级菜单跳转地址为空，点击后不跳转。\n- 如果后台返回多个相同菜单 ID，前端需要去重，避免重复展示。\n- 如果菜单数量过多，菜单栏不能换行，也不能撑破页面宽度。\n- 如果下拉框被广告或内容区域遮挡，需要提高层级，保证完整显示。\n- 如果接口加载失败，菜单栏展示兜底菜单，不能影响页面主体内容加载。\n- 如果当前页面无法匹配菜单项，默认不选中动态菜单，避免多个菜单同时高亮。","html":"\u003ch2>顶部菜单栏\u003c/h2>\n\u003ch3>\u003cstrong>顶部菜单栏需求说明\u003c/strong>\u003c/h3>\n\u003cp>组件名称：顶部菜单栏\u003c/p>\n\u003ch4>组件用途：\u003c/h4>\n\u003cp>顶部菜单栏用于承载全站一级内容导航。当前项目中的所有一级菜单均为示例菜单，仅用于展示前端结构、样式和交互效果。实际业务上线后，一级菜单由后台配置返回，前端根据配置动态渲染。\u003c/p>\n\u003ch4>主要展示内容：\u003c/h4>\n\u003cul>\n\u003cli>顶部菜单栏包含：首页、后台返回的一级菜单、一级菜单下拉入口、示例菜单等。一级菜单可配置为两种展示类型：展示媒体内容、展示子菜单。\u003c/li>\n\u003c/ul>\n\u003ch4>数据规则：\u003c/h4>\n\u003cul>\n\u003cli>一级菜单由后台接口返回。\u003c/li>\n\u003cli>当前静态页面中的一级菜单均为示例数据。\u003c/li>\n\u003cli>后台返回的一级菜单需要包含菜单名称、展示类型、内容类型、跳转地址、排序值、开启状态。\u003c/li>\n\u003cli>只有开启状态的一级菜单才展示。\u003c/li>\n\u003cli>关闭状态的一级菜单不展示，也不占位。\u003c/li>\n\u003cli>前端按照后台返回的排序值展示菜单顺序。\u003c/li>\n\u003cli>如果后台没有返回排序值，则按接口返回顺序展示。\u003c/li>\n\u003c/ul>\n\u003ch4>一级菜单展示类型规则：\u003c/h4>\n\u003cul>\n\u003cli>如果一级菜单在后台设置为“展示媒体内容”，点击该一级菜单后跳转至内容列表页。\u003c/li>\n\u003cli>如果一级菜单在后台设置为“展示子菜单”，点击该一级菜单后不直接跳转，而是弹出下拉框展示二级菜单。\u003c/li>\n\u003cli>二级菜单由后台返回，点击二级菜单后跳转至对应内容列表页。\u003c/li>\n\u003cli>一级菜单是否展示下拉箭头，由后台展示类型决定。\u003c/li>\n\u003cli>展示媒体内容的一级菜单不显示下拉箭头。\u003c/li>\n\u003cli>展示子菜单的一级菜单显示下拉箭头。\u003c/li>\n\u003cli>内容类型规则：\u003c/li>\n\u003cli>如果菜单内容类型为帖子，点击后进入帖子列表页。\u003c/li>\n\u003cli>如果菜单内容类型为视频，点击后进入视频列表页。\u003c/li>\n\u003cli>内容列表页根据菜单 ID 或菜单名称展示对应内容。\u003c/li>\n\u003cli>当前静态版本中，帖子类菜单跳转帖子列表页，视频类菜单跳转视频列表页。\u003c/li>\n\u003c/ul>\n\u003ch4>交互规则：\u003c/h4>\n\u003cul>\n\u003cli>点击首页跳转首页。\u003c/li>\n\u003cli>点击“展示媒体内容”的一级菜单，跳转至对应内容列表页。\u003c/li>\n\u003cli>点击“展示子菜单”的一级菜单，展开下拉框显示二级菜单。\u003c/li>\n\u003cli>点击二级菜单，跳转至对应内容列表页。\u003c/li>\n\u003cli>点击页面空白区域，下拉框收起。\u003c/li>\n\u003cli>再次点击已展开的一级菜单，下拉框收起。\u003c/li>\n\u003cli>鼠标悬浮菜单项时显示高亮状态。\u003c/li>\n\u003cli>进入对应页面后，根据当前 URL、菜单 ID 或菜单类型显示选中态。\u003c/li>\n\u003cli>菜单数量过多时，通过左右切换或横向滚动查看完整菜单。\u003c/li>\n\u003c/ul>\n\u003ch4>异常场景：\u003c/h4>\n\u003cul>\n\u003cli>如果后台返回的一级菜单为空，只展示首页和必要兜底菜单。\u003c/li>\n\u003cli>如果一级菜单为关闭状态，该菜单不展示。\u003c/li>\n\u003cli>如果一级菜单名称为空，使用默认名称“未命名菜单”。\u003c/li>\n\u003cli>如果一级菜单展示类型为空，默认按“展示媒体内容”处理。\u003c/li>\n\u003cli>如果一级菜单设置为展示媒体内容，但跳转地址为空，点击后不跳转，并提示或保持当前页面。\u003c/li>\n\u003cli>如果一级菜单设置为展示子菜单，但二级菜单为空，点击后不展示下拉框或展示“暂无子菜单”。\u003c/li>\n\u003cli>如果二级菜单状态为关闭，则该二级菜单不展示。\u003c/li>\n\u003cli>如果二级菜单跳转地址为空，点击后不跳转。\u003c/li>\n\u003cli>如果后台返回多个相同菜单 ID，前端需要去重，避免重复展示。\u003c/li>\n\u003cli>如果菜单数量过多，菜单栏不能换行，也不能撑破页面宽度。\u003c/li>\n\u003cli>如果下拉框被广告或内容区域遮挡，需要提高层级，保证完整显示。\u003c/li>\n\u003cli>如果接口加载失败，菜单栏展示兜底菜单，不能影响页面主体内容加载。\u003c/li>\n\u003cli>如果当前页面无法匹配菜单项，默认不选中动态菜单，避免多个菜单同时高亮。\u003c/li>\n\u003c/ul>","lines":65},{"id":"项目异常场景设计说明-50","title":"项目异常场景设计说明","file":"docs/notion-export/ExportBlock-4efbb5e9-6b52-48cb-8bcf-820483b4cd96-Part-1/Y12/项目异常场景设计说明 3497db3145c3801586dada4beb6a7e3e.md","raw":"# 项目异常场景设计说明\n\n## 说明用于统一异常场景下的页面表现，避免出现：\n\n- 空白页面\n- 模块塌陷\n- 破图\n- 无反馈点击\n- 状态不一致\n\nUI 设计时，需要为每个核心模块预留异常态、空态、加载失败态和禁用态。\n\n---\n\n# **全局设计原则**\n\n## **展示原则**\n\n- 异常状态下页面结构不能塌陷。\n- 优先保证页面可用，其次再提示异常。\n- 单个模块异常不能影响其他模块正常展示。\n- 无数据时优先展示空态，不要直接留白。\n- 加载失败时优先展示失败提示，不要直接消失。\n- 不可点击状态必须有明确视觉区分。\n- 所有错误提示文案风格统一，避免同一页面出现多种提示样式。\n\n## **视觉原则**\n\n- 空态：弱化色图标 + 简短说明文案。\n- 失败态：浅红或浅灰提示块，不要使用过重警告风格。\n- 禁用态：降低透明度、去掉 hover、禁用点击反馈。\n- 下架态：卡片灰化 + 遮罩 + “已下架”标识。\n- 缺省图：统一默认占位图，不出现浏览器破图图标。\n\n## **文案原则**\n\n建议统一使用以下几类文案：\n\n- 暂无内容\n- 加载失败，请稍后重试\n- 该内容已下架\n- 当前暂无数据\n- 当前功能不可用\n- 请先登录\n- 链接无效\n\n---\n\n# **页面级异常场景**\n\n## **首页**\n\n### **异常场景**\n\n- 首页弹窗广告为空\n- 顶部广告栏为空\n- 固定模块无内容\n- 一级菜单无内容\n- 一级菜单配置异常\n- 内容卡片封面缺失\n\n### **UI 要求**\n\n- [ ]  首页弹窗广告为空时，不展示弹窗。\n- [ ]  顶部广告栏为空时，整块隐藏，不留空白。\n- [ ]  固定模块无内容时，保留模块标题，内容区展示空态，隐藏该模块。\n- [ ]  一级菜单无内容时，隐藏该菜单模块。\n- [ ]  菜单配置异常时，不展示该菜单模块。\n- [ ]  卡片封面缺失时，使用统一默认封面图。\n\n---\n\n## **搜索结果页**\n\n### **异常场景**\n\n- 搜索关键词为空\n- 搜索结果为空\n- 分类切换后无结果\n- 排序失败\n- 分页失败\n\n### **UI 要求**\n\n- [ ]  搜索关键词为空时，展示默认提示态。\n- [ ]  搜索结果为空时，展示空结果页，保留顶部筛选区。\n- [ ]  某个分类无结果时，只替换列表区域为空态，不影响筛选区。\n- [ ]  排序失败时，保留当前列表，顶部给轻提示。\n- [ ]  分页失败时，保留当前页内容，不跳空白页。\n\n---\n\n## **帖子列表页 / 视频列表页 / 全部分类页**\n\n### **异常场景**\n\n- 列表为空\n- 广告为空\n- 菜单标题缺失\n- 排序参数异常\n- 当前页码异常\n- 标签筛选为空\n- 标签类别过多\n\n### **UI 要求**\n\n- [ ]  列表为空时，展示统一空态。\n- [ ]  广告为空时，不展示广告卡片。\n- [ ]  菜单标题缺失时，使用默认标题。\n- [ ]  排序参数异常时，默认高亮“最新上架”。\n- [ ]  页码异常时，默认展示第一页。\n- [ ]  标签为空时，隐藏标签区或仅保留“全部”。\n- [ ]  标签类别过多时，使用单行横向滚动，不换行。\n\n---\n\n## **动态详情页**\n\n### **异常场景**\n\n- 顶部广告为空\n- 正文为空\n- 图片为空\n- 视频为空\n- 上一篇 / 下一篇为空\n- 评论为空\n- 猜你喜欢为空\n- 内容下架\n\n### **UI 要求**\n\n- [ ]  顶部广告为空时，隐藏广告区。\n- [ ]  正文为空时，展示“暂无正文内容”。\n- [ ]  图片为空时，隐藏图片区域。\n- [ ]  视频为空时，隐藏视频区域。\n- [ ]  上一篇 / 下一篇为空时，对应按钮置灰或隐藏。\n- [ ]  评论为空时，展示“暂无评论”。\n- [ ]  猜你喜欢为空时，隐藏该模块或展示空态。\n- [ ]  内容下架时，详情页不展示正常正文，统一展示下架提示态。\n\n---\n\n## **视频详情页**\n\n### **异常场景**\n\n- 前置广告为空\n- 视频地址失效\n- 视频加载失败\n- 进度预览截图失败\n- 猜你喜欢为空\n- 推荐视频为空\n- 评论为空\n- 内容下架\n\n### **UI 要求**\n\n- [ ]  前置广告为空时，直接展示播放器。\n- [ ]  视频加载失败时，播放器区域展示失败态，不黑屏空白。\n- [ ]  进度截图失败时，仅展示时间提示，不展示预览图。\n- [ ]  猜你喜欢为空时，隐藏模块或展示空态。\n- [ ]  推荐视频为空时，隐藏模块或展示空态。\n- [ ]  评论为空时，展示“暂无评论”。\n- [ ]  内容下架时，播放器不可播放，展示下架提示。\n\n---\n\n## **观看历史页 / 我的点赞页**\n\n### **异常场景**\n\n- 用户未登录\n- 当前分类无记录\n- 记录为空\n- 分页为空\n- 历史或点赞数据重复\n- 内容已下架\n\n### **UI 要求**\n\n- [ ]  未登录时，优先展示登录引导态。\n- [ ]  某个分类无记录时，展示该分类空态。\n- [ ]  没有任何记录时，展示整页空态。\n- [ ]  分页为空时，隐藏分页器。\n- [ ]  下架内容如果仍保留记录，卡片展示“已下架”态。\n- [ ]  重复内容只保留一条，不做重复展示。\n\n---\n\n# **组件级异常场景**\n\n## **顶部栏**\n\n### **异常场景**\n\n- 品牌图缺失\n- 品牌图加载失败\n- APP 下载配置关闭\n- APP 下载链接为空\n- 登录态异常\n\n### **UI 要求**\n\n- [ ]  品牌图缺失或加载失败时，展示默认品牌图。\n- [ ]  APP 下载关闭时，按钮隐藏且其他元素自动补位。\n- [ ]  APP 下载链接为空时，建议隐藏按钮。\n- [ ]  登录态异常时，默认展示“登录”。\n\n---\n\n## **顶部菜单栏**\n\n### **异常场景**\n\n- 菜单为空\n- 菜单名称为空\n- 菜单过多\n- 子菜单为空\n- 跳转地址为空\n\n### **UI 要求**\n\n- [ ]  菜单为空时，仅保留首页和必要兜底菜单。\n- [ ]  名称为空时，显示“未命名菜单”。\n- [ ]  菜单过多时，单行横向滚动，不换行。\n- [ ]  子菜单为空时，不展开或展示“暂无子菜单”。\n- [ ]  链接为空时，菜单显示但不可跳转。\n\n---\n\n## **搜索栏**\n\n### **异常场景**\n\n- 输入为空\n- 输入超长\n- 搜索跳转失败\n\n### **UI 要求**\n\n- 输入为空时，不跳转，不报错。\n- 输入超长时，输入框内部滚动，不撑破布局。\n- 跳转失败时，保留当前页面状态。\n\n---\n\n## **搜索下拉框**\n\n### **异常场景**\n\n- 历史为空\n- 热搜为空\n- 删除失败\n- 清空失败\n\n### **UI 要求**\n\n- [ ]  历史为空时，历史标题和清空按钮整体隐藏。\n- [ ]  热搜为空时，隐藏热搜区。\n- [ ]  删除失败时，维持当前数据。\n- [ ]  清空失败时，维持当前数据。\n\n---\n\n## **动态内容卡片**\n\n### **异常场景**\n\n- 封面为空\n- 标题为空\n- 标签为空\n- 内容下架\n- 跳转链接为空\n\n### **UI 要求**\n\n- [ ]  封面为空时，显示默认封面。\n- [ ]  标题为空时，显示“未命名动态”。\n- [ ]  标签为空时，隐藏标签区。\n- [ ]  内容下架时，卡片灰化并增加“已下架”标识。\n- [ ]  链接为空时，卡片不可点击。\n\n---\n\n## **视频内容卡片**\n\n### **异常场景**\n\n- 封面为空\n- 标题为空\n- 播放量为空\n- 点赞量为空\n- 标签为空\n- 内容下架\n- 跳转链接为空\n\n### **UI 要求**\n\n- [ ]  封面为空时，显示默认封面。\n- [ ]  标题为空时，显示“未命名视频”。\n- [ ]  播放量或点赞量为空时，显示 0。\n- [ ]  标签为空时，隐藏标签区。\n- [ ]  内容下架时，卡片灰化并增加“已下架”标识。\n- [ ]  链接为空时，卡片不可点击。\n\n---\n\n## **广告内容卡片**\n\n### **异常场景**\n\n- 广告封面为空\n- 广告名称为空\n- 广告链接为空\n- 广告下架\n\n### **UI 要求**\n\n- [ ]  封面为空时，展示默认广告图。\n- [ ]  名称为空时，展示“广告位”。\n- [ ]  链接为空时，可展示但不可点击。\n- [ ]  广告下架时，不展示，也不保留占位。\n\n---\n\n## **评论功能**\n\n### **异常场景**\n\n- 未登录\n- 输入为空\n- 输入超长\n- 提交失败\n- 无评论\n\n### **UI 要求**\n\n- [ ]  未登录时，隐藏输入框，显示登录按钮。\n- [ ]  输入为空时，评论按钮置灰。\n- [ ]  超长时，不允许继续输入或自动截断。\n- [ ]  提交失败时，保留输入内容并提示失败。\n- [ ]  无评论时，展示“暂无评论”。\n\n---\n\n## **点赞功能**\n\n### **异常场景**\n\n- 未登录\n- 接口失败\n- 内容下架\n\n### **UI 要求**\n\n- [ ]  未登录点击点赞时，提示登录。\n- [ ]  接口失败时，恢复操作前状态。\n- [ ]  内容下架时，点赞按钮不可点击。\n\n---\n\n## **分享功能**\n\n### **异常场景**\n\n- 分享链接为空\n- 复制失败\n- 内容下架\n\n### **UI 要求**\n\n- [ ]  分享链接为空时，按钮可隐藏或点击无效。\n- [ ]  复制失败时，提示“复制失败”。\n- [ ]  内容下架时，分享功能可隐藏或禁用。\n\n---\n\n## **分页器**\n\n### **异常场景**\n\n- 当前页为空\n- 当前页超出范围\n- 总数为 0\n\n### **UI 要求**\n\n- [ ]  当前页为空时，默认第 1 页。\n- [ ]  当前页超出范围时，回退到最后一页。\n- [ ]  总数为 0 时，隐藏分页器。","html":"\u003ch2>项目异常场景设计说明\u003c/h2>\n\u003ch3>说明用于统一异常场景下的页面表现，避免出现：\u003c/h3>\n\u003cul>\n\u003cli>空白页面\u003c/li>\n\u003cli>模块塌陷\u003c/li>\n\u003cli>破图\u003c/li>\n\u003cli>无反馈点击\u003c/li>\n\u003cli>状态不一致\u003c/li>\n\u003c/ul>\n\u003cp>UI 设计时，需要为每个核心模块预留异常态、空态、加载失败态和禁用态。\u003c/p>\n\u003chr>\n\u003ch2>\u003cstrong>全局设计原则\u003c/strong>\u003c/h2>\n\u003ch3>\u003cstrong>展示原则\u003c/strong>\u003c/h3>\n\u003cul>\n\u003cli>异常状态下页面结构不能塌陷。\u003c/li>\n\u003cli>优先保证页面可用，其次再提示异常。\u003c/li>\n\u003cli>单个模块异常不能影响其他模块正常展示。\u003c/li>\n\u003cli>无数据时优先展示空态，不要直接留白。\u003c/li>\n\u003cli>加载失败时优先展示失败提示，不要直接消失。\u003c/li>\n\u003cli>不可点击状态必须有明确视觉区分。\u003c/li>\n\u003cli>所有错误提示文案风格统一，避免同一页面出现多种提示样式。\u003c/li>\n\u003c/ul>\n\u003ch3>\u003cstrong>视觉原则\u003c/strong>\u003c/h3>\n\u003cul>\n\u003cli>空态：弱化色图标 + 简短说明文案。\u003c/li>\n\u003cli>失败态：浅红或浅灰提示块，不要使用过重警告风格。\u003c/li>\n\u003cli>禁用态：降低透明度、去掉 hover、禁用点击反馈。\u003c/li>\n\u003cli>下架态：卡片灰化 + 遮罩 + “已下架”标识。\u003c/li>\n\u003cli>缺省图：统一默认占位图，不出现浏览器破图图标。\u003c/li>\n\u003c/ul>\n\u003ch3>\u003cstrong>文案原则\u003c/strong>\u003c/h3>\n\u003cp>建议统一使用以下几类文案：\u003c/p>\n\u003cul>\n\u003cli>暂无内容\u003c/li>\n\u003cli>加载失败，请稍后重试\u003c/li>\n\u003cli>该内容已下架\u003c/li>\n\u003cli>当前暂无数据\u003c/li>\n\u003cli>当前功能不可用\u003c/li>\n\u003cli>请先登录\u003c/li>\n\u003cli>链接无效\u003c/li>\n\u003c/ul>\n\u003chr>\n\u003ch2>\u003cstrong>页面级异常场景\u003c/strong>\u003c/h2>\n\u003ch3>\u003cstrong>首页\u003c/strong>\u003c/h3>\n\u003ch4>\u003cstrong>异常场景\u003c/strong>\u003c/h4>\n\u003cul>\n\u003cli>首页弹窗广告为空\u003c/li>\n\u003cli>顶部广告栏为空\u003c/li>\n\u003cli>固定模块无内容\u003c/li>\n\u003cli>一级菜单无内容\u003c/li>\n\u003cli>一级菜单配置异常\u003c/li>\n\u003cli>内容卡片封面缺失\u003c/li>\n\u003c/ul>\n\u003ch4>\u003cstrong>UI 要求\u003c/strong>\u003c/h4>\n\u003cul>\n\u003cli>[ ]  首页弹窗广告为空时，不展示弹窗。\u003c/li>\n\u003cli>[ ]  顶部广告栏为空时，整块隐藏，不留空白。\u003c/li>\n\u003cli>[ ]  固定模块无内容时，保留模块标题，内容区展示空态，隐藏该模块。\u003c/li>\n\u003cli>[ ]  一级菜单无内容时，隐藏该菜单模块。\u003c/li>\n\u003cli>[ ]  菜单配置异常时，不展示该菜单模块。\u003c/li>\n\u003cli>[ ]  卡片封面缺失时，使用统一默认封面图。\u003c/li>\n\u003c/ul>\n\u003chr>\n\u003ch3>\u003cstrong>搜索结果页\u003c/strong>\u003c/h3>\n\u003ch4>\u003cstrong>异常场景\u003c/strong>\u003c/h4>\n\u003cul>\n\u003cli>搜索关键词为空\u003c/li>\n\u003cli>搜索结果为空\u003c/li>\n\u003cli>分类切换后无结果\u003c/li>\n\u003cli>排序失败\u003c/li>\n\u003cli>分页失败\u003c/li>\n\u003c/ul>\n\u003ch4>\u003cstrong>UI 要求\u003c/strong>\u003c/h4>\n\u003cul>\n\u003cli>[ ]  搜索关键词为空时，展示默认提示态。\u003c/li>\n\u003cli>[ ]  搜索结果为空时，展示空结果页，保留顶部筛选区。\u003c/li>\n\u003cli>[ ]  某个分类无结果时，只替换列表区域为空态，不影响筛选区。\u003c/li>\n\u003cli>[ ]  排序失败时，保留当前列表，顶部给轻提示。\u003c/li>\n\u003cli>[ ]  分页失败时，保留当前页内容，不跳空白页。\u003c/li>\n\u003c/ul>\n\u003chr>\n\u003ch3>\u003cstrong>帖子列表页 / 视频列表页 / 全部分类页\u003c/strong>\u003c/h3>\n\u003ch4>\u003cstrong>异常场景\u003c/strong>\u003c/h4>\n\u003cul>\n\u003cli>列表为空\u003c/li>\n\u003cli>广告为空\u003c/li>\n\u003cli>菜单标题缺失\u003c/li>\n\u003cli>排序参数异常\u003c/li>\n\u003cli>当前页码异常\u003c/li>\n\u003cli>标签筛选为空\u003c/li>\n\u003cli>标签类别过多\u003c/li>\n\u003c/ul>\n\u003ch4>\u003cstrong>UI 要求\u003c/strong>\u003c/h4>\n\u003cul>\n\u003cli>[ ]  列表为空时，展示统一空态。\u003c/li>\n\u003cli>[ ]  广告为空时，不展示广告卡片。\u003c/li>\n\u003cli>[ ]  菜单标题缺失时，使用默认标题。\u003c/li>\n\u003cli>[ ]  排序参数异常时，默认高亮“最新上架”。\u003c/li>\n\u003cli>[ ]  页码异常时，默认展示第一页。\u003c/li>\n\u003cli>[ ]  标签为空时，隐藏标签区或仅保留“全部”。\u003c/li>\n\u003cli>[ ]  标签类别过多时，使用单行横向滚动，不换行。\u003c/li>\n\u003c/ul>\n\u003chr>\n\u003ch3>\u003cstrong>动态详情页\u003c/strong>\u003c/h3>\n\u003ch4>\u003cstrong>异常场景\u003c/strong>\u003c/h4>\n\u003cul>\n\u003cli>顶部广告为空\u003c/li>\n\u003cli>正文为空\u003c/li>\n\u003cli>图片为空\u003c/li>\n\u003cli>视频为空\u003c/li>\n\u003cli>上一篇 / 下一篇为空\u003c/li>\n\u003cli>评论为空\u003c/li>\n\u003cli>猜你喜欢为空\u003c/li>\n\u003cli>内容下架\u003c/li>\n\u003c/ul>\n\u003ch4>\u003cstrong>UI 要求\u003c/strong>\u003c/h4>\n\u003cul>\n\u003cli>[ ]  顶部广告为空时，隐藏广告区。\u003c/li>\n\u003cli>[ ]  正文为空时，展示“暂无正文内容”。\u003c/li>\n\u003cli>[ ]  图片为空时，隐藏图片区域。\u003c/li>\n\u003cli>[ ]  视频为空时，隐藏视频区域。\u003c/li>\n\u003cli>[ ]  上一篇 / 下一篇为空时，对应按钮置灰或隐藏。\u003c/li>\n\u003cli>[ ]  评论为空时，展示“暂无评论”。\u003c/li>\n\u003cli>[ ]  猜你喜欢为空时，隐藏该模块或展示空态。\u003c/li>\n\u003cli>[ ]  内容下架时，详情页不展示正常正文，统一展示下架提示态。\u003c/li>\n\u003c/ul>\n\u003chr>\n\u003ch3>\u003cstrong>视频详情页\u003c/strong>\u003c/h3>\n\u003ch4>\u003cstrong>异常场景\u003c/strong>\u003c/h4>\n\u003cul>\n\u003cli>前置广告为空\u003c/li>\n\u003cli>视频地址失效\u003c/li>\n\u003cli>视频加载失败\u003c/li>\n\u003cli>进度预览截图失败\u003c/li>\n\u003cli>猜你喜欢为空\u003c/li>\n\u003cli>推荐视频为空\u003c/li>\n\u003cli>评论为空\u003c/li>\n\u003cli>内容下架\u003c/li>\n\u003c/ul>\n\u003ch4>\u003cstrong>UI 要求\u003c/strong>\u003c/h4>\n\u003cul>\n\u003cli>[ ]  前置广告为空时，直接展示播放器。\u003c/li>\n\u003cli>[ ]  视频加载失败时，播放器区域展示失败态，不黑屏空白。\u003c/li>\n\u003cli>[ ]  进度截图失败时，仅展示时间提示，不展示预览图。\u003c/li>\n\u003cli>[ ]  猜你喜欢为空时，隐藏模块或展示空态。\u003c/li>\n\u003cli>[ ]  推荐视频为空时，隐藏模块或展示空态。\u003c/li>\n\u003cli>[ ]  评论为空时，展示“暂无评论”。\u003c/li>\n\u003cli>[ ]  内容下架时，播放器不可播放，展示下架提示。\u003c/li>\n\u003c/ul>\n\u003chr>\n\u003ch3>\u003cstrong>观看历史页 / 我的点赞页\u003c/strong>\u003c/h3>\n\u003ch4>\u003cstrong>异常场景\u003c/strong>\u003c/h4>\n\u003cul>\n\u003cli>用户未登录\u003c/li>\n\u003cli>当前分类无记录\u003c/li>\n\u003cli>记录为空\u003c/li>\n\u003cli>分页为空\u003c/li>\n\u003cli>历史或点赞数据重复\u003c/li>\n\u003cli>内容已下架\u003c/li>\n\u003c/ul>\n\u003ch4>\u003cstrong>UI 要求\u003c/strong>\u003c/h4>\n\u003cul>\n\u003cli>[ ]  未登录时，优先展示登录引导态。\u003c/li>\n\u003cli>[ ]  某个分类无记录时，展示该分类空态。\u003c/li>\n\u003cli>[ ]  没有任何记录时，展示整页空态。\u003c/li>\n\u003cli>[ ]  分页为空时，隐藏分页器。\u003c/li>\n\u003cli>[ ]  下架内容如果仍保留记录，卡片展示“已下架”态。\u003c/li>\n\u003cli>[ ]  重复内容只保留一条，不做重复展示。\u003c/li>\n\u003c/ul>\n\u003chr>\n\u003ch2>\u003cstrong>组件级异常场景\u003c/strong>\u003c/h2>\n\u003ch3>\u003cstrong>顶部栏\u003c/strong>\u003c/h3>\n\u003ch4>\u003cstrong>异常场景\u003c/strong>\u003c/h4>\n\u003cul>\n\u003cli>品牌图缺失\u003c/li>\n\u003cli>品牌图加载失败\u003c/li>\n\u003cli>APP 下载配置关闭\u003c/li>\n\u003cli>APP 下载链接为空\u003c/li>\n\u003cli>登录态异常\u003c/li>\n\u003c/ul>\n\u003ch4>\u003cstrong>UI 要求\u003c/strong>\u003c/h4>\n\u003cul>\n\u003cli>[ ]  品牌图缺失或加载失败时，展示默认品牌图。\u003c/li>\n\u003cli>[ ]  APP 下载关闭时，按钮隐藏且其他元素自动补位。\u003c/li>\n\u003cli>[ ]  APP 下载链接为空时，建议隐藏按钮。\u003c/li>\n\u003cli>[ ]  登录态异常时，默认展示“登录”。\u003c/li>\n\u003c/ul>\n\u003chr>\n\u003ch3>\u003cstrong>顶部菜单栏\u003c/strong>\u003c/h3>\n\u003ch4>\u003cstrong>异常场景\u003c/strong>\u003c/h4>\n\u003cul>\n\u003cli>菜单为空\u003c/li>\n\u003cli>菜单名称为空\u003c/li>\n\u003cli>菜单过多\u003c/li>\n\u003cli>子菜单为空\u003c/li>\n\u003cli>跳转地址为空\u003c/li>\n\u003c/ul>\n\u003ch4>\u003cstrong>UI 要求\u003c/strong>\u003c/h4>\n\u003cul>\n\u003cli>[ ]  菜单为空时，仅保留首页和必要兜底菜单。\u003c/li>\n\u003cli>[ ]  名称为空时，显示“未命名菜单”。\u003c/li>\n\u003cli>[ ]  菜单过多时，单行横向滚动，不换行。\u003c/li>\n\u003cli>[ ]  子菜单为空时，不展开或展示“暂无子菜单”。\u003c/li>\n\u003cli>[ ]  链接为空时，菜单显示但不可跳转。\u003c/li>\n\u003c/ul>\n\u003chr>\n\u003ch3>\u003cstrong>搜索栏\u003c/strong>\u003c/h3>\n\u003ch4>\u003cstrong>异常场景\u003c/strong>\u003c/h4>\n\u003cul>\n\u003cli>输入为空\u003c/li>\n\u003cli>输入超长\u003c/li>\n\u003cli>搜索跳转失败\u003c/li>\n\u003c/ul>\n\u003ch4>\u003cstrong>UI 要求\u003c/strong>\u003c/h4>\n\u003cul>\n\u003cli>输入为空时，不跳转，不报错。\u003c/li>\n\u003cli>输入超长时，输入框内部滚动，不撑破布局。\u003c/li>\n\u003cli>跳转失败时，保留当前页面状态。\u003c/li>\n\u003c/ul>\n\u003chr>\n\u003ch3>\u003cstrong>搜索下拉框\u003c/strong>\u003c/h3>\n\u003ch4>\u003cstrong>异常场景\u003c/strong>\u003c/h4>\n\u003cul>\n\u003cli>历史为空\u003c/li>\n\u003cli>热搜为空\u003c/li>\n\u003cli>删除失败\u003c/li>\n\u003cli>清空失败\u003c/li>\n\u003c/ul>\n\u003ch4>\u003cstrong>UI 要求\u003c/strong>\u003c/h4>\n\u003cul>\n\u003cli>[ ]  历史为空时，历史标题和清空按钮整体隐藏。\u003c/li>\n\u003cli>[ ]  热搜为空时，隐藏热搜区。\u003c/li>\n\u003cli>[ ]  删除失败时，维持当前数据。\u003c/li>\n\u003cli>[ ]  清空失败时，维持当前数据。\u003c/li>\n\u003c/ul>\n\u003chr>\n\u003ch3>\u003cstrong>动态内容卡片\u003c/strong>\u003c/h3>\n\u003ch4>\u003cstrong>异常场景\u003c/strong>\u003c/h4>\n\u003cul>\n\u003cli>封面为空\u003c/li>\n\u003cli>标题为空\u003c/li>\n\u003cli>标签为空\u003c/li>\n\u003cli>内容下架\u003c/li>\n\u003cli>跳转链接为空\u003c/li>\n\u003c/ul>\n\u003ch4>\u003cstrong>UI 要求\u003c/strong>\u003c/h4>\n\u003cul>\n\u003cli>[ ]  封面为空时，显示默认封面。\u003c/li>\n\u003cli>[ ]  标题为空时，显示“未命名动态”。\u003c/li>\n\u003cli>[ ]  标签为空时，隐藏标签区。\u003c/li>\n\u003cli>[ ]  内容下架时，卡片灰化并增加“已下架”标识。\u003c/li>\n\u003cli>[ ]  链接为空时，卡片不可点击。\u003c/li>\n\u003c/ul>\n\u003chr>\n\u003ch3>\u003cstrong>视频内容卡片\u003c/strong>\u003c/h3>\n\u003ch4>\u003cstrong>异常场景\u003c/strong>\u003c/h4>\n\u003cul>\n\u003cli>封面为空\u003c/li>\n\u003cli>标题为空\u003c/li>\n\u003cli>播放量为空\u003c/li>\n\u003cli>点赞量为空\u003c/li>\n\u003cli>标签为空\u003c/li>\n\u003cli>内容下架\u003c/li>\n\u003cli>跳转链接为空\u003c/li>\n\u003c/ul>\n\u003ch4>\u003cstrong>UI 要求\u003c/strong>\u003c/h4>\n\u003cul>\n\u003cli>[ ]  封面为空时，显示默认封面。\u003c/li>\n\u003cli>[ ]  标题为空时，显示“未命名视频”。\u003c/li>\n\u003cli>[ ]  播放量或点赞量为空时，显示 0。\u003c/li>\n\u003cli>[ ]  标签为空时，隐藏标签区。\u003c/li>\n\u003cli>[ ]  内容下架时，卡片灰化并增加“已下架”标识。\u003c/li>\n\u003cli>[ ]  链接为空时，卡片不可点击。\u003c/li>\n\u003c/ul>\n\u003chr>\n\u003ch3>\u003cstrong>广告内容卡片\u003c/strong>\u003c/h3>\n\u003ch4>\u003cstrong>异常场景\u003c/strong>\u003c/h4>\n\u003cul>\n\u003cli>广告封面为空\u003c/li>\n\u003cli>广告名称为空\u003c/li>\n\u003cli>广告链接为空\u003c/li>\n\u003cli>广告下架\u003c/li>\n\u003c/ul>\n\u003ch4>\u003cstrong>UI 要求\u003c/strong>\u003c/h4>\n\u003cul>\n\u003cli>[ ]  封面为空时，展示默认广告图。\u003c/li>\n\u003cli>[ ]  名称为空时，展示“广告位”。\u003c/li>\n\u003cli>[ ]  链接为空时，可展示但不可点击。\u003c/li>\n\u003cli>[ ]  广告下架时，不展示，也不保留占位。\u003c/li>\n\u003c/ul>\n\u003chr>\n\u003ch3>\u003cstrong>评论功能\u003c/strong>\u003c/h3>\n\u003ch4>\u003cstrong>异常场景\u003c/strong>\u003c/h4>\n\u003cul>\n\u003cli>未登录\u003c/li>\n\u003cli>输入为空\u003c/li>\n\u003cli>输入超长\u003c/li>\n\u003cli>提交失败\u003c/li>\n\u003cli>无评论\u003c/li>\n\u003c/ul>\n\u003ch4>\u003cstrong>UI 要求\u003c/strong>\u003c/h4>\n\u003cul>\n\u003cli>[ ]  未登录时，隐藏输入框，显示登录按钮。\u003c/li>\n\u003cli>[ ]  输入为空时，评论按钮置灰。\u003c/li>\n\u003cli>[ ]  超长时，不允许继续输入或自动截断。\u003c/li>\n\u003cli>[ ]  提交失败时，保留输入内容并提示失败。\u003c/li>\n\u003cli>[ ]  无评论时，展示“暂无评论”。\u003c/li>\n\u003c/ul>\n\u003chr>\n\u003ch3>\u003cstrong>点赞功能\u003c/strong>\u003c/h3>\n\u003ch4>\u003cstrong>异常场景\u003c/strong>\u003c/h4>\n\u003cul>\n\u003cli>未登录\u003c/li>\n\u003cli>接口失败\u003c/li>\n\u003cli>内容下架\u003c/li>\n\u003c/ul>\n\u003ch4>\u003cstrong>UI 要求\u003c/strong>\u003c/h4>\n\u003cul>\n\u003cli>[ ]  未登录点击点赞时，提示登录。\u003c/li>\n\u003cli>[ ]  接口失败时，恢复操作前状态。\u003c/li>\n\u003cli>[ ]  内容下架时，点赞按钮不可点击。\u003c/li>\n\u003c/ul>\n\u003chr>\n\u003ch3>\u003cstrong>分享功能\u003c/strong>\u003c/h3>\n\u003ch4>\u003cstrong>异常场景\u003c/strong>\u003c/h4>\n\u003cul>\n\u003cli>分享链接为空\u003c/li>\n\u003cli>复制失败\u003c/li>\n\u003cli>内容下架\u003c/li>\n\u003c/ul>\n\u003ch4>\u003cstrong>UI 要求\u003c/strong>\u003c/h4>\n\u003cul>\n\u003cli>[ ]  分享链接为空时，按钮可隐藏或点击无效。\u003c/li>\n\u003cli>[ ]  复制失败时，提示“复制失败”。\u003c/li>\n\u003cli>[ ]  内容下架时，分享功能可隐藏或禁用。\u003c/li>\n\u003c/ul>\n\u003chr>\n\u003ch3>\u003cstrong>分页器\u003c/strong>\u003c/h3>\n\u003ch4>\u003cstrong>异常场景\u003c/strong>\u003c/h4>\n\u003cul>\n\u003cli>当前页为空\u003c/li>\n\u003cli>当前页超出范围\u003c/li>\n\u003cli>总数为 0\u003c/li>\n\u003c/ul>\n\u003ch4>\u003cstrong>UI 要求\u003c/strong>\u003c/h4>\n\u003cul>\n\u003cli>[ ]  当前页为空时，默认第 1 页。\u003c/li>\n\u003cli>[ ]  当前页超出范围时，回退到最后一页。\u003c/li>\n\u003cli>[ ]  总数为 0 时，隐藏分页器。\u003c/li>\n\u003c/ul>","lines":390},{"id":"首页弹窗广告-51","title":"首页弹窗广告","file":"docs/notion-export/ExportBlock-4efbb5e9-6b52-48cb-8bcf-820483b4cd96-Part-1/Y12/首页弹窗广告 3497db3145c38008aa6fd06bc8b12e3d.md","raw":"# 首页弹窗广告\n\n## 组件用途：\n\n首页弹窗广告用于在用户进入首页时展示重点广告、运营推广或合作资源。该组件用于提升首页首屏广告曝光，广告物料由后台配置，前端根据后台返回的数据动态展示。\n\n## 展示位置：\n\n- 用户进入首页后，页面中央弹出广告弹窗。\n- 弹窗层级高于首页内容、顶部栏、菜单栏和广告栏。\n- 弹窗内展示广告列表。\n- 弹窗支持关闭，关闭后用户可继续浏览首页内容。\n\n## 广告物料来源：\n\n- 广告物料由后台配置返回。\n- 后台可配置广告名称、广告图标、广告图片、跳转链接、排序值、开启状态。\n- 只有开启状态的广告才展示。\n- 关闭状态的广告不展示，也不占位。\n- 前端按照后台返回的排序值展示广告顺序。\n- 如果后台未返回排序值，则按接口返回顺序展示。\n\n## 主要展示内容：\n\n- 弹窗标题展示“推荐广告”。\n- 每条广告展示广告图标和广告名称。\n- 广告图标位于卡片上方。\n- 广告名称位于广告图标下方。\n- 广告卡片采用 5 列网格展示。\n- 广告数量较多时，弹窗内部支持上下滚动展示。\n\n## 交互规则：\n\n- 用户进入首页时自动展示弹窗广告。\n- 点击右上角关闭按钮关闭弹窗。\n- 点击弹窗遮罩区域关闭弹窗。\n- 点击广告卡片跳转至后台配置的广告链接。\n- 广告链接可根据后台配置决定当前页面打开或新窗口打开。\n- 鼠标悬浮广告卡片时展示高亮反馈。\n- 弹窗关闭后，当前页面不再遮挡用户操作。\n\n## 状态规则：\n\n- 广告弹窗默认在首页打开时展示。\n- 广告卡片按照后台配置顺序展示。\n- 广告数量超过一屏时，弹窗内部支持上下滑动。\n- 弹窗最大高度不能超过当前浏览器视口高度。\n- 广告卡片尺寸、间距、圆角、阴影和图标大小保持统一。\n\n## 异常场景：\n\n- 如果后台没有返回广告数据，不展示首页弹窗广告。\n- 如果所有广告均为关闭状态，不展示首页弹窗广告。\n- 如果某条广告名称为空，展示默认名称“广告位”。\n- 如果某条广告图标为空，展示默认广告图标或默认字母标识。\n- 如果广告图标或图片加载失败，展示默认占位样式，不能出现破图。\n- 如果广告链接为空，点击广告卡片不跳转。\n- 如果广告链接格式异常，点击广告卡片不跳转，并保持当前页面。\n- 如果广告数量过多，弹窗内部滚动展示，不能撑破页面高度。\n- 如果广告接口加载失败，不展示弹窗广告，首页主体内容正常展示。\n- 如果广告接口加载较慢，首页主体内容应正常渲染，不应被广告接口阻塞。\n- 如果用户快速重复点击关闭按钮，只执行一次关闭操作。","html":"\u003ch2>首页弹窗广告\u003c/h2>\n\u003ch3>组件用途：\u003c/h3>\n\u003cp>首页弹窗广告用于在用户进入首页时展示重点广告、运营推广或合作资源。该组件用于提升首页首屏广告曝光，广告物料由后台配置，前端根据后台返回的数据动态展示。\u003c/p>\n\u003ch3>展示位置：\u003c/h3>\n\u003cul>\n\u003cli>用户进入首页后，页面中央弹出广告弹窗。\u003c/li>\n\u003cli>弹窗层级高于首页内容、顶部栏、菜单栏和广告栏。\u003c/li>\n\u003cli>弹窗内展示广告列表。\u003c/li>\n\u003cli>弹窗支持关闭，关闭后用户可继续浏览首页内容。\u003c/li>\n\u003c/ul>\n\u003ch3>广告物料来源：\u003c/h3>\n\u003cul>\n\u003cli>广告物料由后台配置返回。\u003c/li>\n\u003cli>后台可配置广告名称、广告图标、广告图片、跳转链接、排序值、开启状态。\u003c/li>\n\u003cli>只有开启状态的广告才展示。\u003c/li>\n\u003cli>关闭状态的广告不展示，也不占位。\u003c/li>\n\u003cli>前端按照后台返回的排序值展示广告顺序。\u003c/li>\n\u003cli>如果后台未返回排序值，则按接口返回顺序展示。\u003c/li>\n\u003c/ul>\n\u003ch3>主要展示内容：\u003c/h3>\n\u003cul>\n\u003cli>弹窗标题展示“推荐广告”。\u003c/li>\n\u003cli>每条广告展示广告图标和广告名称。\u003c/li>\n\u003cli>广告图标位于卡片上方。\u003c/li>\n\u003cli>广告名称位于广告图标下方。\u003c/li>\n\u003cli>广告卡片采用 5 列网格展示。\u003c/li>\n\u003cli>广告数量较多时，弹窗内部支持上下滚动展示。\u003c/li>\n\u003c/ul>\n\u003ch3>交互规则：\u003c/h3>\n\u003cul>\n\u003cli>用户进入首页时自动展示弹窗广告。\u003c/li>\n\u003cli>点击右上角关闭按钮关闭弹窗。\u003c/li>\n\u003cli>点击弹窗遮罩区域关闭弹窗。\u003c/li>\n\u003cli>点击广告卡片跳转至后台配置的广告链接。\u003c/li>\n\u003cli>广告链接可根据后台配置决定当前页面打开或新窗口打开。\u003c/li>\n\u003cli>鼠标悬浮广告卡片时展示高亮反馈。\u003c/li>\n\u003cli>弹窗关闭后，当前页面不再遮挡用户操作。\u003c/li>\n\u003c/ul>\n\u003ch3>状态规则：\u003c/h3>\n\u003cul>\n\u003cli>广告弹窗默认在首页打开时展示。\u003c/li>\n\u003cli>广告卡片按照后台配置顺序展示。\u003c/li>\n\u003cli>广告数量超过一屏时，弹窗内部支持上下滑动。\u003c/li>\n\u003cli>弹窗最大高度不能超过当前浏览器视口高度。\u003c/li>\n\u003cli>广告卡片尺寸、间距、圆角、阴影和图标大小保持统一。\u003c/li>\n\u003c/ul>\n\u003ch3>异常场景：\u003c/h3>\n\u003cul>\n\u003cli>如果后台没有返回广告数据，不展示首页弹窗广告。\u003c/li>\n\u003cli>如果所有广告均为关闭状态，不展示首页弹窗广告。\u003c/li>\n\u003cli>如果某条广告名称为空，展示默认名称“广告位”。\u003c/li>\n\u003cli>如果某条广告图标为空，展示默认广告图标或默认字母标识。\u003c/li>\n\u003cli>如果广告图标或图片加载失败，展示默认占位样式，不能出现破图。\u003c/li>\n\u003cli>如果广告链接为空，点击广告卡片不跳转。\u003c/li>\n\u003cli>如果广告链接格式异常，点击广告卡片不跳转，并保持当前页面。\u003c/li>\n\u003cli>如果广告数量过多   <script>
    const data = JSON.parse(document.getElementById('specData').textContent);
    const docsById = Object.fromEntries(data.docs.map(doc => [doc.id, doc]));
    const docsByTitle = Object.fromEntries(data.docs.map(doc => [doc.title, doc.id]));
    const idsByTitle = (titles) => titles.map(title => docsByTitle[title]).filter(Boolean);
    data.categories = [
      { title: '页面级需求', docs: idsByTitle(['封面页内容区', '首页弹窗广告', '视频详情页', '动态详情页', '搜索结果页', '帖子列表页', '视频列表页', '全部分类页', '观看历史页', '我的点赞页']) },
      { title: '通用组件需求', docs: idsByTitle(['顶部栏', '顶部菜单栏', '顶部广告栏', '搜索功能', '搜索下拉框', '登录/注册', '底部栏广告位', '底部页脚需求说明']) },
      { title: '内容卡片需求', docs: idsByTitle(['动态内容卡片', '视频内容卡片', '广告内容卡片']) },
      { title: '交互状态需求', docs: idsByTitle(['点赞功能', '分享功能', '评论功能', '分页器', '排序筛选', '全部分类按钮']) },
      { title: '用户状态', docs: idsByTitle(['用户状态分类', '顶部栏状态规则', '登录状态切换规则', '权限控制规则', '点赞功能与用户状态', '评论功能与用户状态', '观看历史与用户状态', '我的点赞与用户状态', '个人中心状态规则', '页面同步规则：']) },
      { title: '广告配置需求', docs: idsByTitle(['首页弹窗广告：homePopupY12', '顶部广告栏：topBannerY12', '底部广告栏：bottomBannerY12', '帖子列表广告：postListY12', '视频列表广告：videoListY12', '全部分类页广告：categoryY12', '动态详情页顶部广告：dynamicTopY12', '动态详情页底部广告：dynamicBottomY12', '动态详情页猜你喜欢广告：dynamicGuessY12', '视频详情页前置广告：videoPrerollY12', '视频详情页猜你喜欢广告：videoGuessY12', '视频详情页推荐区广告：videoRecommendY12']) },
      { title: '视频组件说明', docs: idsByTitle(['视频播放流程', '视频组件通用规则']) },
      { title: '异常场景', docs: idsByTitle(['项目异常场景设计说明', '异常场景汇总']) },
      { title: '全部文档', docs: data.docs.map(doc => doc.id) }
    ];
    const pageDocTitles = {
      home: ['封面页内容区', '首页弹窗广告'],
      'post-list': ['帖子列表页'],
      'video-list': ['视频列表页'],
      'all-categories': ['全部分类页'],
      'search-results': ['搜索结果页'],
      'dynamic-detail': ['动态详情页'],
      'video-detail': ['视频详情页'],
      'watch-history': ['观看历史页'],
      'my-likes': ['我的点赞页']
    };
    data.pages = data.pages.map(page => ({ ...page, docs: idsByTitle(pageDocTitles[page.key] || []) }));
    const pageTabs = document.getElementById('pageTabs');
    const categoryTabs = document.getElementById('categoryTabs');
    const docList = document.getElementById('docList');
    const docView = document.getElementById('docView');
    const frame = document.getElementById('previewFrame');
    const currentPageLabel = document.getElementById('currentPageLabel');
    const docCount = document.getElementById('docCount');
    const docSearch = document.getElementById('docSearch');
    const workspace = document.querySelector('.workspace');
    const specContext = document.getElementById('specContext');
    const docToc = document.getElementById('docToc');
    let activePageKey = data.pages[0]?.key || 'home';
    let activeCategory = data.categories[0]?.title || '全部文档';
    let activeDocs = data.categories[0]?.docs || [];
    let activeDocId = activeDocs[0] || data.docs[0]?.id;

    function escapeRegExp(text) {
      return text.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }
    function copyText(text, button) {
      const old = button?.textContent;
      const done = () => {
        if (!button) return;
        button.textContent = '已复制';
        setTimeout(() => button.textContent = old, 1200);
      };
      if (navigator.clipboard?.writeText) return navigator.clipboard.writeText(text).then(done).catch(() => fallbackCopy(text, done));
      return fallbackCopy(text, done);
    }
    function fallbackCopy(text, done) {
      const ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      ta.remove();
      done?.();
    }
    function highlightKeyword(root, keyword) {
      if (!keyword) return;
      const reg = new RegExp(escapeRegExp(keyword), 'gi');
      const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
        acceptNode(node) {
          if (!node.nodeValue.trim() || !reg.test(node.nodeValue)) return NodeFilter.FILTER_REJECT;
          reg.lastIndex = 0;
          return NodeFilter.FILTER_ACCEPT;
        }
      });
      const nodes = [];
      while (walker.nextNode()) nodes.push(walker.currentNode);
      nodes.forEach(node => {
        const frag = document.createDocumentFragment();
        let last = 0;
        node.nodeValue.replace(reg, (match, offset) => {
          frag.append(document.createTextNode(node.nodeValue.slice(last, offset)));
          const mark = document.createElement('mark');
          mark.textContent = match;
          frag.append(mark);
          last = offset + match.length;
        });
        frag.append(document.createTextNode(node.nodeValue.slice(last)));
        node.parentNode.replaceChild(frag, node);
      });
    }
    function updateContext() {
      const page = data.pages.find(item => item.key === activePageKey);
      const doc = docsById[activeDocId];
      if (!specContext) return;
      specContext.innerHTML = '<span>当前页面：<strong>' + (page?.title || '-') + '</strong></span><span>需求分类：<strong>' + activeCategory + '</strong></span><span>当前文档：<strong>' + (doc?.title || '-') + '</strong></span>';
    }
    function renderToc() {
      if (!docToc) return;
      const headings = Array.from(docView.querySelectorAll('h2, h3, h4'));
      if (!headings.length) {
        docToc.innerHTML = '<p class="toc-title">章节目录</p><div class="empty">暂无章节</div>';
        return;
      }
      docToc.innerHTML = '<p class="toc-title">章节目录</p>' + headings.map((heading, index) => {
        const id = 'section-' + index;
        heading.id = id;
        const level = heading.tagName.slice(1);
        return '<a class="toc-link level-' + level + '" href="#' + id + '">' + heading.textContent + '</a>';
      }).join('');
    }

    function renderPageTabs() {
      pageTabs.innerHTML = data.pages.map((page, index) => '<button class="tab' + (index === 0 ? ' active' : '') + '" data-page="' + page.key + '">' + page.title + '</button>').join('');
    }
    function renderCategoryTabs() {
      categoryTabs.innerHTML = data.categories.map(cat => '<button class="tab' + (cat.title === activeCategory ? ' active' : '') + '" data-category="' + cat.title + '">' + cat.title + '</button>').join('');
    }
    function setCategory(title, preferredDocId) {
      activeCategory = title;
      const cat = data.categories.find(item => item.title === title) || data.categories[data.categories.length - 1];
      activeDocs = cat.docs || [];
      activeDocId = preferredDocId && activeDocs.includes(preferredDocId) ? preferredDocId : activeDocs[0];
      renderCategoryTabs();
      renderDocList();
      renderDoc();
    }
    function renderDocList() {
      const keyword = docSearch.value.trim().toLowerCase();
      const filtered = activeDocs.map(id => docsById[id]).filter(Boolean).filter(doc => !keyword || (doc.title + '\n' + doc.raw).toLowerCase().includes(keyword));
      docCount.textContent = filtered.length + ' 篇';
      if (!filtered.length) { docList.innerHTML = '<div class="empty">没有匹配的需求说明</div>'; return; }
      if (!filtered.some(doc => doc.id === activeDocId)) activeDocId = filtered[0].id;
      docList.innerHTML = filtered.map(doc => '<button class="doc-item' + (doc.id === activeDocId ? ' active' : '') + '" data-doc="' + doc.id + '">' + doc.title + '</button>').join('');
    }
    function renderDoc() {
      const doc = docsById[activeDocId];
      if (!doc) { docView.innerHTML = '<div class="empty">请选择需求说明</div>'; return; }
      docView.innerHTML = '<div class="meta"><span class="badge">来源：Notion Markdown</span><span class="badge">' + doc.lines + ' 行</span><span class="badge">' + doc.file + '</span></div>' + doc.html;
      highlightKeyword(docView, docSearch.value.trim());
      renderToc();
      updateContext();
      docView.scrollTop = 0;
    }
    pageTabs.addEventListener('click', event => {
      const button = event.target.closest('[data-page]');
      if (!button) return;
      const page = data.pages.find(item => item.key === button.dataset.page);
      if (!page) return;
      activePageKey = page.key;
      pageTabs.querySelectorAll('.tab').forEach(item => item.classList.toggle('active', item === button));
      frame.src = page.src;
      currentPageLabel.textContent = page.title;
      activeCategory = '页面级需求';
      activeDocs = page.docs.length ? page.docs : (data.categories.find(cat => cat.title === '页面级需求')?.docs || []);
      activeDocId = activeDocs[0];
      renderCategoryTabs();
      renderDocList();
      renderDoc();
    });
    categoryTabs.addEventListener('click', event => {
      const button = event.target.closest('[data-category]');
      if (button) setCategory(button.dataset.category);
    });
    docList.addEventListener('click', event => {
      const button = event.target.closest('[data-doc]');
      if (!button) return;
      activeDocId = button.dataset.doc;
      renderDocList();
      renderDoc();
    });
    docSearch.addEventListener('input', () => { renderDocList(); renderDoc(); });
    docToc.addEventListener('click', event => {
      const link = event.target.closest('a[href^="#section-"]');
      if (!link) return;
      event.preventDefault();
      docView.querySelector(link.getAttribute('href'))?.scrollIntoView({ block: 'start', behavior: 'smooth' });
    });
    document.querySelectorAll('[data-layout]').forEach(button => {
      button.addEventListener('click', () => {
        const mode = button.dataset.layout;
        workspace.classList.toggle('layout-spec', mode === 'spec');
        workspace.classList.toggle('layout-preview', mode === 'preview');
        document.querySelectorAll('[data-layout]').forEach(item => item.classList.toggle('active', item === button));
      });
    });
    document.getElementById('copyPagePack').addEventListener('click', () => {
      const page = data.pages.find(item => item.key === activePageKey);
      const docs = (page?.docs || []).map(id => docsById[id]).filter(Boolean);
      const text = ['# ' + (page?.title || '当前页面') + '需求包', ...docs.map(doc => '\n\n---\n\n' + doc.raw)].join('');
      copyText(text, document.getElementById('copyPagePack'));
    });
    document.getElementById('copyDoc').addEventListener('click', async () => {
      const doc = docsById[activeDocId];
      if (!doc) return;
      copyText(doc.raw, document.getElementById('copyDoc'));
    });
    document.querySelector('[data-layout="split"]')?.classList.add('active');
    renderPageTabs(); renderCategoryTabs(); renderDocList(); renderDoc();
  </script>
</body>
</html>
